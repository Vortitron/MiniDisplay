---
# Automation to sync circulation fan temperature to mama's bedroom thermostat + 1°C
id: circulation_fan_temperature_sync
alias: "Circulation Fan - Temperature Sync"
description: "Set circulation fan to 1°C higher than mama's bedroom thermostat"
trigger:
  - platform: state
    entity_id: climate.mama_bedroom_thermostat
    attribute: temperature
condition: []
action:
  - service: climate.set_temperature
    target:
      entity_id: climate.circulation_fan
    data:
      temperature: >
        {{ state_attr('climate.mama_bedroom_thermostat', 'temperature') | float(20) + 1 }}
mode: single

---
# Automation to control circulation fan based on temperature comparison
id: circulation_fan_temperature_control
alias: "Circulation Fan - Temperature Control"
description: "Start earlier: turn on when other room is warmer and bedroom is below target; turn off when no longer beneficial"
trigger:
  - platform: state
    entity_id: sensor.bedroomlights_bedroomlights_temperature
  - platform: state
    entity_id: sensor.t_h_sensor_temperature
  - platform: state
    entity_id: climate.mama_bedroom_thermostat
    attribute: temperature
condition: []
action:
  - variables:
      bedroom_temp_state: "{{ states('sensor.bedroomlights_bedroomlights_temperature') }}"
      other_room_temp_state: "{{ states('sensor.t_h_sensor_temperature') }}"
      bedroom_target_raw: "{{ state_attr('climate.mama_bedroom_thermostat', 'temperature') }}"
      bedroom_temp_ok: "{{ bedroom_temp_state not in ['unknown', 'unavailable', 'none', ''] }}"
      other_room_temp_ok: "{{ other_room_temp_state not in ['unknown', 'unavailable', 'none', ''] }}"
      bedroom_target_ok: "{{ bedroom_target_raw is not none }}"
      bedroom_temp: "{{ bedroom_temp_state | float(0) }}"
      other_room_temp: "{{ other_room_temp_state | float(0) }}"
      bedroom_target: "{{ bedroom_target_raw | float(0) }}"
      data_ok: "{{ bedroom_temp_ok and other_room_temp_ok and bedroom_target_ok }}"
      fan_hvac_mode: "{{ states('climate.circulation_fan') }}"
      fan_is_off: "{{ fan_hvac_mode == 'off' }}"
      # Tune these if needed:
      # - Start earlier than before (was 2°C) to reduce bedroom heater cycling
      other_room_turn_on_diff_c: 0.5
      other_room_turn_off_diff_c: 0.2
      bedroom_below_target_on_c: 0.1
      bedroom_below_target_off_c: 0.0
      fan_target_offset_c: 1
      temp_diff_c: "{{ (other_room_temp - bedroom_temp) if data_ok else none }}"
      below_target_c: "{{ (bedroom_target - bedroom_temp) if data_ok else none }}"
      fan_target_temp: "{{ (bedroom_target + fan_target_offset_c) if bedroom_target_ok else none }}"
  - choose:
      # Missing sensor data: stop the fan (only if it was on) to avoid running blindly.
      - conditions:
          - condition: template
            value_template: >-
              {{ not data_ok }}
          - condition: template
            value_template: "{{ not fan_is_off }}"
        sequence:
          - service: climate.turn_off
            target:
              entity_id: climate.circulation_fan
          - service: logbook.log
            data:
              name: Circulation Fan
              message: >-
                Turned OFF (missing data). bedroom={{ bedroom_temp_state }}, other={{ other_room_temp_state }}, target={{ bedroom_target_raw }}

      # Turn ON earlier when other room is warmer AND bedroom is below target.
      - conditions:
          - condition: template
            value_template: >-
              {{ fan_is_off
                 and data_ok
                 and (temp_diff_c | float(0)) >= (other_room_turn_on_diff_c | float(0))
                 and (below_target_c | float(0)) >= (bedroom_below_target_on_c | float(0)) }}
        sequence:
          - service: climate.turn_on
            target:
              entity_id: climate.circulation_fan
          - service: climate.set_temperature
            target:
              entity_id: climate.circulation_fan
            data:
              temperature: "{{ fan_target_temp }}"
          - service: logbook.log
            data:
              name: Circulation Fan
              message: >-
                Turned ON. diff={{ temp_diff_c | round(1) }}°C, below_target={{ below_target_c | round(1) }}°C, fan_target={{ fan_target_temp | round(1) }}°C

      # Turn OFF when it’s no longer beneficial (other room no longer warmer, or bedroom reached target).
      - conditions:
          - condition: template
            value_template: >-
              {{ not fan_is_off
                 and data_ok
                 and ((temp_diff_c | float(0)) <= (other_room_turn_off_diff_c | float(0))
                      or (below_target_c | float(0)) <= (bedroom_below_target_off_c | float(0))) }}
        sequence:
          - service: climate.turn_off
            target:
              entity_id: climate.circulation_fan
          - service: logbook.log
            data:
              name: Circulation Fan
              message: >-
                Turned OFF. diff={{ temp_diff_c | round(1) }}°C, below_target={{ below_target_c | round(1) }}°C
mode: single

