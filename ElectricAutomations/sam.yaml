alias: Sync Sam HVAC with Desired Temperature and Energy Saving
description: >-
  Control Sam HVAC with remote sensor, price-adjusted control temp, and
  dynamic fan-only. Uses sam_control_temperature (set by DaytimeCheapHeat)
  as the base target.
variables:
  cool_indoor_threshold: 26
  cool_outdoor_threshold: 25
  cool_indoor_min: 20
  heat_offset: 1
  cool_offset: -1
  base_stop_heat_offset: -2
  max_stop_heat_offset: -5
  temp_tolerance: 0.5
  fan_only_diff: 3
  # Fallbacks if the climate entity does not expose min/max temp attributes
  sam_min_temp_fallback: 10
  sam_max_temp_fallback: 30
triggers:
  - trigger: state
    entity_id:
      - sensor.t_h_sensor_temperature
      - sensor.bedroomlights_bedroomlights_temperature
      - sensor.sam_outside_temperature
      - sensor.sam_inside_temperature
      - input_number.sam_control_temperature
    for:
      seconds: 30
  - trigger: state
    entity_id:
      - climate.circulation_fan
      - input_boolean.holiday_mode
  - trigger: state
    entity_id: climate.mama_bedroom_thermostat
    attribute: temperature
actions:
  - variables:
      holiday_mode: "{{ is_state('input_boolean.holiday_mode', 'on') }}"
      sam_preset: "{{ state_attr('climate.sam', 'preset_mode') | default('none', true) }}"
      living_room_temp_state: "{{ states('sensor.t_h_sensor_temperature') }}"
      bedroom_temp_state: "{{ states('sensor.bedroomlights_bedroomlights_temperature') }}"
      sam_outdoor_state: "{{ states('sensor.sam_outside_temperature') }}"
      sam_internal_state: "{{ states('sensor.sam_inside_temperature') }}"
      sam_desired_state: "{{ states('input_number.sam_desired_temperature') }}"
      sam_control_state: "{{ states('input_number.sam_control_temperature') }}"
      bedroom_target_raw: "{{ state_attr('climate.mama_bedroom_thermostat', 'temperature') }}"
      fan_state: "{{ states('climate.circulation_fan') }}"
      fan_running: "{{ fan_state not in ['off', 'unknown', 'unavailable', 'none', ''] }}"

      living_room_temp_ok: "{{ living_room_temp_state not in ['unknown', 'unavailable', 'none', ''] }}"
      bedroom_temp_ok: "{{ bedroom_temp_state not in ['unknown', 'unavailable', 'none', ''] }}"
      outdoor_ok: "{{ sam_outdoor_state not in ['unknown', 'unavailable', 'none', ''] }}"
      internal_ok: "{{ sam_internal_state not in ['unknown', 'unavailable', 'none', ''] }}"
      control_ok: "{{ sam_control_state not in ['unknown', 'unavailable', 'none', ''] }}"

      living_room_temp: "{{ living_room_temp_state | float(0) }}"
      bedroom_temp: "{{ bedroom_temp_state | float(0) }}"
      outdoor: "{{ sam_outdoor_state | float(0) }}"
      internal: "{{ sam_internal_state | float(0) }}"
      desired_base: "{{ sam_control_state | float(0) }}"
      bedroom_target: "{{ bedroom_target_raw | float(0) }}"
      sam_min_temp: "{{ state_attr('climate.sam', 'min_temp') | float(sam_min_temp_fallback) }}"
      sam_max_temp: "{{ state_attr('climate.sam', 'max_temp') | float(sam_max_temp_fallback) }}"

      # Sam should heat for whichever needs more:
      # - the price-adjusted control temperature (input_number.sam_control_temperature), or
      # - the bedroom thermostat target (climate.mama_bedroom_thermostat.temperature)
      desired_effective: >-
        {% if bedroom_target_raw is not none %}
          {{ [desired_base, bedroom_target] | max }}
        {% else %}
          {{ desired_base }}
        {% endif %}

      # Cooling still uses the living room sensor.
      remote_cool: "{{ living_room_temp }}"

      # Heating uses:
      # - living room sensor when circulation fan is off
      # - min(bedroom,living) when circulation fan is on (so Sam keeps heating until bedroom catches up)
      remote_heat: >-
        {% if fan_running %}
          {% if living_room_temp_ok and bedroom_temp_ok %}
            {{ [living_room_temp, bedroom_temp] | min }}
          {% elif bedroom_temp_ok %}
            {{ bedroom_temp }}
          {% elif living_room_temp_ok %}
            {{ living_room_temp }}
          {% else %}
            0
          {% endif %}
        {% else %}
          {% if living_room_temp_ok %}
            {{ living_room_temp }}
          {% elif bedroom_temp_ok %}
            {{ bedroom_temp }}
          {% else %}
            0
          {% endif %}
        {% endif %}
      remote_heat_source: >-
        {% if fan_running %}
          {% if living_room_temp_ok and bedroom_temp_ok %}
            min(bedroom,living)
          {% elif bedroom_temp_ok %}
            bedroom
          {% elif living_room_temp_ok %}
            living
          {% else %}
            none
          {% endif %}
        {% else %}
          {% if living_room_temp_ok %}
            living
          {% elif bedroom_temp_ok %}
            bedroom
          {% else %}
            none
          {% endif %}
        {% endif %}
      # Guard: allow living-room overheating to help bedroom, but never above
      # both desired targets (effective desired).
      living_above_all_targets: "{{ living_room_temp_ok and living_room_temp > desired_effective }}"
      living_overheat_diff: >-
        {% if living_room_temp_ok %}
          {{ living_room_temp - desired_effective }}
        {% else %}
          0
        {% endif %}
  - if:
      - condition: template
        value_template: "{{ not (outdoor_ok and internal_ok and control_ok and (living_room_temp_ok or bedroom_temp_ok)) }}"
    then:
      - action: logbook.log
        data:
          name: Sam HVAC
          message: >-
            Skipping update (missing data). fan={{ fan_state }}, living={{ living_room_temp_state }}, bedroom={{ bedroom_temp_state }}, outdoor={{ sam_outdoor_state }}, internal={{ sam_internal_state }}, desired={{ sam_desired_state }}, control={{ sam_control_state }}, bedroom_target={{ bedroom_target_raw }}
      - stop: "Missing sensor data"
  - if:
      - condition: template
        value_template: "{{ holiday_mode }}"
    then:
      - if:
          - condition: template
            value_template: "{{ sam_preset != 'heat_8_15' }}"
        then:
          - action: climate.set_preset_mode
            target:
              entity_id: climate.sam
            data:
              preset_mode: heat_8_15
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.sam
        data:
          hvac_mode: heat
      - action: climate.set_temperature
        target:
          entity_id: climate.sam
        data:
          temperature: 10
          hvac_mode: heat
      - action: logbook.log
        data:
          name: Sam HVAC
          message: >-
            Holiday mode: preset=heat_8_15, mode=heat, setpoint=10°C,
            living={{ living_room_temp | round(1) }}°C, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
      - action: input_text.set_value
        target:
          entity_id: input_text.sam_hvac_status
        data:
          value: >-
            Holiday mode: preset=heat_8_15, mode=heat, setpoint=10°C,
            living={{ living_room_temp | round(1) }}°C, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
      - stop: "Holiday mode active"
  - if:
      - condition: template
        value_template: "{{ sam_preset == 'heat_8_15' and not holiday_mode }}"
    then:
      - action: climate.set_preset_mode
        target:
          entity_id: climate.sam
        data:
          preset_mode: none
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ remote_cool > cool_indoor_threshold or (outdoor >= cool_outdoor_threshold and remote_cool > cool_indoor_min) }}
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.sam
            data:
              hvac_mode: >-
                {{ 'fan_only' if remote_cool > desired_effective + temp_tolerance and outdoor < desired_effective else 'cool' }}
          - action: climate.set_temperature
            target:
              entity_id: climate.sam
            data:
              temperature: >-
                {% set unclamped = internal + (cool_offset if remote_cool > desired_effective + temp_tolerance else 0) %}
                {{ [sam_min_temp, [sam_max_temp, unclamped] | min] | max }}
              hvac_mode: >-
                {{ 'fan_only' if remote_cool > desired_effective + temp_tolerance and outdoor < desired_effective else 'cool' }}
          - action: logbook.log
            data:
              name: Sam HVAC
              message: >-
                Cooling: mode={{ 'fan_only' if remote_cool > desired_effective + temp_tolerance and outdoor < desired_effective else 'cool' }},
                desired_effective={{ desired_effective | round(1) }}°C (base={{ desired_base | round(1) }}, bedroom_target={{ bedroom_target_raw }}),
                living={{ living_room_temp | round(1) }}°C, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
          - action: input_text.set_value
            target:
              entity_id: input_text.sam_hvac_status
            data:
              value: >-
                Cooling: mode={{ 'fan_only' if remote_cool > desired_effective + temp_tolerance and outdoor < desired_effective else 'cool' }},
                desired_effective={{ desired_effective | round(1) }}°C (base={{ desired_base | round(1) }}, bedroom_target={{ bedroom_target_raw }}),
                living={{ living_room_temp | round(1) }}°C, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
      - conditions:
          - condition: template
            value_template: >
              {{ not (remote_cool > cool_indoor_threshold or (outdoor >= cool_outdoor_threshold and remote_cool > cool_indoor_min)) }}
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.sam
            data:
              hvac_mode: >-
                {% set diff = remote_heat - desired_effective %}
                {{ 'fan_only' if living_above_all_targets or (remote_heat < desired_effective - temp_tolerance and outdoor > desired_effective) or diff > fan_only_diff else 'heat' }}
          - action: climate.set_temperature
            target:
              entity_id: climate.sam
            data:
              temperature: >-
                {% set diff = remote_heat - desired_effective %}
                {% set need = desired_effective - remote_heat %}
                {% set boost = [heat_offset, need] | max %}
                {% if living_above_all_targets %}
                  {% set unclamped = internal + [base_stop_heat_offset - (living_overheat_diff | float(0)), max_stop_heat_offset] | max %}
                {% elif remote_heat < desired_effective - temp_tolerance %}
                  {% set unclamped = internal + boost %}
                {% elif remote_heat >= desired_effective %}
                  {% set unclamped = internal + [base_stop_heat_offset - diff, max_stop_heat_offset] | max %}
                {% else %}
                  {% set unclamped = internal %}
                {% endif %}
                {{ [sam_min_temp, [sam_max_temp, unclamped] | min] | max }}
              hvac_mode: >-
                {% set diff = remote_heat - desired_effective %}
                {{ 'fan_only' if living_above_all_targets or (remote_heat < desired_effective - temp_tolerance and outdoor > desired_effective) or diff > fan_only_diff else 'heat' }}
          - action: logbook.log
            data:
              name: Sam HVAC
              message: >-
                {% set diff = remote_heat - desired_effective %}
                {% set need = desired_effective - remote_heat %}
                {% set boost = [heat_offset, need] | max %}
                {% if living_above_all_targets %}
                  {% set unclamped = internal + [base_stop_heat_offset - (living_overheat_diff | float(0)), max_stop_heat_offset] | max %}
                {% elif remote_heat < desired_effective - temp_tolerance %}
                  {% set unclamped = internal + boost %}
                {% elif remote_heat >= desired_effective %}
                  {% set unclamped = internal + [base_stop_heat_offset - diff, max_stop_heat_offset] | max %}
                {% else %}
                  {% set unclamped = internal %}
                {% endif %}
                {% set setpoint = [sam_min_temp, [sam_max_temp, unclamped] | min] | max %}
                Heating: mode={{ 'fan_only' if living_above_all_targets or (remote_heat < desired_effective - temp_tolerance and outdoor > desired_effective) or (remote_heat - desired_effective) > fan_only_diff else 'heat' }},
                desired_effective={{ desired_effective | round(1) }}°C (base={{ desired_base | round(1) }}, bedroom_target={{ bedroom_target_raw }}),
                need={{ need | round(1) }}°C, boost={{ boost | round(1) }}°C, setpoint={{ setpoint | round(1) }}°C,
                remote={{ remote_heat | round(1) }}°C via {{ remote_heat_source }},
                living={{ living_room_temp | round(1) }}°C, bedroom={{ bedroom_temp | round(1) }}°C, living_overheat_guard={{ living_above_all_targets }},
                fan={{ fan_state }}, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
          - action: input_text.set_value
            target:
              entity_id: input_text.sam_hvac_status
            data:
              value: >-
                {% set diff = remote_heat - desired_effective %}
                {% set need = desired_effective - remote_heat %}
                {% set boost = [heat_offset, need] | max %}
                {% if living_above_all_targets %}
                  {% set unclamped = internal + [base_stop_heat_offset - (living_overheat_diff | float(0)), max_stop_heat_offset] | max %}
                {% elif remote_heat < desired_effective - temp_tolerance %}
                  {% set unclamped = internal + boost %}
                {% elif remote_heat >= desired_effective %}
                  {% set unclamped = internal + [base_stop_heat_offset - diff, max_stop_heat_offset] | max %}
                {% else %}
                  {% set unclamped = internal %}
                {% endif %}
                {% set setpoint = [sam_min_temp, [sam_max_temp, unclamped] | min] | max %}
                Heating: mode={{ 'fan_only' if living_above_all_targets or (remote_heat < desired_effective - temp_tolerance and outdoor > desired_effective) or (remote_heat - desired_effective) > fan_only_diff else 'heat' }},
                desired_effective={{ desired_effective | round(1) }}°C (base={{ desired_base | round(1) }}, bedroom_target={{ bedroom_target_raw }}),
                need={{ need | round(1) }}°C, boost={{ boost | round(1) }}°C, setpoint={{ setpoint | round(1) }}°C,
                remote={{ remote_heat | round(1) }}°C via {{ remote_heat_source }},
                living={{ living_room_temp | round(1) }}°C, bedroom={{ bedroom_temp | round(1) }}°C, living_overheat_guard={{ living_above_all_targets }},
                fan={{ fan_state }}, outdoor={{ outdoor | round(1) }}°C, internal={{ internal | round(1) }}°C
    default: []
