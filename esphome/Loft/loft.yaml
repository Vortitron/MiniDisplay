          }
        }
      }
      else if (screen_mode == 4) {
        draw_header("Energy", id(color_orange));
        if (!detail_mode) {
          // SUMMARY: Energy overview with total power
          float total_bio = 0;
          float total_hem = 0;
          if (id(bio_power_l1).has_state()) total_bio += id(bio_power_l1).state;
          if (id(bio_power_l2).has_state()) total_bio += id(bio_power_l2).state;
          if (id(bio_power_l3).has_state()) total_bio += id(bio_power_l3).state;
          if (id(hem_power_l1).has_state()) total_hem += id(hem_power_l1).state;
          if (id(hem_power_l2).has_state()) total_hem += id(hem_power_l2).state;
          if (id(hem_power_l3).has_state()) total_hem += id(hem_power_l3).state;
          
          float total_power = total_bio + total_hem;
          
          // Large total power display
          it.printf(kContentMargin + 4, content_top + 8, id(font_large), id(color_yellow), "%.1f", total_power / 1000.0);
          it.print(kContentMargin + 4, content_top + 40, id(font_small), id(color_white), "kW Total");
          
          // Power breakdown bars
          int bar_y = content_top + 64;
          int bar_height = 16;
          int bar_width = 200;
          
          // Bio power bar
          it.print(kContentMargin + 4, bar_y, id(font_small), id(color_white), "Bio");
          float bio_ratio = (total_power > 0) ? (total_bio / total_power) : 0;
          int bio_bar_width = static_cast<int>(bar_width * bio_ratio);
          it.rectangle(kContentMargin + 40, bar_y, bar_width, bar_height, id(color_white));
          if (bio_bar_width > 0) {
            it.filled_rectangle(kContentMargin + 40, bar_y, bio_bar_width, bar_height, id(color_green));
          }
          it.printf(kContentMargin + 245, bar_y + 3, id(font_small), id(color_white), "%.0fW", total_bio);
          
          // HEM power bar
          bar_y += 24;
          it.print(kContentMargin + 4, bar_y, id(font_small), id(color_white), "HEM");
          float hem_ratio = (total_power > 0) ? (total_hem / total_power) : 0;
          int hem_bar_width = static_cast<int>(bar_width * hem_ratio);
          it.rectangle(kContentMargin + 40, bar_y, bar_width, bar_height, id(color_white));
          if (hem_bar_width > 0) {
            it.filled_rectangle(kContentMargin + 40, bar_y, hem_bar_width, bar_height, id(color_blue));
          }
          it.printf(kContentMargin + 245, bar_y + 3, id(font_small), id(color_white), "%.0fW", total_hem);
          
