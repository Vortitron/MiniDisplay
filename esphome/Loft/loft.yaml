          }
          
          // Power readings in two columns at bottom
          int y = content_top + 148;
          int col1 = kContentMargin + 4;
          int col2 = kContentMargin + 110;
          int col3 = kContentMargin + 216;
          
          if (id(bio_power_l1).has_state()) {
            it.printf(col1, y, id(font_small), id(color_white), "Bio L1 %.0fW", id(bio_power_l1).state);
          }
          if (id(bio_power_l2).has_state()) {
            it.printf(col2, y, id(font_small), id(color_white), "Bio L2 %.0fW", id(bio_power_l2).state);
          }
          if (id(bio_power_l3).has_state()) {
