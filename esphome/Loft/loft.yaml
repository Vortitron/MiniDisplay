          }
        }
      }
      else if (screen_mode == 3) {
        draw_header("Calendar", id(color_yellow));
        std::string event_title = id(calendar_next_event).state;
        std::string event_message = id(calendar_next_event_message).state;
        std::string event_location = id(calendar_next_event_location).state;
        std::string event_start = id(calendar_next_event_start).state;
        std::string start_time = extract_time(event_start);

        if (!detail_mode) {
