            it.printf(kContentMargin + 4, content_top + 120, id(font_title), id(color_yellow), "%.2f SEK/h", cost_per_hour);
            it.print(kContentMargin + 4, content_top + 140, id(font_small), id(color_white), "Current cost rate");
          }
        } else {
          // DETAIL: Per-phase breakdown with visual bars
          int y = content_top + 4;
          int bar_height = 12;
          int bar_max_width = 180;
          
          it.print(kContentMargin + 4, y, id(font_title), id(color_green), "Bio Phases");
          y += 20;
          
          float max_power = 3000;  // Scale bars to 3kW max
          
          if (id(bio_power_l1).has_state()) {
            it.print(kContentMargin + 4, y, id(font_small), id(color_white), "L1");
            float power = id(bio_power_l1).state;
            int bar_w = static_cast<int>((power / max_power) * bar_max_width);
            if (bar_w > bar_max_width) bar_w = bar_max_width;
            it.rectangle(kContentMargin + 30, y, bar_max_width, bar_height, id(color_white));
            if (bar_w > 0) it.filled_rectangle(kContentMargin + 30, y, bar_w, bar_height, id(color_green));
            it.printf(kContentMargin + 215, y + 1, id(font_small), id(color_white), "%.0fW", power);
            y += 16;
          }
          
          if (id(bio_power_l2).has_state()) {
            it.print(kContentMargin + 4, y, id(font_small), id(color_white), "L2");
            float power = id(bio_power_l2).state;
            int bar_w = static_cast<int>((power / max_power) * bar_max_width);
            if (bar_w > bar_max_width) bar_w = bar_max_width;
            it.rectangle(kContentMargin + 30, y, bar_max_width, bar_height, id(color_white));
            if (bar_w > 0) it.filled_rectangle(kContentMargin + 30, y, bar_w, bar_height, id(color_green));
            it.printf(kContentMargin + 215, y + 1, id(font_small), id(color_white), "%.0fW", power);
            y += 16;
          }
          
          if (id(bio_power_l3).has_state()) {
            it.print(kContentMargin + 4, y, id(font_small), id(color_white), "L3");
            float power = id(bio_power_l3).state;
            int bar_w = static_cast<int>((power / max_power) * bar_max_width);
            if (bar_w > bar_max_width) bar_w = bar_max_width;
            it.rectangle(kContentMargin + 30, y, bar_max_width, bar_height, id(color_white));
            if (bar_w > 0) it.filled_rectangle(kContentMargin + 30, y, bar_w, bar_height, id(color_green));
            it.printf(kContentMargin + 215, y + 1, id(font_small), id(color_white), "%.0fW", power);
            y += 20;
          }
          
          it.print(kContentMargin + 4, y, id(font_title), id(color_blue), "HEM Phases");
          y += 20;
          
          if (id(hem_power_l1).has_state()) {
            it.print(kContentMargin + 4, y, id(font_small), id(color_white), "L1");
            float power = id(hem_power_l1).state;
            int bar_w = static_cast<int>((power / max_power) * bar_max_width);
            if (bar_w > bar_max_width) bar_w = bar_max_width;
            it.rectangle(kContentMargin + 30, y, bar_max_width, bar_height, id(color_white));
            if (bar_w > 0) it.filled_rectangle(kContentMargin + 30, y, bar_w, bar_height, id(color_blue));
            it.printf(kContentMargin + 215, y + 1, id(font_small), id(color_white), "%.0fW", power);
            y += 16;
          }
          
          if (id(hem_power_l2).has_state()) {
            it.print(kContentMargin + 4, y, id(font_small), id(color_white), "L2");
            float power = id(hem_power_l2).state;
            int bar_w = static_cast<int>((power / max_power) * bar_max_width);
            if (bar_w > bar_max_width) bar_w = bar_max_width;
            it.rectangle(kContentMargin + 30, y, bar_max_width, bar_height, id(color_white));
            if (bar_w > 0) it.filled_rectangle(kContentMargin + 30, y, bar_w, bar_height, id(color_blue));
            it.printf(kContentMargin + 215, y + 1, id(font_small), id(color_white), "%.0fW", power);
            y += 16;
          }
          
          if (id(hem_power_l3).has_state()) {
