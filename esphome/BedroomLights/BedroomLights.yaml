substitutions:
  switch_guard_iterations: '8'
  switch_guard_interval: '500ms'
  switch_led_day_on_level: '1.0'
  switch_led_night_on_level: '0.5'
  switch_led_pending_low_ratio: '0.35'

esphome:
  name: "bedroomlights"
  friendly_name: BedroomLights
  on_boot:
    # High priority - wait for WiFi before initialising I2C sensors
    - priority: 600
      then:
        - wait_until:
            wifi.connected:
        - logger.log: "WiFi connected, enabling environmental sensors"
        # Start sensor polling now that WiFi is stable
        - component.update: aht10_sensor
    # Low priority - initialise application state after everything else
    - priority: -100
      then:
        - lambda: |-
            id(ha_connected) = false;
            id(stand_state_initialised) = false;
            id(bedroom_state_initialised) = false;
            id(stand_led_pending) = false;
            id(bedroom_led_pending) = false;
            id(stand_command_pending) = false;
            id(bedroom_command_pending) = false;
        - logger.log: "Boot complete, waiting for Home Assistant state sync"


esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
      key: "R5ce2+sAWu+P64UfkenRwn2nVHHSHXP5v4hd8oSQ2Ao="
  on_client_connected:
    - lambda: |-
        ESP_LOGI("ha_sync", "Home Assistant connected");
        id(ha_connected) = true;
        id(stand_led_pending) = false;
        id(bedroom_led_pending) = false;
        id(stand_command_pending) = false;
        id(bedroom_command_pending) = false;
    - delay: 3s
    - logger.log: "Home Assistant connected"
  on_client_disconnected:
    - lambda: |-
        ESP_LOGW("ha_sync", "Home Assistant disconnected");
        id(ha_connected) = false;
        id(stand_state_initialised) = false;
        id(bedroom_state_initialised) = false;
        id(stand_led_pending) = false;
        id(bedroom_led_pending) = false;
        id(stand_command_pending) = false;
        id(bedroom_command_pending) = false;

ota:
  - platform: esphome
    password: "629ce264867a48aca47fe3655f629c81"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: true
  reboot_timeout: 5min


# Bluetooth Proxy (extends HA BLE range)
bluetooth_proxy:
  active: true

# I2C bus for environmental sensors
# SDA/SCL on safe pins (avoiding strapping pins GPIO2/8/9)
i2c:
  id: bedroom_i2c_bus
  sda: GPIO5
  scl: GPIO3
  scan: true
  frequency: 100kHz


# Time component for potential future use
time:
  - platform: homeassistant
    id: ha_time

# Interval to poll environmental sensors (only after WiFi connected)
interval:
  - interval: 2min
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - component.update: aht10_sensor

# Binary Sensors - Switches
binary_sensor:
  # Latching Switch 1 - Controls bedroom_light_stand
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Stand Light Switch"
    id: switch1
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      then:
        - logger.log: "Switch 1 pressed - turning on bedroom_light_stand"
        - lambda: |-
            id(stand_target_on) = true;
        - script.execute:
            id: command_stand_light
        - script.execute:
            id: guard_stand_switch_alignment
        - script.execute:
            id: maybe_turn_on_media_player
    on_release:
      then:
        - logger.log: "Switch 1 released - turning off bedroom_light_stand"
        - lambda: |-
            id(stand_target_on) = false;
        - script.execute:
            id: command_stand_light
        - script.execute:
            id: guard_stand_switch_alignment
  
  # Latching Switch 2 - Controls bedroom_light
  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Bedroom Light Switch"
    id: switch2
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms
    on_press:
      then:
        - logger.log: "Switch 2 pressed - turning on bedroom_light"
        - lambda: |-
            id(bedroom_target_on) = true;
        - script.execute:
            id: command_bedroom_light
        - script.execute:
            id: guard_bedroom_switch_alignment
    on_release:
      then:
        - logger.log: "Switch 2 released - turning off bedroom_light"
        - lambda: |-
            id(bedroom_target_on) = false;
        - script.execute:
            id: command_bedroom_light
        - script.execute:
            id: guard_bedroom_switch_alignment
  
  # Momentary Button - Colour and brightness control
  - platform: gpio
    pin:
      number: GPIO6
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Colour Control Button"
    id: momentary_button
    filters:
      - delayed_on: 40ms
      - delayed_off: 40ms
    on_press:
      then:
        - lambda: |-
            id(button_press_time) = millis();
            ESP_LOGD("button", "Momentary button pressed at %u ms", id(button_press_time));
        - script.execute: start_hold_brightness
    on_release:
      then:
        - lambda: |-
            uint32_t press_duration = millis() - id(button_press_time);
            ESP_LOGD("button", "Momentary button released after %u ms", press_duration);
            if (press_duration >= 600) {
              ESP_LOGD("button", "Hold action completed");
            } else {
              ESP_LOGD("button", "Short press - cycling colour or toggling LEDs");
              id(handle_momentary_press).execute();
            }
  
  # Home Assistant sensors to track light states
  - platform: homeassistant
    id: stand_light_state
    entity_id: light.bedroom_light_stand
    internal: true
    on_state:
      - lambda: |-
          id(stand_state_initialised) = true;
          bool ha_on = id(stand_light_state).state;
          if (id(stand_command_pending) && ha_on == id(stand_target_on)) {
            ESP_LOGI("pending_led", "Stand light command acknowledged by Home Assistant");
            id(stand_command_pending) = false;
          }
      - script.execute: update_pending_leds
      - script.execute: sync_switch_leds
  
  - platform: homeassistant
    id: bedroom_light_state
    entity_id: light.bedroom_light
    internal: true
    on_state:
      - lambda: |-
          id(bedroom_state_initialised) = true;
          bool ha_on = id(bedroom_light_state).state;
          if (id(bedroom_command_pending) && ha_on == id(bedroom_target_on)) {
            ESP_LOGI("pending_led", "Bedroom light command acknowledged by Home Assistant");
            id(bedroom_command_pending) = false;
          }
      - script.execute: update_pending_leds
      - script.execute: sync_switch_leds

# Environmental sensors (AHT10 for temp/humidity only)
# Delayed startup to avoid interfering with WiFi connection
sensor:
  - platform: aht10
    id: aht10_sensor
    variant: AHT20  # Specify the model as AHT20
    i2c_id: bedroom_i2c_bus
    update_interval: never  # Manual control to prevent boot-time polling
    temperature:
      name: "BedroomLights Temperature"
      id: bedroom_aht10_temperature
      accuracy_decimals: 1
      filters:
        - calibrate_linear:
            - 0.0 -> 0.0
            - 100.0 -> 100.0
        # Fresh sensor - start with no offset and adjust after testing
        - offset: 0.0
    humidity:
      name: "BedroomLights Humidity"
      id: bedroom_aht10_humidity
      accuracy_decimals: 1

# Outputs - Switch LEDs
output:
  # LED for Switch 1 (bedroom_light_stand)
  - platform: ledc
    pin: GPIO4
    id: switch1_led_output
    frequency: 1000Hz
  
  # LED for Switch 2 (bedroom_light)
  - platform: ledc
    pin: GPIO7
    id: switch2_led_output
    frequency: 1000Hz

# Global variables
globals:
  - id: colour_index
    type: int
    restore_value: no
    initial_value: '1'  # 0-3: kelvin, 4-9: RGB colours (default to 2700K warm white)
  - id: brightness_level
    type: int
    restore_value: no
    initial_value: '130'  # Start at medium brightness
  - id: button_press_time
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: leds_manually_off
    type: bool
    restore_value: no
    initial_value: 'false'  # Track if LEDs were manually turned off
  - id: stand_target_on
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bedroom_target_on
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: stand_state_initialised
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bedroom_state_initialised
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: stand_led_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bedroom_led_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: stand_colour_index
    type: int
    restore_value: yes
    initial_value: '1'
  - id: bedroom_colour_index
    type: int
    restore_value: yes
    initial_value: '1'
  - id: stand_command_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bedroom_command_pending
    type: bool
    restore_value: no
    initial_value: 'false'

# Scripts
script:
  # Turn on media player if stand light has been on for 3 seconds
  - id: maybe_turn_on_media_player
    mode: restart
    then:
      - delay: 3s
      - if:
          condition:
            lambda: 'return id(stand_target_on);'
          then:
            - logger.log: "Stand light steady for 3s - turning on media player"
            - homeassistant.service:
                service: media_player.turn_on
                data:
                  entity_id: media_player.ceol_piccolo

  - id: update_pending_leds
    mode: restart
    then:
      - lambda: |-
          bool stand_pending = id(stand_command_pending);
          if (stand_pending != id(stand_led_pending)) {
            id(stand_led_pending) = stand_pending;
            ESP_LOGI("pending_led", "Stand LED pending -> %s", stand_pending ? "WAIT" : "SYNCED");
            if (stand_pending) {
              id(stand_pending_pulse).execute();
            }
          }
          bool bedroom_pending = id(bedroom_command_pending);
          if (bedroom_pending != id(bedroom_led_pending)) {
            id(bedroom_led_pending) = bedroom_pending;
            ESP_LOGI("pending_led", "Bedroom LED pending -> %s", bedroom_pending ? "WAIT" : "SYNCED");
            if (bedroom_pending) {
              id(bedroom_pending_pulse).execute();
            }
          }
      - script.execute: sync_switch_leds

  - id: set_stand_light_colour
    mode: restart
    parameters:
      requested_index: int
      include_brightness: bool
    then:
      - lambda: |-
          int idx = requested_index;
          if (idx < 0 || idx > 3) {
            idx = 1;
          }
          id(stand_colour_index) = idx;
      - if:
          condition:
            lambda: 'return include_brightness;'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.bedroom_light_stand
                  kelvin: !lambda |-
                    switch (id(stand_colour_index)) {
                      case 0: return 1900;
                      case 1: return 2700;
                      case 2: return 3500;
                      case 3: return 6500;
                    }
                    return 2700;
                  brightness: !lambda 'return id(brightness_level);'
          else:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.bedroom_light_stand
                  kelvin: !lambda |-
                    switch (id(stand_colour_index)) {
                      case 0: return 1900;
                      case 1: return 2700;
                      case 2: return 3500;
                      case 3: return 6500;
                    }
                    return 2700;

  - id: set_bedroom_light_colour
    mode: restart
    parameters:
      requested_index: int
      include_brightness: bool
    then:
      - lambda: |-
          int idx = requested_index;
          if (idx < 0 || idx > 9) {
            idx = 1;
          }
          id(bedroom_colour_index) = idx;
      - if:
          condition:
            lambda: 'return id(bedroom_colour_index) <= 3;'
          then:
            - if:
                condition:
                  lambda: 'return include_brightness;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light
                        kelvin: !lambda |-
                          switch (id(bedroom_colour_index)) {
                            case 0: return 1900;
                            case 1: return 2700;
                            case 2: return 3500;
                            case 3: return 6500;
                          }
                          return 2700;
                        brightness: !lambda 'return id(brightness_level);'
                else:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light
                        kelvin: !lambda |-
                          switch (id(bedroom_colour_index)) {
                            case 0: return 1900;
                            case 1: return 2700;
                            case 2: return 3500;
                            case 3: return 6500;
                          }
                          return 2700;
          else:
            - if:
                condition:
                  lambda: 'return include_brightness;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light
                        color_name: !lambda |-
                          switch (id(bedroom_colour_index)) {
                            case 4: return std::string("red");
                            case 5: return std::string("orange");
                            case 6: return std::string("purple");
                            case 7: return std::string("blue");
                            case 8: return std::string("green");
                            case 9: return std::string("pink");
                          }
                          return std::string("pink");
                        brightness: !lambda 'return id(brightness_level);'
                else:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light
                        color_name: !lambda |-
                          switch (id(bedroom_colour_index)) {
                            case 4: return std::string("red");
                            case 5: return std::string("orange");
                            case 6: return std::string("purple");
                            case 7: return std::string("blue");
                            case 8: return std::string("green");
                            case 9: return std::string("pink");
                          }
                          return std::string("pink");

  - id: stand_pending_pulse
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(stand_led_pending);'
          then:
            - lambda: |-
                auto compute_cap = [&]() -> float {
                  auto now = id(ha_time).now();
                  const float day_cap = ${switch_led_day_on_level};
                  const float night_cap = ${switch_led_night_on_level};
                  if (now.is_valid()) {
                    int hour = now.hour;
                    if (hour >= 18 || hour < 6) {
                      return night_cap;
                    }
                  }
                  return day_cap;
                };
                float cap = compute_cap();
                const float low_ratio = ${switch_led_pending_low_ratio};
                id(switch1_led_output).set_level(cap * low_ratio);
            - delay: 160ms
            - lambda: |-
                auto compute_cap = [&]() -> float {
                  auto now = id(ha_time).now();
                  const float day_cap = ${switch_led_day_on_level};
                  const float night_cap = ${switch_led_night_on_level};
                  if (now.is_valid()) {
                    int hour = now.hour;
                    if (hour >= 18 || hour < 6) {
                      return night_cap;
                    }
                  }
                  return day_cap;
                };
                float cap = compute_cap();
                id(switch1_led_output).set_level(cap);
            - delay: 160ms
      - script.execute: sync_switch_leds

  - id: bedroom_pending_pulse
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(bedroom_led_pending);'
          then:
            - lambda: |-
                auto compute_cap = [&]() -> float {
                  auto now = id(ha_time).now();
                  const float day_cap = ${switch_led_day_on_level};
                  const float night_cap = ${switch_led_night_on_level};
                  if (now.is_valid()) {
                    int hour = now.hour;
                    if (hour >= 18 || hour < 6) {
                      return night_cap;
                    }
                  }
                  return day_cap;
                };
                float cap = compute_cap();
                const float low_ratio = ${switch_led_pending_low_ratio};
                id(switch2_led_output).set_level(cap * low_ratio);
            - delay: 160ms
            - lambda: |-
                auto compute_cap = [&]() -> float {
                  auto now = id(ha_time).now();
                  const float day_cap = ${switch_led_day_on_level};
                  const float night_cap = ${switch_led_night_on_level};
                  if (now.is_valid()) {
                    int hour = now.hour;
                    if (hour >= 18 || hour < 6) {
                      return night_cap;
                    }
                  }
                  return day_cap;
                };
                float cap = compute_cap();
                id(switch2_led_output).set_level(cap);
            - delay: 160ms
      - script.execute: sync_switch_leds

  # Issue stand light commands with restart behaviour to drop stale requests
  - id: command_stand_light
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("switch_guard", "Stand light command -> %s", id(stand_target_on) ? "ON" : "OFF");
          bool expect_change = !id(stand_state_initialised) || (id(stand_light_state).state != id(stand_target_on));
          if (expect_change) {
            id(stand_command_pending) = true;
          }
      - if:
          condition:
            lambda: 'return id(stand_target_on);'
          then:
            - lambda: |-
                id(set_stand_light_colour).execute(id(stand_colour_index), true);
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.bedroom_light_stand
      - script.execute: update_pending_leds

  # Issue bedroom light commands with restart behaviour to drop stale requests
  - id: command_bedroom_light
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("switch_guard", "Bedroom light command -> %s", id(bedroom_target_on) ? "ON" : "OFF");
          bool expect_change = !id(bedroom_state_initialised) || (id(bedroom_light_state).state != id(bedroom_target_on));
          if (expect_change) {
            id(bedroom_command_pending) = true;
          }
      - if:
          condition:
            lambda: 'return id(bedroom_target_on);'
          then:
            - lambda: |-
                id(set_bedroom_light_colour).execute(id(bedroom_colour_index), true);
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.bedroom_light
      - script.execute: update_pending_leds

  # Guard stand light alignment with the physical switch for a short window
  - id: guard_stand_switch_alignment
    mode: restart
    then:
      - lambda: |-
          ESP_LOGD("switch_guard", "Guarding stand light for %s state", id(stand_target_on) ? "ON" : "OFF");
      - repeat:
          count: ${switch_guard_iterations}
          then:
            - delay: ${switch_guard_interval}
            - lambda: |-
                bool expected_on = id(stand_target_on);
                bool actual = id(stand_light_state).state;
                if (actual != expected_on) {
                  ESP_LOGW("switch_guard", "Stand light mismatch detected (expected %d, actual %d)", expected_on, actual);
                }
            - if:
                condition:
                  lambda: 'return id(stand_light_state).state != id(stand_target_on);'
                then:
                  - script.execute: command_stand_light
                  - script.execute: update_pending_leds

  # Guard bedroom light alignment with the physical switch for a short window
  - id: guard_bedroom_switch_alignment
    mode: restart
    then:
      - lambda: |-
          ESP_LOGD("switch_guard", "Guarding bedroom light for %s state", id(bedroom_target_on) ? "ON" : "OFF");
      - repeat:
          count: ${switch_guard_iterations}
          then:
            - delay: ${switch_guard_interval}
            - lambda: |-
                bool expected_on = id(bedroom_target_on);
                bool actual = id(bedroom_light_state).state;
                if (actual != expected_on) {
                  ESP_LOGW("switch_guard", "Bedroom light mismatch detected (expected %d, actual %d)", expected_on, actual);
                }
            - if:
                condition:
                  lambda: 'return id(bedroom_light_state).state != id(bedroom_target_on);'
                then:
                  - script.execute: command_bedroom_light
                  - script.execute: update_pending_leds

  # Sync switch LEDs with light states (inverse logic - LED on when light off)
  - id: sync_switch_leds
    mode: restart
    then:
      - delay: 100ms  # Small delay to ensure states are updated
      - lambda: |-
          // If LEDs were manually turned off, keep them off
          if (id(leds_manually_off)) {
            ESP_LOGD("led", "LEDs manually disabled, keeping off");
            id(switch1_led_output).set_level(0.0);
            id(switch2_led_output).set_level(0.0);
            return;
          }
          
          // Switch 1 LED - ON when stand light is OFF
          auto compute_cap = [&]() -> float {
            auto now = id(ha_time).now();
            const float day_cap = ${switch_led_day_on_level};
            const float night_cap = ${switch_led_night_on_level};
            if (now.is_valid()) {
              int hour = now.hour;
              if (hour >= 18 || hour < 6) {
                return night_cap;
              }
            }
            return day_cap;
          };
          float brightness_cap = compute_cap();
          
          bool stand_light_on = id(stand_light_state).state;
          if (id(stand_led_pending)) {
            ESP_LOGD("led", "Switch 1 LED pending pulse in control");
          } else {
            float led1_level = stand_light_on ? 0.0 : brightness_cap;
          id(switch1_led_output).set_level(led1_level);
            ESP_LOGD("led", "Switch 1 LED: stand_light=%d, led_level=%.2f", stand_light_on, led1_level);
          }
          
          // Switch 2 LED - ON when bedroom light is OFF
          bool bedroom_light_on = id(bedroom_light_state).state;
          if (id(bedroom_led_pending)) {
            ESP_LOGD("led", "Switch 2 LED pending pulse in control");
          } else {
            float led2_level = bedroom_light_on ? 0.0 : brightness_cap;
          id(switch2_led_output).set_level(led2_level);
            ESP_LOGD("led", "Switch 2 LED: bedroom_light=%d, led_level=%.2f", bedroom_light_on, led2_level);
          }
  
  # Handle momentary button short press
  - id: handle_momentary_press
    then:
      - lambda: |-
          bool stand_on = id(stand_light_state).state;
          bool bedroom_on = id(bedroom_light_state).state;
          
          if (!stand_on && !bedroom_on) {
            // Both lights off - toggle LED visibility
            id(leds_manually_off) = !id(leds_manually_off);
            ESP_LOGD("button", "Both lights off - toggling LEDs to %s", id(leds_manually_off) ? "OFF" : "ON");
          } else {
            // At least one light on - cycle colour
            ESP_LOGD("button", "Cycling colour for active lights");
          }
      - if:
          condition:
            lambda: 'return !id(stand_light_state).state && !id(bedroom_light_state).state;'
          then:
            # Both lights off - just sync LEDs (which respects leds_manually_off flag)
            - script.execute: sync_switch_leds
          else:
            # At least one light on - cycle colour
            - script.execute: cycle_colour
  
  # Cycle colour for lights that are on
  - id: cycle_colour
    then:
      - lambda: |-
          // Cycle through all 10 colours (0-9)
          id(colour_index) = (id(colour_index) + 1) % 10;
          ESP_LOGD("button", "Cycling to colour index %d", id(colour_index));
      # Apply colour to lights that are on
      - script.execute: apply_colour_to_active_lights
  
  # Apply current colour to lights that are on
  - id: apply_colour_to_active_lights
    then:
      - lambda: |-
          static const char* labels[] = {
            "Candle 1900K",
            "Warm White 2700K",
            "Neutral 3500K",
            "Daylight 6500K",
            "Red",
            "Orange",
            "Purple",
            "Blue",
            "Green",
            "Pink"
          };
          int colour = id(colour_index);
          if (colour < 0 || colour > 9) {
            colour = 1;
            id(colour_index) = colour;
          }
          bool stand_on = id(stand_light_state).state;
          bool bedroom_on = id(bedroom_light_state).state;
          ESP_LOGD("colour", "Applying colour %d (%s) - stand=%d, bedroom=%d",
                   colour, labels[colour], stand_on, bedroom_on);
      - if:
          condition:
            lambda: 'return id(stand_light_state).state;'
          then:
            - lambda: |-
                int idx = (id(colour_index) <= 3) ? id(colour_index) : 1;
                id(set_stand_light_colour).execute(idx, false);
      - if:
          condition:
            lambda: 'return id(bedroom_light_state).state;'
          then:
            - lambda: |-
                id(set_bedroom_light_colour).execute(id(colour_index), false);
  
  # Start hold brightness cycling after 600ms
  - id: start_hold_brightness
    mode: restart
    then:
      - delay: 600ms
      - if:
          condition:
            binary_sensor.is_on: momentary_button
          then:
            - script.execute: hold_brightness_loop
  
  # Continuous brightness cycling while button is held
  - id: hold_brightness_loop
    mode: restart
    then:
      - while:
          condition:
            binary_sensor.is_on: momentary_button
          then:
            - lambda: |-
                // Cycle brightness: 10 -> 30 -> 60 -> 90 -> 130 -> 180 -> 230 -> 255 -> 10...
                const int brightnesses[] = {10, 30, 60, 90, 130, 180, 230, 255};
                int current_idx = 0;
                
                // Find current brightness index (or closest match)
                int closest_diff = 999;
                for (int i = 0; i < 8; i++) {
                  int diff = abs(id(brightness_level) - brightnesses[i]);
                  if (diff < closest_diff) {
                    closest_diff = diff;
                    current_idx = i;
                  }
                }
                
                // Move to next brightness
                current_idx = (current_idx + 1) % 8;
                id(brightness_level) = brightnesses[current_idx];
                
                ESP_LOGD("button", "Hold brightness cycling to %d", id(brightness_level));
            - if:
                condition:
                  lambda: 'return id(stand_light_state).state;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light_stand
                        brightness: !lambda 'return id(brightness_level);'
            - if:
                condition:
                  lambda: 'return id(bedroom_light_state).state;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: light.bedroom_light
                        brightness: !lambda 'return id(brightness_level);'
            - delay: 800ms
