# CC1101 Wiring for ESP32 WROOM 30-pin:
# CC1101 Pin -> ESP32 Pin
# VCC (pin 2)   -> 3.3V
# GND (pin 1)   -> GND
# SCK (pin 5)   -> GPIO18
# MOSI (pin 6)  -> GPIO23
# MISO (pin 7)  -> GPIO19
# CSN (pin 4)   -> GPIO5
# GDO0 (pin 3)  -> GPIO4
# GDO2 (pin 8)  -> GPIO2

esphome:
  name: esphome-web-598be8
  friendly_name: Kitchen433
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# SPI bus configuration for CC1101
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# CC1101 transceiver configuration
cc1101:
  cs_pin: GPIO5
  gdo0_pin: GPIO4
  gdo2_pin: GPIO2
  frequency: 433.92  # NEXA typically uses 433.92 MHz

# Remote receiver to learn codes (optional but useful)
remote_receiver:
  pin: GPIO4  # Uses CC1101's GDO0 pin
  dump: all    # This will log received codes so you can learn your NEXA codes
  tolerance: 50%
  filter: 250us
  idle: 4ms

# Remote transmitter for sending codes
remote_transmitter:
  pin: GPIO4  # Uses CC1101's GDO0 pin
  carrier_duty_percent: 100%

# Example switches for NEXA sockets
# You'll need to replace these codes with your actual NEXA codes
switch:
  - platform: template
    name: "NEXA Socket 1"
    turn_on_action:
      - remote_transmitter.transmit_nexa:
          device: 1234567  # Replace with your device code
          group: 0
          channel: 1
          state: true
    turn_off_action:
      - remote_transmitter.transmit_nexa:
          device: 1234567  # Replace with your device code
          group: 0
          channel: 1
          state: false
  
  - platform: template
    name: "NEXA Socket 2"
    turn_on_action:
      - remote_transmitter.transmit_nexa:
          device: 1234567  # Replace with your device code
          group: 0
          channel: 2
          state: true
    turn_off_action:
      - remote_transmitter.transmit_nexa:
          device: 1234567  # Replace with your device code
          group: 0
          channel: 2
          state: false