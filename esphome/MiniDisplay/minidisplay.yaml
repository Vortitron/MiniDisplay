interval:
  - interval: 100ms
    then:
      - lambda: |-
          const int mode = id(alarm_led_mode);
          bool led_on = false;
          bool display_invert = false;
          const uint32_t now = millis();
          const bool has_notifications = id(notifications_count) > 0;
          switch (mode) {
            case 0:  // OK - LED off, display normal
              led_on = false;
              display_invert = false;
              break;
            case 1:  // Notify - single 300ms flash every 60 seconds (LED + display)
              led_on = (now % 60000u) < 300u;
              display_invert = led_on;
              break;
            case 2: {  // Take Action - double flash every 20 seconds (LED + display)
              const uint32_t phase = now % 20000u;
              led_on = (phase < 200u) || (phase >= 300u && phase < 500u);
              display_invert = led_on;
              break;
            }
            case 3:  // Emergency - constant quick flash (200ms on/off, LED + display)
              led_on = (now % 400u) < 200u;
              display_invert = led_on;
              break;
            default:
              led_on = false;
              display_invert = false;
              break;
          }
          if (!has_notifications) {
            display_invert = false;
          }

          // Update LED
          if (led_on != id(status_led_is_on)) {
            if (led_on) {
              id(status_led).turn_on();
            } else {
              id(status_led).turn_off();
            }
            id(status_led_is_on) = led_on;
          }

          // Update display inversion for alarms
          if (display_invert != id(display_inverted)) {
            id(display_inverted) = display_invert;
            id(oled_display)->set_invert(display_invert);
          }

          // Screensaver activation and refresh
          if (id(last_interaction_ms) == 0u) {
            id(last_interaction_ms) = now;
          }
          const uint32_t idle_ms = id(screensaver_idle_ms);
          const uint32_t refresh_ms = id(screensaver_refresh_ms);
          if (!id(screensaver_active) && (now - id(last_interaction_ms)) >= idle_ms) {
            id(screensaver_active) = true;
            id(last_screensaver_update_ms) = now;
            ESP_LOGI("script", "Screensaver activated after %u ms idle", idle_ms);
            id(update_display).execute();
          } else if (id(screensaver_active) && (now - id(last_screensaver_update_ms)) >= refresh_ms) {
            id(last_screensaver_update_ms) = now;
            id(update_display).execute();
          }

  # Pixel shifting for OLED burn-in prevention (screensaver only)
  - interval: 30s
    then:
      - lambda: |-
          if (id(screensaver_active) && id(alarm_led_mode) == 0) {
            // Cycle through small offsets: (0,0), (2,0), (2,2), (0,2), (0,0)
            static int shift_state = 0;
            shift_state = (shift_state + 1) % 4;
            
            switch (shift_state) {
              case 0:
                id(display_offset_x) = 0;
                id(display_offset_y) = 0;
                break;
              case 1:
                id(display_offset_x) = 2;
                id(display_offset_y) = 0;
                break;
              case 2:
                id(display_offset_x) = 2;
                id(display_offset_y) = 2;
                break;
              case 3:
                id(display_offset_x) = 0;
                id(display_offset_y) = 2;
                break;
            }
            
            id(update_display).execute();
            ESP_LOGD("display", "Pixel shift: (%d, %d)", id(display_offset_x), id(display_offset_y));
          }

  # Periodic screensaver inversion for OLED burn-in prevention
  - interval: 180s
    then:
      - lambda: |-
          // Only invert if screensaver is active and no alarms
          if (id(screensaver_active) && id(alarm_led_mode) == 0) {
            bool should_invert = !id(display_inverted);
            id(display_inverted) = should_invert;
            id(oled_display)->set_invert(should_invert);
            ESP_LOGD("display", "Screensaver inversion: %s", should_invert ? "inverted" : "normal");
          }

  # Fish tank temperature watchdog (power-cycle DS18B20 if readings stop)
  - interval: 30s
    then:
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              const uint32_t last_ok = id(fish_temp_last_ok_ms);
              const uint32_t last_reset = id(fish_temp_last_reset_ms);
              if (now - last_reset < 120000u) {
                return false;
              }
              if (last_ok == 0u) {
                return now > 60000u;
              }
              return (now - last_ok) > 90000u;
          then:
            - if:
                condition:
                  lambda: 'return id(fish_temp_reset_attempts) >= 3;'
                then:
                  - logger.log: "Fish tank temperature still missing, restarting device"
                  - switch.turn_on: restart_device
                else:
                  - lambda: |-
                      id(fish_temp_last_reset_ms) = millis();
                      id(fish_temp_reset_attempts) += 1;
                      ESP_LOGW("sensor", "Fish tank temperature stale, power-cycling DS18B20 (attempt %d)", id(fish_temp_reset_attempts));
                  - switch.turn_off: ds18b20_power
                  - delay: 2s
                  - switch.turn_on: ds18b20_power
                  - delay: 1s
                  - component.update: ambient_temperature

# Scripts for entity control and display management
script:
  - id: onewire_resync
    mode: restart
    then:
      - logger.log: "OneWire resync: power-cycling DS18B20 and updating"
      - switch.turn_off: ds18b20_power
      - delay: 2s
      - switch.turn_on: ds18b20_power
      - delay: 2s
      - component.update: ambient_temperature

  - id: onewire_manual_scan
    mode: restart
    then:
      - logger.log: "Manual OneWire scan: warming DS18B20 before reboot"
      - switch.turn_on: ds18b20_power
      - delay: 20s
      - switch.turn_on: restart_device

  - id: mark_activity
    then:
      - lambda: |-
          const uint32_t now_ms = millis();
          id(last_interaction_ms) = now_ms;
          id(last_screensaver_update_ms) = 0u;
          if (id(screensaver_active)) {
            id(screensaver_active) = false;
            id(screensaver_exit_ignore_until_ms) = now_ms + 1000u;  // Ignore inputs for 1000ms after exit
            
            // Reset display offset for normal use
            id(display_offset_x) = 0;
            id(display_offset_y) = 0;
            
            // Reset display inversion if it was from screensaver (not alarm)
            if (id(alarm_led_mode) == 0 && id(display_inverted)) {
              id(display_inverted) = false;
              id(oled_display)->set_invert(false);
            }
            
            ESP_LOGI("script", "Screensaver deactivated by user input");
            id(update_display).execute();
          }

  - id: update_display
    then:
      - lambda: |-
          ESP_LOGI("script", "Display update triggered for entity %d", id(current_entity_index));
      - component.update: oled_display

  - id: switch_entity
    parameters:
      entity_index: int
    then:
      - lambda: |-
          int base = id(base_entity_count);
          int total = base + id(notifications_count);
          if (total <= 0) {
            total = base;
          }
          if (total <= 0) {
            total = 1;
          }
          if (entity_index < 0) {
            entity_index = 0;
          } else if (entity_index >= total) {
            entity_index = total - 1;
          }
          id(current_entity_index) = entity_index;
          ESP_LOGI("script", "Switched to entity %d (total available %d)", entity_index, total);
      - script.execute: update_display

  - id: toggle_entity_ha
    then:
      - lambda: |-
          ESP_LOGI("script", "Toggling entity %d", id(current_entity_index));
      - output.turn_on: button_led  # Visual feedback that toggle was called
      - delay: 100ms
      - output.turn_off: button_led
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 0;'
          then:
            - logger.log: "Calling light.toggle for gold_light"
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.gold_light
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 1;'
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.led_flood_light
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 2;'
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.bio_floodlight
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 3;'
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: light.living_office_stand
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 4;'
          then:
            - logger.log: "Calling media_player.toggle for media_player.lgnano_55"
            - homeassistant.service:
                service: media_player.toggle
                data:
                  entity_id: media_player.lgnano_55
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 5;'
          then:
            - logger.log: "Calling homeassistant.toggle for climate.sam"
            - homeassistant.service:
                service: homeassistant.toggle
                data:
                  entity_id: climate.sam
      - if:
          condition:
            lambda: 'return id(current_entity_index) == 6;'
