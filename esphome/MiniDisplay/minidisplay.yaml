text_sensor:
  # Home Assistant notification registry (includes alarm level and ordering)
  - platform: homeassistant
    id: minidisplay_notification_registry
    entity_id: input_text.minidisplay_notification_registry
    on_value:
      then:
        - lambda: |-
            std::string registry = id(minidisplay_notification_registry).state;
            id(notification_ids).clear();
            id(notification_titles).clear();
            id(notification_messages).clear();
            id(notification_alarm_levels).clear();

            struct Entry {
              int alarm;
              int idx;
              std::string id;
              std::string title;
              std::string message;
            };
            std::vector<Entry> parsed;

            if (!registry.empty()) {
              size_t start = 0;
              int entry_idx = 0;
              while (start < registry.size()) {
                size_t delim = registry.find("||", start);
                std::string part = (delim == std::string::npos)
                  ? registry.substr(start)
                  : registry.substr(start, delim - start);

                if (!part.empty()) {
                  size_t p1 = part.find('|');
                  size_t p2 = (p1 != std::string::npos) ? part.find('|', p1 + 1) : std::string::npos;
                  size_t p3 = (p2 != std::string::npos) ? part.find('|', p2 + 1) : std::string::npos;
                  size_t p4 = (p3 != std::string::npos) ? part.find('|', p3 + 1) : std::string::npos;

                  if (p1 != std::string::npos && p2 != std::string::npos && p3 != std::string::npos) {
                    std::string id_str = part.substr(0, p1);
                    std::string title_str = part.substr(p1 + 1, p2 - p1 - 1);
                    std::string msg_str = part.substr(p2 + 1, p3 - p2 - 1);
                    std::string alarm_str = (p4 == std::string::npos)
                      ? part.substr(p3 + 1)
                      : part.substr(p3 + 1, p4 - p3 - 1);

                    auto trim = [](std::string &s) {
                      const char* whitespace = " \t\r\n";
                      size_t first = s.find_first_not_of(whitespace);
                      size_t last = s.find_last_not_of(whitespace);
                      if (first == std::string::npos || last == std::string::npos) {
                        s.clear();
                      } else {
                        s = s.substr(first, last - first + 1);
                      }
                    };
                    auto parse_alarm = [](const std::string &s) -> int {
                      if (s.empty()) return 0;
                      char *end = nullptr;
                      long val = std::strtol(s.c_str(), &end, 10);
                      if (end == s.c_str()) return 0;  // no digits parsed
                      if (val < 0) val = 0;
                      if (val > 3) val = 3;
                      return static_cast<int>(val);
                    };
                    trim(id_str);
                    trim(title_str);
                    trim(msg_str);
                    trim(alarm_str);

                    int alarm_val = parse_alarm(alarm_str);

                    parsed.push_back(Entry{alarm_val, entry_idx, id_str, title_str, msg_str});
                    entry_idx++;
                  }
                }

                if (delim == std::string::npos) {
                  break;
                }
                start = delim + 2;
              }
            }

            if (!parsed.empty()) {
              std::sort(parsed.begin(), parsed.end(), [](const Entry &a, const Entry &b) {
                if (a.alarm != b.alarm) return a.alarm > b.alarm;  // higher alarm first
                return a.idx > b.idx;  // newer first within same alarm
              });
            }

            for (const auto &e : parsed) {
              if (!e.id.empty()) {
                id(notification_ids).push_back(e.id);
                id(notification_titles).push_back(e.title);
                id(notification_messages).push_back(e.message);
                id(notification_alarm_levels).push_back(e.alarm);
              }
            }

            int old_count = id(notifications_count);
            id(notifications_count) = id(notification_ids).size();

            if (id(notifications_count) > old_count && id(notifications_count) > 0) {
              int base = id(base_entity_count);
              id(current_entity_index) = base;
              id(screensaver_active) = false;  // Disable screensaver when notification arrives
              id(last_interaction_ms) = millis();  // Reset idle timer
              ESP_LOGI("script", "New notification via registry, jumping to notification screen");
            }

            int base = id(base_entity_count);
            int total = base + id(notifications_count);
            if (total <= 0) total = base;
            if (total <= 0) total = 1;
            if (id(current_entity_index) >= total) {
              id(current_entity_index) = total - 1;
            }
            ESP_LOGI("script", "Registry parsed: %d notifications (sorted by alarm)", id(notifications_count));
        - script.execute: update_display

