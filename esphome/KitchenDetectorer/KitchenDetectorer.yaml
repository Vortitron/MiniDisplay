# Globals for display, button state, calendar cycling, bean detection and alarms.
# Bean thresholds are now fixed in cm (see SCREEN_BEANS / sensor `on_value`).
globals:
  # Bean-warning state machine. The sensor reports distance in cm (filter
  # converts metres -> cm). When the reading is in the "reliable low" band
  # for at least BEAN_RELIABLE_MS, bean_warning_active goes true and LED8
  # starts flashing. Out-of-range readings (very close = sensor touching
  # the beans, very far = nothing in front of it) reset the timer.
  - id: bean_in_range_since_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: bean_warning_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: current_screen
    type: int
    restore_value: no
    initial_value: "0"
  - id: last_screen_change
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: button_press_time
