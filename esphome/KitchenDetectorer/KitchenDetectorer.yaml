  # ===== TM1638 Buttons =====
  # Buttons 1-3 share the "lights" pattern (modelled on MiniDisplay's
  # back-button behaviour for light entities):
  #  - Short press (held < 800 ms):
  #      * First press OR > LIGHTS_BUTTON_TIMEOUT_MS since last press of
  #        *this same button*: just show the area's current on/off state
  #        on the display overlay. No HA call.
  #      * Press again within the timeout window while still on the same
  #        button: toggle that area's lights via `light.toggle` + area_id.
  #  - Long press (held >= 800 ms): set the whole area to 100% brightness
  #    and 4000 K white via `light.turn_on` + area_id.
  # The "current state" lookup uses the corresponding `*_lights_any_on`
  # binary_sensor; if HA hasn't published that helper yet the overlay
  # shows "Liv  -- " / "Bio  -- " / "Bedr -- " and toggle still works.
  #
  # Implementation note: we intentionally use on_press + on_release with
  # manual timing instead of on_multi_click. The TM1638 component polls
  # its keys at the display update_interval, so a short tap can land
  # entirely between two polls and never register the ON-OFF transition
  # pair that on_multi_click needs - the press appeared "dead" to the
  # user. on_press/on_release fires reliably on each detected transition.
  - platform: tm1638
    name: "Button 1 - Living Room"
    id: button_1
    key: 0
    on_press:
      - if:
          condition:
            lambda: 'return millis() < id(snake_select_until_ms);'
          then:
            - script.execute:
                id: arm_snake_timer
                mins: 1
          else:
            - lambda: |-
                id(press_start_b1) = millis();
                ESP_LOGD("button", "B1 pressed (start=%lu)", (unsigned long) id(press_start_b1));
            - script.execute: long_press_b1
    on_release:
      - lambda: |-
          static const uint32_t LIGHTS_BUTTON_TIMEOUT_MS = 8000;
          static const int BTN_ID = 1;
          const uint32_t now_ms = millis();
          if (id(press_start_b1) == 0) {
            ESP_LOGD("button", "B1 released after long-press already handled");
            id(should_toggle_lights) = false;
            return;
          }
          const uint32_t held = now_ms - id(press_start_b1);
          ESP_LOGD("button", "B1 released after %ums (short-press path)", (unsigned) held);
          const bool was_recent =
              (id(last_lights_button) == BTN_ID) &&
              (now_ms - id(last_lights_button_press) <= LIGHTS_BUTTON_TIMEOUT_MS);
          id(last_lights_button) = BTN_ID;
          id(last_lights_button_press) = now_ms;
          id(should_toggle_lights) = was_recent;
          char buf[16];
          if (was_recent) {
            snprintf(buf, sizeof(buf), "Liv togL");
          } else if (!id(living_lights_any_on).has_state()) {
            snprintf(buf, sizeof(buf), "Liv  -- ");
          } else if (id(living_lights_any_on).state) {
            snprintf(buf, sizeof(buf), "Liv  on ");
          } else {
            snprintf(buf, sizeof(buf), "Liv  off");
          }
          id(feedback_text) = std::string(buf);
          id(feedback_until) = now_ms + 8000;
      - if:
          condition:
            lambda: 'return id(should_toggle_lights);'
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  area_id: living_room

