  # Per-button press-start timestamps for the long-press scripts. Set in
  # `on_press` and reset to 0 by the matching long_press_bX script when it
  # fires (the "long-press handled" sentinel). `on_release` reads it to
  # decide whether to run the short-press path. The previous on_multi_click
  # / measure-on-release approach was unreliable at the TM1638 poll rate.
  - id: press_start_b1
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b2
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b3
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b4
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b6
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b7
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b8
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: press_start_b5
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Snake-egg cooking timer (long-press of Button 5). The snake itself is
  # always one display-segment long and walks the 18-cell perimeter of the
  # 8 digits (top a-segments x 8, right b+c, bottom d-segments x 8, left
  # e+f). Each minute an egg in the top LED row gets eaten. The duration
  # is selected by short-pressing buttons 1..8 during the 5 s "select"
  # window opened by the long press of Button 5.
  - id: snake_timer_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: snake_timer_start_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: snake_timer_minutes
    type: int
    restore_value: no
    initial_value: "8"
  # Snake-body history. Each entry packs (digit << 8) | segment-byte
  # for one cell the head has occupied; entry [0] is the current head
  # and entry [N-1] is the tail. The vector is grown each frame the
  # head moves and trimmed back to snake_length whenever the snake
  # length cap drops. Reset to empty by arm_snake_timer.
  #
  # Why uint16_t and not std::pair<int,char>: we want a trivially
  # copyable type that ESPHome's global YAML serialiser is happy with
  # without an extra include, and packing the two small fields into a
  # single 16-bit word also keeps the per-frame work cheap on the
  # ESP32. We never store cells outside [0..7] so 8-bit digit + 8-bit
  # segment-byte is plenty.
  - id: snake_history
    type: std::vector<uint16_t>
    restore_value: no
  # Last pushed head value (packed as above) so we only push to
  # snake_history when the head actually MOVES into a new cell instead
  # of every render frame (the render lambda runs at ~10 Hz, but the
  # snake's slowest cell is 800 ms - we'd otherwise push 8 duplicate
  # entries per cell). 0xFFFF is an impossible packed value so the
  # very first frame after arming always pushes.
  - id: snake_last_head_packed
    type: uint16_t
    restore_value: no
    initial_value: '0xFFFF'
  # ----- snake state machine -----
  # The snake animation is driven by a small explicit state machine
  # rather than a time-based formula. There are two states - LOOP and
  # GRAB - and they advance their respective cell index on a fixed
  # cadence (LOOP one cell per SNAKE_LOOP_STEP_MS, GRAB one cell per
  # SNAKE_GRAB_STEP_MS). This is what gives the user "natural travel"
  # between minutes: the head walks the loop continuously at one
  # speed and the GRAB only kicks in when the head naturally arrives
  # at the egg's column - no per-minute teleport, no time-based reset
  # at the minute boundary.
  - id: snake_loop_idx
    type: int
    restore_value: no
    initial_value: '-1'   # -1 so the very first advance lands on cell 0
  - id: snake_loop_last_step_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: snake_in_grab
    type: bool
    restore_value: no
    initial_value: 'false'
  # snake_grab_idx is 0..4 inclusive while in_grab; values:
  #   0 - just entered (head still at digit_N '-' from the loop)
  #   1 - upper-right ('`'); 2 - top ('~') = LED extinguishes here;
  #   3 - upper-right again; 4 - back at middle (loop resumes after).
  - id: snake_grab_idx
    type: int
    restore_value: no
    initial_value: '0'
  - id: snake_grab_last_step_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'
  # Number of eggs already grabbed (and therefore the current snake
  # length minus the +2 visibility offset). 0 at start, climbs to
  # snake_timer_minutes once all eggs are eaten.
  - id: snake_next_egg
    type: int
    restore_value: no
    initial_value: '0'
  # Latched millis() at the moment the last egg was eaten - used as
  # the start time of the SNAKE_END_MS ending animation. 0 means
  # "snake still cooking".
  - id: snake_done_at_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'
  # Window during which any of buttons 1..8 acts as a duration selector
  # for the snake timer instead of running its normal action. Set by
  # long_press_b5; cleared either by a duration-selection press or by
  # the 5 s timeout.
  - id: snake_select_until_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Notification cycling (Button 8). Vectors are populated from the CSV
  # text_sensors above so dismiss / cycle don't have to re-parse every press.
  - id: notification_ids
    type: std::vector<std::string>
    restore_value: no
  - id: notification_titles
    type: std::vector<std::string>
    restore_value: no
  # Parallel vector with one entry per active notification ID, populated
  # from input_text.minidisplay_notification_messages (pipe-separated).
  # HA persistent_notifications often have an empty `title` and put the
  # actual content in `message`, so SCREEN_NOTIFY prefers the message
  # over the title when both are available (and falls back to title or
  # the alarm-level label when message is empty).
  - id: notification_messages
    type: std::vector<std::string>
    restore_value: no
  # Floodlight pre-flash state. Set to true if light.led_flood_light
  # was reporting "on" right before the airfryer flash, false if it
  # was off (or unavailable). Used by trigger_airfryer_beep_action to
  # decide whether to scene.turn_on (restore on-state colour and
  # brightness) or light.turn_off (it was off, must go back off).
  - id: floodlight_was_on
    type: bool
    restore_value: no
    initial_value: 'false'
  # Captures the local "HHMM" (4-char string) at which each notification ID
  # first showed up in notification_ids_csv. Index-aligned with
  # notification_ids - the on_value handler preserves HHMM for IDs that are
  # still present and assigns the current local time for any new ID.
  - id: notification_times
    type: std::vector<std::string>
    restore_value: no
  - id: current_notification_index
    type: int
    restore_value: no
    initial_value: "0"
  # When Button 8 is short-pressed we want SCREEN_NOTIFY to stay on screen
  # until the title has had time to fully scroll past, plus a few seconds
  # of dwell at the end. Auto-cycle suspends advancing while now < this.
  # Set in B8 on_release based on the current notification's title length.
  - id: notify_hold_until_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Generic short-lived overlay (8 chars, expires at `feedback_until` ms).
  # Used by the HA bean-cal buttons AND by the lights / notification buttons
  # to show transient on-device feedback without occupying a permanent screen.
  - id: feedback_text
    type: std::string
    restore_value: no
  - id: feedback_until
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Microphone monitoring. The data callback fills mic_peak_value and
  # mic_rms_value on every audio chunk; mic_samples_total ticks up so the
  # log heartbeat can show "yes, we're getting samples".
  - id: mic_peak_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: mic_rms_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: mic_peak_window
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: mic_peak_session
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: mic_samples_total
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: mic_callback_installed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: airfryer_beep_threshold
    type: float
    restore_value: yes
    # The kitchen mic is fairly far from the air fryer; observed peak
    # for one beep was ~77, and ambient kitchen noise sits around ~5..15
    # peak. 50 is well above ambient but well below a real beep. False
    # positives are now rejected primarily by the **length-filtering**
    # pattern matcher (each candidate beep must be on for 50..450 ms
    # AND beeps must be 2..4 s apart, 3 in a row) - see the
    # binary_sensor.airfryer_beep on_release handler for details.
    initial_value: "35.0"
  # Master enable for airfryer detection. Defaults ON; turn OFF in HA if
  # device sitting idle in the kitchen never fires false positives - the
  # user flips the switch ON in HA when they actually start cooking, and
  # we go back to OFF after the alert (or manually). When this is false
  # the airfryer_beep binary sensor refuses to go true even if the
  # acoustic conditions match, so the entire pipeline stays dormant.
  - id: airfryer_detect_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  # Frequency-proxy threshold (zero-crossings per sample). The user
  # measured the airfryer beep at ~4000 Hz with a sound-frequency app
  # (Aug 2026), which at 16 kHz sample rate is ~0.50 ZC/sample. Voice,
  # drawer slams, footsteps, fridge hum all sit well under 0.10. The
  # default 0.22 - use together with airfryer_tone_4k_threshold (either
  # can pass). Tunable via input_number.airfryer_zc_threshold from HA.
  - id: airfryer_zc_threshold
    type: float
    restore_value: yes
    initial_value: "0.22"
  - id: airfryer_tone_4k_threshold
    type: float
    restore_value: yes
    initial_value: "0.06"
  # Live zero-crossing ratio (per-chunk). Updated every audio chunk by
  # the on_boot mic data callback alongside mic_peak_value, and read by
  # binary_sensor.airfryer_beep so a candidate beep has to be both LOUD
  # *and* HIGH-PITCHED to qualify.
  - id: mic_zc_value
    type: float
    restore_value: no
    initial_value: "0.0"
  # Peak ZC ratio observed since last reset - lets the mic-sample script
  # report the loudest *and* highest-frequency moment of the listening
  # window. Reset by mic_sample_action at start.
  - id: mic_zc_window_max
    type: float
    restore_value: no
    initial_value: "0.0"
  # Lag-4 / 4 kHz tone metric (see mic callback). Peak during current
  # beep window; reset on airfryer_beep on_press.
  - id: mic_tone_4k_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: mic_tone_4k_window_max
    type: float
    restore_value: no
    initial_value: "0.0"
  # Peak ZC during the current binary_sensor.airfryer_beep on/off cycle.
  # Captured by on_press, updated by the data callback (via
  # mic_zc_window_max) and snapshotted in on_release for the length
  # check. We want the peak across the whole beep, not just whatever
  # value happened to be live when the falling edge fired.
  - id: airfryer_beep_zc_peak
    type: float
    restore_value: no
    initial_value: "0.0"
  # Rising-edge timestamp captured by binary_sensor.airfryer_beep
  # on_press. Compared against the current time on on_release to
  # measure how long the binary stayed on - the user's airfryer beeps
  # for ~0.25 s, so anything outside the 50..450 ms band on the binary
  # is rejected as "not airfryer-shaped".
  - id: beep_rise_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Last *valid* (length-passed, gap-passed) beep timestamp - used by
  # the gap validator to decide whether a new beep extends the running
  # pattern or starts a fresh count.
  - id: last_valid_beep_ms
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # Low-threshold edge counter. The data path is:
  #   binary_sensor.mic_low_beep flips on whenever mic_peak_value >
  #   MIC_LOW_BEEP_THRESH (small fixed value just above ambient). Its
  #   on_press handler bumps mic_low_thresh_edges by 1 - so each rising
  #   edge of the low threshold counts as "one beep heard". The mic
  #   sample script snapshots this counter at start and reports the diff
  #   at the end, giving the user a beep-count for the listen window
  #   independent of whatever airfryer_beep_threshold is currently set
  #   to. This lets you see "AF3b 0077" = "3 beeps detected, peak 77",
  #   so even when the air fryer is too quiet for the main detector you
  #   can confirm the pattern is reaching the mic.
  - id: mic_low_thresh_edges
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: mic_low_thresh_edges_at_start
    type: unsigned long
    restore_value: no
    initial_value: "0"
  # User-controlled mic capture preference, persisted across reboots. The
  # template switch reads/writes this; on_boot reads it to decide whether
  # to start the mic. We can't auto-fire turn_on_action on the switch
  # because that runs during the switch's own setup() - before the I2S
  # task is built - and id(mic).start() asserts on a null semaphore.
  - id: mic_capture_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  # Pattern detector for airfryer beeps. The fryer does ~3 short
  # (~0.25 s) beeps spaced ~3 s apart, so a single loud spike is not
  # enough - the action only fires after binary_sensor.airfryer_beep
  # delivers REQUIRED_BEEPS rising edges that ALSO each pass a length
  # filter (50..450 ms on-time, see binary_sensor.airfryer_beep
  # on_release) and a gap filter (rising-edge gap 2..4 s). beep_rise_ms
  # captures each rising edge for length measurement; last_valid_beep_ms
  # tracks only edges that have already passed the length filter, so
  # the gap matcher's count is based on real candidate beeps rather
  # than every spike that broke the threshold.
  - id: beep_pattern_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: should_fire_airfryer
    type: bool
    restore_value: no
    initial_value: "false"
  # When the user presses Button 5 we want the calendar screen to actually
  # appear (even with no events), instead of being immediately rewritten to
  # the manifold by the auto-skip rule. force_calendar_until is the millis()
  # deadline up to which the skip logic must respect SCREEN_CALENDAR.
  - id: force_calendar_until
    type: unsigned long
    restore_value: no
    initial_value: "0"

# Shared script for the air-fryer beep action so both the (auto) binary_sensor
# trigger and the HA "Test Airfryer Beep" button run identical logic.
script:
  - id: trigger_airfryer_beep_action
    then:
      # Show an on-device feedback overlay for the duration of the test
      # so the "Test Airfryer Beep" HA button has visible confirmation -
      # the display shows "AFry tSt" while the floodlight pulses green
      # and then the overlay clears as the floodlight is restored.
      #
      # Snapshotting:
      #  * scene.create captures the floodlight's CURRENT colour and
      #    brightness so a follow-up scene.turn_on restores them after
      #    the green flash. HA's scene snapshot is reliable for the
      #    "on" case but unreliable about putting an OFF light back to
      #    off (some lights latch on when re-targeted). To work around
      #    that, we ALSO sample the live light.led_flood_light state
      #    via the led_flood_light_state text_sensor and, if it was
      #    "off" when the action fired, explicitly light.turn_off after
      #    the flash instead of relying on scene.turn_on.
      #
      # Colour:
      #  * `rgb_color: '[0,255,0]'` worked for some lights but the
      #    user's floodlight was getting brightness-only, never going
      #    green. Using `color_name: green` (which is what the existing
      #    minidisplay button colour palette uses on the same hardware
      #    family) is the format that's actually known to apply. We
      #    also set `brightness_pct: '100'` so the green is unambiguous
      #    and bright regardless of whatever level the light was at.
      - lambda: |-
          id(feedback_text) = std::string("AFry tSt");
          id(feedback_until) = millis() + 2500;
          id(floodlight_was_on) = (id(led_flood_light_state).has_state() &&
                                   id(led_flood_light_state).state == "on");
          ESP_LOGI("airfryer",
                   "Beep action firing - flashing floodlight green for 5 s (was_on=%d, last_state=%s)",
                   id(floodlight_was_on),
                   id(led_flood_light_state).has_state() ? id(led_flood_light_state).state.c_str() : "<unknown>");
      - homeassistant.service:
          service: scene.create
          data:
            scene_id: airfryer_floodlight_snapshot
            snapshot_entities: light.led_flood_light
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.led_flood_light
            color_name: green
            brightness_pct: "100"
      # 5 s flash (was 2 s). Long enough to actually catch the user's
      # eye whether they're in the kitchen, the lounge or upstairs and
      # also long enough to overlap the snake-timer "fireworks" ending
      # which fires this same action.
      - delay: 5s
      # Restore: only scene.turn_on if the light was actually on before -
      # otherwise force it back off so we don't leave it lit when it
      # had been off when the action started.
      - if:
          condition:
            lambda: 'return id(floodlight_was_on);'
          then:
            - homeassistant.service:
                service: scene.turn_on
                data:
                  entity_id: scene.airfryer_floodlight_snapshot
            - lambda: |-
                ESP_LOGI("airfryer", "Floodlight was on - restored via scene.turn_on");
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.led_flood_light
            - lambda: |-
                ESP_LOGI("airfryer", "Floodlight was off - forced back off");
      - homeassistant.service:
          service: notify.mobile_app
          data:
            message: "Airfryer is beeping! Check for shaking reminder."

  # Long-press detection scripts. These fire WHILE the button is still held,
  # not on release - which means they don't depend on the TM1638's polling
  # rate accurately measuring how long a key was down. mode: restart means
  # a quick repeat press cancels any in-flight check so we never get a
  # stale long-press triggering after a tap.
  #
  # Contract:
  #  * on_press of buttonX sets press_start_bX = millis() and executes
  #    long_press_bX.
  #  * After 800 ms the script re-checks the binary sensor; if it's still
  #    pressed the long-press action runs and press_start_bX is reset to 0
  #    (the "long-press handled" sentinel).
  #  * on_release inspects press_start_bX: if 0, the long press has already
  #    been handled and the short-press path is skipped.
  - id: long_press_b1
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_1
          then:
            - lambda: |-
                ESP_LOGI("button", "B1 long-press fired (held >= 800 ms)");
                id(press_start_b1) = 0;
                id(feedback_text) = std::string("Liv FuLL");
                id(feedback_until) = millis() + 3000;
            - homeassistant.service:
                service: light.turn_on
                data:
                  area_id: living_room
                  brightness_pct: "100"
                  color_temp_kelvin: "4000"
  - id: long_press_b2
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_2
          then:
            - lambda: |-
                ESP_LOGI("button", "B2 long-press fired (held >= 800 ms)");
                id(press_start_b2) = 0;
                id(feedback_text) = std::string("Bio FuLL");
                id(feedback_until) = millis() + 3000;
            - homeassistant.service:
                service: light.turn_on
                data:
                  area_id: bio
                  brightness_pct: "100"
                  color_temp_kelvin: "4000"
  - id: long_press_b3
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_3
          then:
            - lambda: |-
                ESP_LOGI("button", "B3 long-press fired (held >= 800 ms)");
                id(press_start_b3) = 0;
                id(feedback_text) = std::string("BedrFuLL");
                id(feedback_until) = millis() + 3000;
            - homeassistant.service:
                service: light.turn_on
                data:
                  area_id: bedroom
                  brightness_pct: "100"
                  color_temp_kelvin: "4000"
  - id: long_press_b4
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_4
          then:
            - lambda: |-
                ESP_LOGI("button", "B4 long-press fired (held >= 800 ms)");
                id(press_start_b4) = 0;
                id(feedback_text) = std::string("Par FuLL");
                id(feedback_until) = millis() + 3000;
            - homeassistant.service:
                service: light.turn_on
                data:
                  area_id: parent_s_bedroom
                  brightness_pct: "100"
                  color_temp_kelvin: "4000"
  - id: long_press_b6
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_6
          then:
            - lambda: |-
                ESP_LOGI("button", "B6 long-press fired - hot water boost ON");
                id(press_start_b6) = 0;
                id(current_screen) = 1;
                id(last_screen_change) = millis();
                id(feedback_text) = std::string("hot ON ");
                id(feedback_until) = millis() + 3000;
            - homeassistant.service:
                service: input_button.press
                data:
                  entity_id: input_button.hot_water_boost_2h
  - id: long_press_b7
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_7
          then:
            - lambda: |-
                ESP_LOGI("button", "B7 long-press fired - Lily -1");
                id(press_start_b7) = 0;
                if (id(lily_pouch_count) >= 1.0f) {
                  id(lily_pouch_count) -= 1.0f;
                } else {
                  id(lily_pouch_count) = 0.0f;
                }
                id(lily_display_until) = millis() + 4000;
                ESP_LOGI("lily", "Count now %.1f pouches", id(lily_pouch_count));
            - homeassistant.service:
                service: input_number.set_value
                data:
                  entity_id: input_number.lily_pouch_count
                  value: !lambda 'return id(lily_pouch_count);'
  - id: long_press_b8
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_8
          then:
            - lambda: |-
                ESP_LOGI("button", "B8 long-press fired (held >= 800 ms)");
                id(press_start_b8) = 0;
                int n = (int) id(notification_ids).size();
                int idx = id(current_notification_index);
                if (n <= 0 || idx < 0 || idx >= n) {
                  id(feedback_text) = std::string("noteNONE");
                  id(feedback_until) = millis() + 2000;
                } else {
                  id(feedback_text) = std::string("noteDIS ");
                  id(feedback_until) = millis() + 2500;
                }
            - if:
                condition:
                  lambda: |-
                    int n = (int) id(notification_ids).size();
                    int idx = id(current_notification_index);
                    return n > 0 && idx >= 0 && idx < n;
                then:
                  - homeassistant.service:
                      service: persistent_notification.dismiss
                      data:
                        notification_id: !lambda |-
                          int idx = id(current_notification_index);
                          if (idx < 0 || idx >= (int) id(notification_ids).size()) {
                            return std::string("");
                          }
                          return id(notification_ids)[idx];

  # Long-press of Button 5: enter "duration select" mode for SNAKE_SELECT_MS.
  # While in that window any short press on buttons 1..8 immediately starts
  # an N-minute snake timer. If no button is pressed before the window
  # closes the firmware silently exits select mode and nothing happens.
  # Long-pressing while a timer is already running cancels it.
  - id: long_press_b5
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            binary_sensor.is_on: button_5
          then:
            - lambda: |-
                static const uint32_t SNAKE_SELECT_MS = 5000;
                id(press_start_b5) = 0;
                if (id(snake_timer_active)) {
                  id(snake_timer_active) = false;
                  id(snake_select_until_ms) = 0;
                  ESP_LOGI("snake", "Snake timer cancelled by long-press");
                  id(feedback_text) = std::string("snakeoff");
                  id(feedback_until) = millis() + 2000;
                } else {
                  id(snake_select_until_ms) = millis() + SNAKE_SELECT_MS;
                  ESP_LOGI("snake", "Select-mode armed for %lu ms - press 1-8 for N minutes",
                           (unsigned long) SNAKE_SELECT_MS);
                }

  # Helper script: start an N-minute snake timer. Called from each of
  # buttons 1..8 when they fire during the select window. The minute count
  # is clamped to 1..8 so accidental races can't underflow / wrap.
  - id: arm_snake_timer
    mode: restart
    parameters:
      mins: int
    then:
      - lambda: |-
          int m = mins;
          if (m < 1) m = 1;
          if (m > 8) m = 8;
          const uint32_t now_ms = millis();
          id(snake_timer_active) = true;
          id(snake_timer_start_ms) = now_ms;
          id(snake_timer_minutes) = m;
          id(snake_select_until_ms) = 0;
          // Wipe the previous timer's body trail so the new snake
          // starts fresh with no leftover segments visible.
          id(snake_history).clear();
          id(snake_last_head_packed) = 0xFFFF;
          // Reset state machine: the very first display lambda call
          // after arming will see snake_loop_idx==-1 and step it to 0
          // immediately (cell 0 = digit 0 '_'), which is what makes
          // the snake APPEAR straight away rather than "after 150 ms".
          id(snake_loop_idx) = -1;
          id(snake_loop_last_step_ms) = now_ms;
          id(snake_in_grab) = false;
          id(snake_grab_idx) = 0;
          id(snake_grab_last_step_ms) = 0;
          id(snake_next_egg) = 0;
          id(snake_done_at_ms) = 0;
          char buf[12];
          snprintf(buf, sizeof(buf), "snake %dM", m);
          id(feedback_text) = std::string(buf);
          id(feedback_until) = now_ms + 1500;
          ESP_LOGI("snake", "Snake timer armed for %d minute(s)", m);

  # 10-second microphone "listen" session used by the HA "Sample Airfryer
  # Beep" and "Microphone Self-Test" buttons. The display shows a live
  # countdown overlay so the user knows when to make noise; once finished
  # the maximum peak is shown for ~6 s and logged so a sensible
  # airfryer_beep_threshold can be picked. `mode: restart` cancels any
  # previous run so the user can chain presses without overlap.
  - id: mic_sample_action
    mode: restart
    then:
      - lambda: |-
          id(mic_samples_total) = 0;
          id(mic_peak_session) = 0.0f;
          id(mic_zc_window_max) = 0.0f;
          id(mic_tone_4k_window_max) = 0.0f;
          // Snapshot the running low-thresh edge counter so we can report
          // "edges during this session" without owning the counter itself.
          // mic_low_beep keeps incrementing it whenever the mic crosses
          // MIC_LOW_BEEP_THRESH; we just compute the diff at the end.
          id(mic_low_thresh_edges_at_start) = id(mic_low_thresh_edges);
          if (!id(mic).is_running()) {
            id(mic).start();
          }
          ESP_LOGI("mic", "--- Mic sample session START (10 s) ---");
          ESP_LOGI("mic", "  thresholds: peak=%.0f zc=%.2f tone4k=%.3f",
                   id(airfryer_beep_threshold), id(airfryer_zc_threshold),
                   id(airfryer_tone_4k_threshold));
          ESP_LOGI("mic", "  airfryer_detect_enabled = %s",
                   id(airfryer_detect_enabled) ? "YES" : "NO (binary_sensor blocked)");
      - repeat:
          count: 10
          then:
            - lambda: |-
                int s_left = 10 - (int) iteration;
                int beeps = (int) (id(mic_low_thresh_edges) -
                                   id(mic_low_thresh_edges_at_start));
                if (beeps < 0) beeps = 0;
                char buf[16];
                // Live-feedback shows "LISt N b" so the user can see the
                // count climb in real time as each beep is heard.
                snprintf(buf, sizeof(buf), "LISt%d %d",
                         s_left, beeps > 9 ? 9 : beeps);
                id(feedback_text) = std::string(buf);
                id(feedback_until) = millis() + 1500;
                ESP_LOGI("mic",
                         "  t-%2ds  peak=%.0f  zc=%.2f  zc_max=%.2f  tone=%.3f  tone_max=%.3f  edges=%d",
                         s_left,
                         id(mic_peak_value),
                         id(mic_zc_value),
                         id(mic_zc_window_max),
                         id(mic_tone_4k_value),
                         id(mic_tone_4k_window_max),
                         beeps);
            - delay: 1s
      - lambda: |-
          float peak = id(mic_peak_session);
          unsigned long total = (unsigned long) id(mic_samples_total);
          int beeps = (int) (id(mic_low_thresh_edges) -
                             id(mic_low_thresh_edges_at_start));
          if (beeps < 0) beeps = 0;
          int beeps_disp = beeps > 9 ? 9 : beeps;
          int peak_disp = (int) peak;
          if (peak_disp > 9999) peak_disp = 9999;
          char buf[16];
          if (total == 0) {
            // No samples = wiring/power problem.
            snprintf(buf, sizeof(buf), "AF NONE ");
            ESP_LOGW("mic", "Sample finished: NO samples received - check wiring/power!");
          } else {
            // Always pack both numbers into the result so the user can
            // tell at a glance "did the mic hear the rhythm? how loud?".
            // Format is "AFNb PPPP" (8 chars) - N=beep count (low-thresh),
            // PPPP=peak amplitude (right-aligned, clamped to 9999).
            //
            // Reading the result:
            //   AF0b 0012  - heard nothing distinct (just ambient).
            //                Peak 12 = silent room. Mic is alive but no
            //                sound made it through. Move closer or louder.
            //   AF3b 0077  - heard 3 beeps in 10 s, but each peaked at
            //                only 77. Lower input_number.airfryer_beep_threshold
            //                below 77 (suggested ~peak * 0.7) and detection
            //                will catch this rhythm.
            //   AF3b 0500  - heard 3 beeps, peak 500. Already above the
            //                100 default threshold, so detection should fire
            //                for this airfryer pattern.
            snprintf(buf, sizeof(buf), "AF%db%4d", beeps_disp, peak_disp);
            const float zc_max = id(mic_zc_window_max);
            ESP_LOGI("mic",
                     "Sample finished: peak=%.0f  edges=%d  zc_max=%.2f  peak_thresh=%.0f  zc_thresh=%.2f",
                     peak, beeps, zc_max,
                     id(airfryer_beep_threshold),
                     id(airfryer_zc_threshold));
            const bool peak_ok = peak >= id(airfryer_beep_threshold);
            const bool zc_ok   = zc_max >= id(airfryer_zc_threshold);
            const bool detect_on = id(airfryer_detect_enabled);
            if (!detect_on) {
              ESP_LOGI("mic", "  -> NOTE: airfryer detection switch is OFF, so live detection is dormant.");
              ESP_LOGI("mic", "     Turn on switch.airfryer_detection in HA when actually frying.");
            }
            if (peak_ok && zc_ok && beeps >= 3) {
              ESP_LOGI("mic", "  -> peak/zc both pass AND >=3 edges - detector would fire (assuming switch on)");
            } else if (!peak_ok && beeps >= 3) {
              ESP_LOGI("mic", "  -> mic heard the rhythm but peak below threshold (%.0f < %.0f).",
                       peak, id(airfryer_beep_threshold));
              ESP_LOGI("mic", "     Lower input_number.airfryer_beep_threshold to ~%.0f", peak * 0.7f);
            } else if (!zc_ok && beeps >= 3) {
              ESP_LOGI("mic", "  -> mic heard the rhythm but zc_max below threshold (%.2f < %.2f).",
                       zc_max, id(airfryer_zc_threshold));
              ESP_LOGI("mic", "     This sound is too low-pitched to be the airfryer beep.");
            } else if (beeps == 0) {
              ESP_LOGI("mic", "  -> no beeps registered above MIC_LOW_BEEP_THRESH (50).");
              ESP_LOGI("mic", "     The air fryer is too quiet for the mic at this distance.");
            } else {
              ESP_LOGI("mic", "  -> only %d beep edge(s) inside 10 s. Need 3 for the pattern to match.", beeps);
            }
          }
          id(feedback_text) = std::string(buf);
          id(feedback_until) = millis() + 10000;

binary_sensor:

  # Low-threshold beep edge counter. Used by mic_sample_action to count
  # how many beeps were heard during the listen window even when they
  # are too quiet to trip the main airfryer_beep_threshold. The fixed
  # MIC_LOW_BEEP_THRESH (50) is comfortably above ambient kitchen
  # noise (~5..15 RMS / ~20..40 peak) but well below most beeps, so
  # rising-edge counts here approximate "real beeps the mic heard"
  # without needing a calibration pass. delayed_on/off mirror the main
  # sensor so the same short transient doesn't double-count.
  - platform: template
    name: "Mic Low Beep"
    id: mic_low_beep
    internal: true
    lambda: |-
      static const float MIC_LOW_BEEP_THRESH = 50.0f;
      if (!id(mic).is_running()) return false;
      return id(mic_peak_value) > MIC_LOW_BEEP_THRESH;
    filters:
      - delayed_on: 100ms
      - delayed_off: 800ms
    on_press:
      - lambda: |-
          id(mic_low_thresh_edges) += 1;
          ESP_LOGD("mic", "Low-thresh beep edge #%lu (peak=%.0f)",
                   (unsigned long) id(mic_low_thresh_edges),
                   id(mic_peak_value));

  - platform: template
    name: "Airfryer Beep"
    id: airfryer_beep
    # The airfryer detector is gated on FOUR independent conditions:
    #
    #   1. Master switch (airfryer_detect_enabled). Defaults OFF, user
    #      flips ON in HA when actually using the air fryer. With this
    #      OFF the binary stays false no matter what.
    #   2. Mic running. Belt-and-braces - we shouldn't be polling the
    #      switch with the mic stopped, but ESPHome polls this lambda
    #      regardless.
    #   3. Peak amplitude > airfryer_beep_threshold (loud enough).
    #   4. Zero-crossing ratio > airfryer_zc_threshold (high-pitched
    #      enough). This rejects voice, footsteps, drawer slams, and
    #      fridge hum which all sit at 0..0.1 ZC/sample - the airfryer
    #      beep sits at 0.4..0.5.
    #
    # All four MUST be simultaneously true for the binary to go on.
    # Length and cadence filtering live in on_release as before.
    lambda: |-
      if (!id(mic).is_running()) return false;
      if (!id(airfryer_detect_enabled)) return false;
      if (id(mic_peak_value) <= id(airfryer_beep_threshold)) return false;
      // Pass if EITHER high zero-crossing rate OR strong 4 kHz lag-4
      // correlation - real fryer beeps usually satisfy both, but a
      // distant mic may only show one strongly.
      const bool zc_ok = id(mic_zc_value) >= id(airfryer_zc_threshold);
      const bool tone_ok = id(mic_tone_4k_value) >= id(airfryer_tone_4k_threshold);
      if (!zc_ok && !tone_ok) return false;
      return true;
    filters:
      # Tight debouncing so we can MEASURE the beep's actual length on
      # the falling edge:
      #
      # * delayed_on  100 ms - the user's airfryer beep is ~250 ms, so
      #   100 ms of sustained-loud-and-high-pitched is plenty to qualify
      #   as a candidate while still ignoring the very shortest impulse
      #   spikes (sub 100 ms cupboard slam, plate clink ring-down).
      # * delayed_off  50 ms - just enough to debounce the trailing edge
      #   without padding the binary's on-time. With this short tail we
      #   can actually distinguish a 250 ms beep (binary on for ~200 ms)
      #   from a sustained 1 s noise (binary on for ~950 ms) on the
      #   falling-edge handler.
      - delayed_on: 100ms
      - delayed_off: 50ms
    # Three-stage matcher (length / frequency / cadence):
    #
    # 1. on_press records the rising-edge timestamp and resets the
    #    per-beep ZC peak tracker.
    # 2. on_release measures HOW LONG the binary stayed on. If
    #    duration is OUTSIDE the airfryer-beep length band (50..450 ms)
    #    we silently reject the beep - it was either too short (impulse)
    #    or too long (sustained voice / hum).
    # 3. on_release ALSO checks the peak ZC seen during the beep.
    #    Even if the rising-edge passed the live ZC gate, we re-check
    #    the WHOLE beep's peak to catch transient false starts.
    # 4. Cadence filter: rising-edge gap from previous *valid* beep
    #    must fall in 2..4 s (the airfryer's ~3 s cadence) and we need
    #    AIRFRYER_REQUIRED_BEEPS beeps inside AIRFRYER_PATTERN_WINDOW_MS.
    on_press:
      - lambda: |-
          id(beep_rise_ms) = millis();
          id(airfryer_beep_zc_peak) = id(mic_zc_value);
          id(mic_zc_window_max) = id(mic_zc_value);
          id(mic_tone_4k_window_max) = id(mic_tone_4k_value);
          ESP_LOGD("airfryer",
                   "Beep rose at t=%lu (peak=%.0f, zc=%.2f)",
                   (unsigned long) id(beep_rise_ms),
                   id(mic_peak_value),
                   id(mic_zc_value));
    on_release:
      - lambda: |-
          static const uint32_t AIRFRYER_MIN_BEEP_MS         =     40;
          static const uint32_t AIRFRYER_MAX_BEEP_MS         =    600;
          static const uint32_t AIRFRYER_PATTERN_WINDOW_MS   =  16000;
          static const uint32_t AIRFRYER_MIN_GAP_MS          =   1500;
          static const uint32_t AIRFRYER_MAX_GAP_MS          =   5500;
          static const int      AIRFRYER_REQUIRED_BEEPS      =      2;
          const uint32_t now_ms = millis();
          const uint32_t duration_ms = now_ms - id(beep_rise_ms);
          // mic_zc_window_max has been tracking the MAX ZC ratio across
          // every chunk since on_press reset it - that's the value we
          // care about ("did this beep ever sound high-pitched?")
          const float zc_peak = id(mic_zc_window_max);
          const float tone_peak = id(mic_tone_4k_window_max);
          id(airfryer_beep_zc_peak) = zc_peak;
          // ---- Stage 1: length filter --------------------------------
          if (duration_ms < AIRFRYER_MIN_BEEP_MS ||
              duration_ms > AIRFRYER_MAX_BEEP_MS) {
            ESP_LOGI("airfryer",
                     "Beep rejected: length %lu ms outside [%lu..%lu] band (zc_peak=%.2f) - not airfryer-shaped",
                     (unsigned long) duration_ms,
                     (unsigned long) AIRFRYER_MIN_BEEP_MS,
                     (unsigned long) AIRFRYER_MAX_BEEP_MS,
                     zc_peak);
            id(should_fire_airfryer) = false;
            return;
          }
          // ---- Stage 2: pitch filter (ZC OR 4 kHz tone metric) -------
          const bool zc_ok = zc_peak >= id(airfryer_zc_threshold);
          const bool tone_ok = tone_peak >= id(airfryer_tone_4k_threshold);
          if (!zc_ok && !tone_ok) {
            ESP_LOGI("airfryer",
                     "Beep rejected: zc_peak=%.2f tone4k=%.3f (need zc>=%.2f or tone>=%.3f) len=%lu ms",
                     zc_peak, tone_peak,
                     id(airfryer_zc_threshold), id(airfryer_tone_4k_threshold),
                     (unsigned long) duration_ms);
            id(should_fire_airfryer) = false;
            return;
          }
          // ---- Stage 3: cadence (gap) validation ---------------------
          const uint32_t gap_ms = id(beep_rise_ms) - id(last_valid_beep_ms);
          const char *reason;
          if (id(beep_pattern_count) == 0 || gap_ms > AIRFRYER_PATTERN_WINDOW_MS) {
            id(beep_pattern_count) = 1;
            reason = "first/window-expired";
          } else if (gap_ms < AIRFRYER_MIN_GAP_MS) {
            id(beep_pattern_count) = 1;
            reason = "gap too short - probably echo or rapid noise";
          } else if (gap_ms > AIRFRYER_MAX_GAP_MS) {
            id(beep_pattern_count) = 1;
            reason = "gap too long - cadence broken";
          } else {
            id(beep_pattern_count) += 1;
            reason = "valid airfryer cadence";
          }
          id(last_valid_beep_ms) = id(beep_rise_ms);
          ESP_LOGI("airfryer",
                   "Beep candidate: len=%lu ms, zc=%.2f tone4k=%.3f count=%d/%d (gap=%lu ms, %s)",
                   (unsigned long) duration_ms,
                   zc_peak, tone_peak,
                   id(beep_pattern_count),
                   AIRFRYER_REQUIRED_BEEPS,
                   (unsigned long) gap_ms,
                   reason);
          if (id(beep_pattern_count) >= AIRFRYER_REQUIRED_BEEPS) {
            id(beep_pattern_count) = 0;
            id(should_fire_airfryer) = true;
            ESP_LOGI("airfryer", "Pattern matched - firing trigger");
          } else {
            id(should_fire_airfryer) = false;
          }
      - if:
          condition:
            lambda: 'return id(should_fire_airfryer);'
          then:
            - script.execute: trigger_airfryer_beep_action

  # Home Assistant binary sensors/switches
  - platform: homeassistant
    id: hot_water
    entity_id: switch.smart_plug_2_socket_1
    internal: true
