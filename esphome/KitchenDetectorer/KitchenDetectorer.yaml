esphome:
  name: kitchen-detectorer
  friendly_name: Kitchen Detectorer
  # Install a microphone data-callback at boot that streams samples into
  # globals so the rest of the config (sensors, beep detection, on-screen
  # level meter) has a single source of truth without an external .h file.
  on_boot:
    - priority: 100
      then:
        - lambda: |-
            if (id(mic_callback_installed)) return;
            id(mic_callback_installed) = true;
            // INMP441 -> 32-bit MSB-aligned slots. Each sample is 4 bytes
            // little-endian; the upper 24 bits are the audio data and the
            // lower 8 bits are zero. Shifting right 16 gives an int16_t
            // equivalent so the existing threshold (~5000) still applies.
            //
            // For diagnosing dead-mic / wrong-channel issues, the first 5
            // chunks log a hex dump of the first 16 bytes. If they're all
            // 00 -> wiring or wrong channel; if there's structure but
            // values are tiny -> bits_per_sample mismatch; if values move
            // with sound -> mic is alive.
            id(mic).add_data_callback([](const std::vector<uint8_t> &data) {
              static int debug_chunks_remaining = 5;
              if (debug_chunks_remaining > 0 && data.size() >= 16) {
                debug_chunks_remaining--;
                ESP_LOGI("mic_raw",
                         "chunk size=%u  bytes[0..15]=%02X %02X %02X %02X "
                         "%02X %02X %02X %02X %02X %02X %02X %02X "
                         "%02X %02X %02X %02X",
                         (unsigned) data.size(),
                         data[0], data[1], data[2], data[3],
                         data[4], data[5], data[6], data[7],
                         data[8], data[9], data[10], data[11],
                         data[12], data[13], data[14], data[15]);
              }
              const size_t num_samples = data.size() / sizeof(int32_t);
              if (num_samples == 0) return;
              const int32_t *samples32 =
                  reinterpret_cast<const int32_t *>(data.data());
              int32_t peak = 0;
              double sum_sq = 0.0;
              // Zero-crossing counting gives us a cheap frequency proxy.
              // The user's airfryer beep is ~3-4 kHz (high-pitched chirp),
              // which at our 16 kHz sample rate produces ~0.4..0.5 sign
              // changes per sample. Voice (~150-300 Hz), thuds, drawer
              // slams, and fridge compressor hum all sit below 0.1.
              // We track the prev_sample sign across chunks via the
              // local last_sign static so a chunk boundary doesn't lose
              // a zero-crossing.
              static int last_sign = 0;
              size_t zero_crossings = 0;
              for (size_t i = 0; i < num_samples; i++) {
                const int32_t s = samples32[i] >> 16;
                const int32_t a = s >= 0 ? s : -s;
                if (a > peak) peak = a;
                sum_sq += (double) s * (double) s;
                const int sign = (s > 0) ? 1 : (s < 0 ? -1 : 0);
                if (sign != 0 && last_sign != 0 && sign != last_sign) {
                  zero_crossings++;
                }
                if (sign != 0) last_sign = sign;
              }
              const float rms =
                  (float) std::sqrt(sum_sq / (double) num_samples);
              const float zc_ratio = (float) zero_crossings
                                   / (float) num_samples;
              id(mic_peak_value) = (float) peak;
              id(mic_rms_value) = rms;
              id(mic_zc_value) = zc_ratio;
              if ((float) peak > id(mic_peak_window)) {
                id(mic_peak_window) = (float) peak;
              }
              if ((float) peak > id(mic_peak_session)) {
                id(mic_peak_session) = (float) peak;
              }
              if (zc_ratio > id(mic_zc_window_max)) {
                id(mic_zc_window_max) = zc_ratio;
              }
              // Lag-4 correlation: at 16 kHz sample rate a ~4 kHz tone
              // repeats every 4 samples, so in-phase samples four apart
              // correlate strongly. Normalise by peak^2 so quiet chunks
              // don't false-trigger. The user measured the airfryer beep
              // at 4000 Hz - this is more reliable than ZC alone when the
              // mic is distant or reflections dull the pitch.
              float tone4k = 0.0f;
              if (num_samples > 4 && peak > 0) {
                for (size_t i = 4; i < num_samples; i++) {
                  const float a = (float) (samples32[i] >> 16);
                  const float b = (float) (samples32[i - 4] >> 16);
                  tone4k += a * b;
                }
                tone4k /= ((float) peak * (float) peak * (float) num_samples);
              }
              id(mic_tone_4k_value) = tone4k;
              if (tone4k > id(mic_tone_4k_window_max)) {
                id(mic_tone_4k_window_max) = tone4k;
              }
              id(mic_samples_total) += num_samples;
            });
            ESP_LOGI("mic", "Microphone data callback installed (32-bit slot, channel=left)");
    - priority: -100
      then:
        # 2 s lets the i2s_audio task fully come up. Calling
        # id(mic).start() any earlier crashes with a null-semaphore assert
        # in xQueueSemaphoreTake (the I2S read task isn't built yet).
        - delay: 2s
        - if:
            condition:
              lambda: 'return id(mic_capture_enabled);'
            then:
              - lambda: |-
                  if (!id(mic).is_running()) id(mic).start();
              - switch.template.publish:
                  id: mic_capture_switch
                  state: ON
              - logger.log: "Microphone capture started (continuous)"
            else:
              - switch.template.publish:
                  id: mic_capture_switch
                  state: OFF
              - logger.log: "Microphone capture left stopped (user preference)"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: false
  # Self-recover from prolonged WiFi/AP outages. Without this the device can
  # appear "stuck" on whatever screen was last drawn until manually rebooted.
  reboot_timeout: 10min
  manual_ip:
    static_ip: 192.168.1.34
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: !secret kitchendetectorer_encryption_key
  # Reboot if Home Assistant API is unreachable for 15min - prevents the
  # display from staying frozen on stale data after long disconnects.
  reboot_timeout: 15min

ota:
  platform: esphome
  password: !secret kitchendetectorer_ota_password

# GPIO pin to power the microphone
output:
  - platform: gpio
    pin: GPIO4
    id: mic_power
    inverted: false

switch:
  - platform: output
    name: "Microphone Power"
    output: mic_power
    id: mic_power_switch
    restore_mode: ALWAYS_ON
    internal: true

  # HA-controllable mic capture switch. The actual start happens in
  # on_boot priority -100 (after the i2s_audio task is built); this switch
  # only updates the persisted preference and starts/stops the mic when
  # toggled at runtime. restore_mode: DISABLED is essential - the previous
  # RESTORE_DEFAULT_ON fired turn_on_action during the switch's own setup,
  # which crashed because the mic component wasn't ready yet.
  - platform: template
    name: "Microphone Capture"
    id: mic_capture_switch
    optimistic: true
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          id(mic_capture_enabled) = true;
          if (!id(mic).is_running()) id(mic).start();
      - logger.log: "Microphone capture started"
    turn_off_action:
      - lambda: |-
          id(mic_capture_enabled) = false;
          if (id(mic).is_running()) id(mic).stop();
      - logger.log: "Microphone capture stopped"

  # Airfryer auto-detection master switch. Defaults ON after the 4 kHz
  # tone-metric rework; turn OFF in HA if you get false positives. With
  # this switch OFF, binary_sensor.airfryer_beep ALWAYS reads false. The "Test
  # Airfryer Beep" HA button bypasses the binary sensor entirely
  # (calls trigger_airfryer_beep_action directly), so the test workflow
  # still works regardless of switch state.
  - platform: template
    name: "Airfryer Detection"
    id: airfryer_detect_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:radar"
    turn_on_action:
      - lambda: |-
          id(airfryer_detect_enabled) = true;
          id(beep_pattern_count) = 0;
          id(last_valid_beep_ms) = 0;
      - logger.log: "Airfryer detection ENABLED"
    turn_off_action:
      - lambda: |-
          id(airfryer_detect_enabled) = false;
          id(beep_pattern_count) = 0;
      - logger.log: "Airfryer detection DISABLED"

i2s_audio:
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14

microphone:
  platform: i2s_audio
  id: mic
  i2s_din_pin: GPIO32
  adc_type: external
  sample_rate: 16000
  # INMP441-specific:
  #  * The chip outputs 24-bit signed PCM MSB-aligned in a 32-bit slot.
  #    Reading 16-bit slots returns zeros because the chip drives the
  #    upper portion of a wider slot we weren't sampling.
  #  * The L/R pin selects which I2S slot the chip drives. Wired to GND
  #    -> "left"; wired to 3V3 -> "right". We default to left here; if
  #    you've wired L/R to 3V3, change this to "right" and the data will
  #    appear (this is the most common cause of "mic gives 0").
  bits_per_sample: 32bit
  channel: left
  use_apll: true

# Time component for date/time display.
# Stockholm timezone is required so localtime/mktime in the lambdas below
# correctly translate calendar event ISO timestamps to/from local time.
time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Europe/Stockholm
    on_time:
      # Lily pouch counter resets at local midnight (feeding log for
      # "little and often" pouches starts fresh each day).
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: |-
              id(lily_pouch_count) = 0.0f;
              id(lily_last_feed_ms) = 0;
              ESP_LOGI("lily", "Midnight reset - pouch count cleared");
          - homeassistant.service:
              service: input_number.set_value
              data:
                entity_id: input_number.lily_pouch_count
                value: "0"
          - homeassistant.service:
              service: input_datetime.set_datetime
              data:
                entity_id: input_datetime.lily_last_feed
                datetime: "1970-01-01 00:00:00"

sensor:
  - platform: ultrasonic
    trigger_pin: GPIO12
    echo_pin: GPIO13
    name: "Espresso Bean Level"
    unit_of_measurement: "cm"
    update_interval: 1s
    accuracy_decimals: 1
    filters:
      # The ultrasonic platform returns distance in metres but the rest of
      # the firmware (and the unit_of_measurement above) treats it as cm,
      # so convert here once. Single source of truth - everywhere else can
      # just read id(espresso_bean_level).state and assume centimetres.
      - lambda: 'return x * 100.0f;'
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
    id: espresso_bean_level
    on_value:
      then:
        - lambda: |-
            // Bean-warning detection. The sensor sits directly above the
            // hopper, so when the beans are full (or just refilled) they
            // can touch it - those readings are unreliable. Likewise a
            // very large distance means the IR cone is missing the bean
            // pile entirely. The reliable "low/empty" band is 5..12 cm:
            //   * < 8 cm  : likely full / sensor touched -> ignore.
            //   * 8..12 cm : low.
            //   * 12..18 cm: nearly / fully empty.
            //   * > 18 cm : unreliable (treat as full).
            // We only flag a warning when the reading stays inside the
            // 8..18 cm band continuously for BEAN_RELIABLE_MS (~10 s),
            // which is the duration of one grind cycle. That filters
            // out transient bean shifts while still raising LED8 when
            // the hopper is genuinely getting empty.
            static const float BEAN_LOW_CM            =  8.0f;
            static const float BEAN_MAX_RELIABLE_CM   = 18.0f;
            static const uint32_t BEAN_RELIABLE_MS    = 10000u;
            const float v = id(espresso_bean_level).state;
            const uint32_t now_ms = millis();
            const bool in_range = (v >= BEAN_LOW_CM && v <= BEAN_MAX_RELIABLE_CM);
            if (in_range) {
              if (id(bean_in_range_since_ms) == 0) {
                id(bean_in_range_since_ms) = now_ms;
                ESP_LOGD("beans", "Reading entered low band (%.1f cm) - timer started", v);
              }
              if (!id(bean_warning_active) &&
                  now_ms - id(bean_in_range_since_ms) >= BEAN_RELIABLE_MS) {
                id(bean_warning_active) = true;
                ESP_LOGI("beans", "Low-bean warning: %.1f cm sustained for %ums",
                         v, (unsigned) (now_ms - id(bean_in_range_since_ms)));
              }
            } else {
              if (id(bean_in_range_since_ms) != 0 || id(bean_warning_active)) {
                ESP_LOGD("beans", "Reading left low band (%.1f cm) - clearing warning", v);
              }
              id(bean_in_range_since_ms) = 0;
              id(bean_warning_active) = false;
            }

  # ----- Microphone level meters -----
  # Both are kept as template sensors so the airfryer / self-test scripts
  # have a single place to log mic activity, but they're `internal: true`
  # because exposing 1 Hz "Changed to <random number>" updates to Home
  # Assistant fills up the activity / history log and isn't useful now
  # that the mic is confirmed working. The driving globals (mic_peak_value
  # / mic_peak_window / mic_rms_value) are still updated by the on_boot
  # data callback and used directly by the airfryer binary_sensor and the
  # mic_sample_action script.
  - platform: template
    name: "Microphone Peak (window)"
    id: mic_peak_sensor
    unit_of_measurement: ""
    accuracy_decimals: 0
    update_interval: 1s
    internal: true
    lambda: |-
      float v = id(mic_peak_window);
      id(mic_peak_window) = 0.0f;
      return v;
  - platform: template
    name: "Microphone RMS"
    id: mic_rms_sensor
    unit_of_measurement: ""
    accuracy_decimals: 1
    update_interval: 1s
    internal: true
    lambda: 'return id(mic_rms_value);'

  # ----- Home Assistant sensors -----
  - platform: homeassistant
    id: bio_temp
    entity_id: sensor.bioofficec3_room_temperature
    internal: true
  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.sam_outside_temperature
    internal: true
  - platform: homeassistant
    id: inside_temp
    entity_id: sensor.t_h_sensor_temperature
    internal: true
  - platform: homeassistant
    id: inside_humidity
    entity_id: sensor.t_h_sensor_humidity
    internal: true
  - platform: homeassistant
    id: power_price
    entity_id: sensor.nordpool_kwh_se4_sek_3_10_025
    internal: true
  - platform: homeassistant
    id: hot_water_boiler_temp
    entity_id: sensor.manifoldtemperature_hot_water_boiler_temp
    internal: true
  - platform: homeassistant
    id: lowest_loop_temp
    entity_id: sensor.manifoldtemperature_lowest_loop_return_temp
    internal: true
  - platform: homeassistant
    id: manifold_air_temp
    entity_id: sensor.manifoldtemperature_air_temp
    internal: true
  - platform: homeassistant
    id: bio_office_current_temp
    entity_id: climate.bio_office_heat
    attribute: current_temperature
    internal: true
  # House thermal model + weather (openweathermap-driven) outputs.
  # Daily max/min come from HA template sensors (see
  # ElectricAutomations/forecast_sensors.yaml). The 4-hour average is
  # written by HouseThermalModel to input_number.forecast_outside_4h.
  - platform: homeassistant
    id: forecast_outside_4h
    entity_id: input_number.forecast_outside_4h
    internal: true
  - platform: homeassistant
    id: forecast_today_max
    entity_id: sensor.forecast_today_max
    internal: true
  - platform: homeassistant
    id: forecast_tonight_min
    entity_id: sensor.forecast_tonight_min
    internal: true
  - platform: homeassistant
    id: sam_target_temp
    entity_id: input_number.sam_desired_temperature
    internal: true
  - platform: homeassistant
    id: lily_pouch_count_ha
    entity_id: input_number.lily_pouch_count
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(lily_pouch_count_ha).has_state()) {
              float v = id(lily_pouch_count_ha).state;
              if (v < 0.0f) v = 0.0f;
              id(lily_pouch_count) = v;
            }
  - platform: homeassistant
    id: lily_last_feed_ha
    entity_id: input_datetime.lily_last_feed
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(lily_last_feed_ha).has_state()) {
              return;
            }
            const std::string raw = id(lily_last_feed_ha).state;
            if (raw.empty() || raw == "unknown" || raw == "unavailable" ||
                raw.find("1970") == 0) {
              id(lily_last_feed_ms) = 0;
              return;
            }
            std::string s = raw;
            for (auto &c : s) {
              if (c == 'T') {
                c = ' ';
              }
            }
            int year = 0, month = 0, day = 0, hour = 0, minute = 0, second = 0;
            if (sscanf(s.c_str(), "%d-%d-%d %d:%d:%d",
                       &year, &month, &day, &hour, &minute, &second) < 3) {
              return;
            }
            auto now_time = id(homeassistant_time).now();
            if (!now_time.is_valid()) {
              return;
            }
            ESPTime feed_time = now_time;
            feed_time.year = year;
            feed_time.month = month;
            feed_time.day_of_month = day;
            feed_time.hour = hour;
            feed_time.minute = minute;
            feed_time.second = second;
            if (!feed_time.is_valid()) {
              return;
            }
            const time_t feed_ts = feed_time.timestamp;
            const time_t now_ts = now_time.timestamp;
            if (feed_ts > now_ts) {
              return;
            }
            const uint32_t ago_ms = (uint32_t) ((now_ts - feed_ts) * 1000LL);
            if (ago_ms <= millis()) {
              id(lily_last_feed_ms) = millis() - ago_ms;
            } else {
              id(lily_last_feed_ms) = millis();
            }
  # Optional HA helper to live-tune the airfryer beep peak threshold without
  # reflashing. Recommended HA config (Configuration > Helpers > Number):
  #   input_number.airfryer_beep_threshold  min 100, max 32000, step 100
  # If the helper isn't present, airfryer_beep_threshold keeps its default
  # initial_value of 5000.
  - platform: homeassistant
    id: airfryer_beep_threshold_ha
    entity_id: input_number.airfryer_beep_threshold
    internal: true
    on_value:
      then:
        - lambda: |-
            float v = id(airfryer_beep_threshold_ha).state;
            if (v > 0.0f) {
              id(airfryer_beep_threshold) = v;
              ESP_LOGI("airfryer", "Beep peak threshold set to %.0f", v);
            }
  # Live-tunable zero-crossing (frequency proxy) threshold. Recommended
  # HA helper:
  #   input_number.airfryer_zc_threshold  min 0.05, max 0.50, step 0.01
  # Higher value = "must be more high-pitched to count". 0.20 is the
  # default (roughly "above ~1.6 kHz tonal"); raise to 0.30 if voice or
  # plate clinks are still slipping through.
  - platform: homeassistant
    id: airfryer_zc_threshold_ha
    entity_id: input_number.airfryer_zc_threshold
    internal: true
    on_value:
      then:
        - lambda: |-
            float v = id(airfryer_zc_threshold_ha).state;
            if (v > 0.0f && v < 1.0f) {
              id(airfryer_zc_threshold) = v;
              ESP_LOGI("airfryer", "Beep ZC threshold set to %.2f", v);
            }

text_sensor:
  - platform: homeassistant
    id: alarm_level_state
    entity_id: input_select.alarm_level
    internal: true
  - platform: homeassistant
    id: bio_office_hvac_state
    entity_id: climate.bio_office_heat
    internal: true
  # Outside-weather text from openweathermap (one of "clear-night",
  # "cloudy", "fog", "lightning", "lightning-rainy", "partlycloudy",
  # "pouring", "rainy", "snowy", "snowy-rainy", "sunny", "windy",
  # "windy-variant", "exceptional"). The forecast screen sanitises and
  # uppercases this into a 6-char abbreviation that scrolls along with
  # the temperatures.
  - platform: homeassistant
    id: openweathermap_condition
    entity_id: sensor.openweathermap_condition
    internal: true
  # Notifications: comma-separated IDs maintained by the MiniDisplay alarm
  # system. The on_value handler parses the CSV into the `notification_ids`
  # vector so Button 8 can dismiss the currently-shown one by ID.
  - platform: homeassistant
    id: notification_ids_csv
    entity_id: input_text.minidisplay_notification_ids
    internal: true
    on_value:
      then:
        - lambda: |-
            // Snapshot the previous IDs+times so we can preserve the HHMM
            // for notifications that are still present, and only stamp
            // brand-new IDs with the current local time.
            std::vector<std::string> old_ids = id(notification_ids);
            std::vector<std::string> old_times = id(notification_times);
            std::string csv = id(notification_ids_csv).state;
            id(notification_ids).clear();
            id(notification_times).clear();
            if (!csv.empty()) {
              size_t start = 0;
              while (start < csv.size()) {
                size_t comma = csv.find(',', start);
                std::string part = (comma == std::string::npos)
                  ? csv.substr(start)
                  : csv.substr(start, comma - start);
                size_t a = part.find_first_not_of(" \t\r\n");
                size_t b = part.find_last_not_of(" \t\r\n");
                if (a != std::string::npos && b != std::string::npos) {
                  std::string trimmed = part.substr(a, b - a + 1);
                  if (!trimmed.empty()) id(notification_ids).push_back(trimmed);
                }
                if (comma == std::string::npos) break;
                start = comma + 1;
              }
            }
            // Build the parallel times vector. Each ID either inherits its
            // previous HHMM (still active) or is freshly stamped (new).
            char fresh_hhmm[8] = "----";
            auto now_t = id(homeassistant_time).now();
            if (now_t.is_valid()) {
              snprintf(fresh_hhmm, sizeof(fresh_hhmm), "%02d%02d",
                       (int) now_t.hour, (int) now_t.minute);
            }
            for (const auto &nid : id(notification_ids)) {
              std::string captured;
              for (size_t j = 0; j < old_ids.size(); j++) {
                if (old_ids[j] == nid) {
                  if (j < old_times.size()) captured = old_times[j];
                  break;
                }
              }
              if (captured.empty()) captured = std::string(fresh_hhmm);
              id(notification_times).push_back(captured);
            }
            // Keep the displayed index inside bounds whenever the list shrinks.
            int n = (int) id(notification_ids).size();
            if (n <= 0) {
              id(current_notification_index) = 0;
            } else if (id(current_notification_index) >= n) {
              id(current_notification_index) = n - 1;
            }
            ESP_LOGI("notify", "IDs parsed: %d", n);
  # Notifications: pipe-separated titles, maintained by the MiniDisplay alarm
  # system in lock-step with `minidisplay_notification_ids`.
  - platform: homeassistant
    id: notification_titles_csv
    entity_id: input_text.minidisplay_notification_titles
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string s = id(notification_titles_csv).state;
            id(notification_titles).clear();
            if (!s.empty()) {
              size_t start = 0;
              while (start < s.size()) {
                size_t pipe = s.find('|', start);
                std::string part = (pipe == std::string::npos)
                  ? s.substr(start)
                  : s.substr(start, pipe - start);
                id(notification_titles).push_back(part);
                if (pipe == std::string::npos) break;
                start = pipe + 1;
              }
            }
            ESP_LOGI("notify", "Titles parsed: %d", (int) id(notification_titles).size());
  # Notifications: pipe-separated message bodies (lock-step with IDs and
  # titles). Most Home Assistant `persistent_notification.create` calls
  # leave `title` empty and put the actual readable content in `message`,
  # so this is what we usually want to show on the display. SCREEN_NOTIFY
  # prefers `message` over `title` when both are set; falling back to
  # `title` (or an alarm-level label) when `message` is empty.
  - platform: homeassistant
    id: notification_messages_csv
    entity_id: input_text.minidisplay_notification_messages
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string s = id(notification_messages_csv).state;
            id(notification_messages).clear();
            if (!s.empty()) {
              size_t start = 0;
              while (start < s.size()) {
                size_t pipe = s.find('|', start);
                std::string part = (pipe == std::string::npos)
                  ? s.substr(start)
                  : s.substr(start, pipe - start);
                id(notification_messages).push_back(part);
                if (pipe == std::string::npos) break;
                start = pipe + 1;
              }
            }
            ESP_LOGI("notify", "Messages parsed: %d", (int) id(notification_messages).size());
