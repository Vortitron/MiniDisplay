            lambda: 'return id(press_start_b7) != 0;'
          then:
            - lambda: |-
                const uint32_t now_ms = millis();
                id(lily_display_until) = now_ms + 4000;
                if (id(lily_pending_add_until) > now_ms) {
                  id(lily_pouch_count) += 0.5f;
                  id(lily_last_feed_ms) = now_ms;
                  id(lily_pending_add_until) = 0;
                  ESP_LOGI("lily", "+0.5 pouch -> %.1f total", id(lily_pouch_count));
                } else {
                  id(lily_pending_add_until) = now_ms + 5000;
                  ESP_LOGI("lily", "View only (press again within 5s to add 0.5)");
                }
            - if:
                condition:
                  lambda: 'return id(lily_pending_add_until) == 0;'
                then:
                  - homeassistant.service:
                      service: input_number.set_value
                      data:
                        entity_id: input_number.lily_pouch_count
                        value: !lambda 'return id(lily_pouch_count);'
                  - homeassistant.service:
                      service: input_datetime.set_datetime
                      data:
                        entity_id: input_datetime.lily_last_feed
                        datetime: !lambda |-
                          auto t = id(homeassistant_time).now();
                          char buf[32];
                          snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d:%02d",
                                   (int) t.year, (int) t.month, (int) t.day,
                                   (int) t.hour, (int) t.minute, (int) t.second);
                          return std::string(buf);
          else:
            - lambda: |-
                ESP_LOGD("button", "B7 released after long-press (-1 pouch)");

  # Button 8: Notifications. Short press cycles; long press dismisses.
  - platform: tm1638
    name: "Button 8 - Notifications"
    id: button_8
    key: 7
    on_press:
      - if:
          condition:
            lambda: 'return millis() < id(snake_select_until_ms);'
          then:
            - script.execute:
                id: arm_snake_timer
                mins: 8
          else:
            - lambda: |-
                id(press_start_b8) = millis();
                ESP_LOGD("button", "B8 pressed (start=%lu)", (unsigned long) id(press_start_b8));
            - script.execute: long_press_b8
    on_release:
      - lambda: |-
          static const int SCREEN_NOTIFY_IDX = 12;
          static const uint32_t NOTIFY_SCROLL_MS_PER_CELL = 200u;
          static const uint32_t NOTIFY_TAIL_DWELL_MS = 3000u;
          const uint32_t now_ms = millis();
          if (id(press_start_b8) == 0) {
            ESP_LOGD("button", "B8 released after long-press already handled");
            return;
          }
          const int total = (int) id(notification_ids).size();
          if (total > 0) {
            id(current_notification_index) =
                (id(current_notification_index) + 1) % total;
          } else {
            id(current_notification_index) = 0;
          }
          id(current_screen) = SCREEN_NOTIFY_IDX;
          id(last_screen_change) = now_ms;
          uint32_t hold_ms = NOTIFY_TAIL_DWELL_MS;
          int idx = id(current_notification_index);
          if (total > 0 && idx >= 0) {
            int content_len = 0;
            if (idx < (int) id(notification_messages).size() &&
                !id(notification_messages)[idx].empty()) {
              content_len = (int) id(notification_messages)[idx].size();
            } else if (idx < (int) id(notification_titles).size()) {
              content_len = (int) id(notification_titles)[idx].size();
            }
            const int total_scroll = (content_len + 4 - 8) > 0 ? (content_len + 4 - 8) : 0;
            hold_ms = (uint32_t) total_scroll * NOTIFY_SCROLL_MS_PER_CELL
                      + NOTIFY_TAIL_DWELL_MS;
          }
          id(notify_hold_until_ms) = now_ms + hold_ms;
          ESP_LOGD("notify", "B8 hold-until set to now+%ums", (unsigned) hold_ms);

# ------------------------------------------------------------------
# HA-side buttons: air-fryer test + microphone diagnostic. Bean
# calibration buttons are gone now that the bean-warning logic uses
# fixed cm thresholds (5..12 cm) - see the espresso_bean_level
# on_value handler. There's nothing to "set" on the device any more.
# These appear in Home Assistant as buttons and don't take any TM1638
# button slots.
# ------------------------------------------------------------------
button:
  - platform: template
    name: "Test Airfryer Beep"
    id: test_airfryer_beep
    on_press:
      - script.execute: trigger_airfryer_beep_action

  - platform: template
    name: "Sample Airfryer Beep"
    id: sample_airfryer_beep
    on_press:
      - script.execute: mic_sample_action

  # Live mic-test button: kicks the same sampling routine without the
  # "Sample" naming, useful for verifying the microphone hears anything
  # at all (clap, whistle, etc).
  - platform: template
    name: "Microphone Self-Test"
    id: mic_self_test_button
    on_press:
      - script.execute: mic_sample_action

# Periodic rebuild of the active calendar event list.
# Window: visible from 19:00 the day before start_time, until end_time.
# Runs every 30s and updates cal_event_* globals consumed by the display.
interval:
  - interval: 30s
    then:
      - lambda: |-
          id(cal_event_titles).clear();
          id(cal_event_times).clear();
          id(cal_event_show_time).clear();

          auto now_time = id(homeassistant_time).now();
          if (!now_time.is_valid()) {
            return;
          }
          time_t now_ts = now_time.timestamp;

          // Determine the device's current local UTC offset (in seconds)
          // from the HA time component. We can't rely on mktime() picking
          // up the TZ env var on this platform - the device log confirms
          // mktime treats local-naive strings as UTC, which silently
          // shifts every event by the local offset. Probing ESPTime's
          // local fields against gmtime() gives us the right offset
          // regardless of how (or whether) TZ was applied at boot.
          int local_utc_offset_sec = 0;
          {
            struct tm gmt_tm;
            gmtime_r(&now_ts, &gmt_tm);
            int local_min = (int) now_time.hour * 60 + (int) now_time.minute;
            int gmt_min = gmt_tm.tm_hour * 60 + gmt_tm.tm_min;
            int diff_min = local_min - gmt_min;
            // Wrap across the day boundary.
            if (diff_min > 12 * 60) diff_min -= 24 * 60;
            if (diff_min < -12 * 60) diff_min += 24 * 60;
            local_utc_offset_sec = diff_min * 60;
          }
          ESP_LOGD("calendar", "Local UTC offset = %d s (is_dst=%d)",
                   local_utc_offset_sec, (int) now_time.is_dst);

          // Parse ISO-8601-ish timestamps from HA calendar attributes.
          // Handles all of:
          //   "2026-05-05T08:00:00+02:00"   (offset from UTC)
          //   "2026-05-05T06:00:00Z"        (UTC)
          //   "2026-05-05 08:00:00"         (no offset - assume device local)
          //   "2026-05-05T08:00:00.123+02:00" (with fractional seconds)
          //
          // The previous version stripped *all* timezone info and called
          // mktime() in the device's local TZ, which silently treated UTC
          // strings as if they were Stockholm time and produced events that
          // were off by the local UTC offset. We now compute a real UTC
          // time_t using Howard Hinnant's days_from_civil algorithm and
          // subtract the parsed offset, so localtime_r() in the display
          // path is the *only* place the local TZ is applied.
          auto parse_dt = [local_utc_offset_sec](const std::string &raw, time_t &out) -> bool {
            if (raw.empty()) return false;
            std::string s = raw;
            for (auto &c : s) { if (c == 'T') c = ' '; }
            int year = 0, month = 0, day = 0, hour = 0, minute = 0, second = 0;
            int n = sscanf(s.c_str(), "%d-%d-%d %d:%d:%d",
                           &year, &month, &day, &hour, &minute, &second);
            if (n < 3) return false;

            // Detect timezone marker. Search for it AFTER the seconds field
            // so the date's own dashes (positions 4 and 7) are skipped.
            bool tz_known = false;
            int tz_offset_sec = 0;
            const size_t tz_search_from = 19;
            if (s.find('Z', tz_search_from) != std::string::npos) {
              tz_known = true;
              tz_offset_sec = 0;
            } else {
              size_t tz_pos = std::string::npos;
              for (size_t i = tz_search_from; i < s.size(); i++) {
                if (s[i] == '+' || s[i] == '-') { tz_pos = i; break; }
              }
              if (tz_pos != std::string::npos && tz_pos + 2 < s.size()) {
                int sign = (s[tz_pos] == '+') ? 1 : -1;
                int oh = 0, om = 0;
                sscanf(s.c_str() + tz_pos + 1, "%2d:%2d", &oh, &om);
                tz_offset_sec = sign * (oh * 3600 + om * 60);
                tz_known = true;
              }
            }

            // Always use days_from_civil so we never rely on mktime() picking
            // up the TZ env var (which silently fails on this platform). For
            // timestamps without an explicit offset we fall back to the local
            // UTC offset captured from the HA time component above.
            const int effective_offset_sec =
                tz_known ? tz_offset_sec : local_utc_offset_sec;
            int y = year;
            unsigned m = (unsigned) month;
            unsigned d = (unsigned) day;
            y -= (m <= 2);
            const int era = (y >= 0 ? y : y - 399) / 400;
            const unsigned yoe = (unsigned)(y - era * 400);
            const unsigned doy = (153u * (m > 2 ? m - 3 : m + 9) + 2u) / 5u + d - 1u;
            const unsigned doe = yoe * 365u + yoe / 4u - yoe / 100u + doy;
            const long long days_since_epoch = (long long) era * 146097LL
                                              + (long long) doe - 719468LL;
            const long long utc_seconds = days_since_epoch * 86400LL
                                        + (long long) hour * 3600LL
                                        + (long long) minute * 60LL
                                        + (long long) second
                                        - (long long) effective_offset_sec;
            out = (time_t) utc_seconds;
            ESP_LOGD("calendar",
                     "parse_dt: raw='%s' tz_known=%d offset=%ds -> utc_ts=%lld",
                     raw.c_str(), (int) tz_known, effective_offset_sec,
                     (long long) out);
            return true;
          };

          // Strip a leading "Name " from the event title so that the
          // calendar's owner doesn't appear twice on the display (the
          // calendar prefix already conveys whose event it is). Also
          // collapse the well-known recurring activities to short labels
          // that don't need to scroll.
          auto shorten_title = [](const std::string &full) -> std::string {
            std::string s = full;
            // Common owner prefixes from the school calendars.
            if (s.find("Felix ") == 0)  s = s.substr(6);
            else if (s.find("Felix") == 0 && s.size() > 5) s = s.substr(5);
            if (s.find("Isolde ") == 0) s = s.substr(7);
            else if (s.find("Isolde") == 0 && s.size() > 6) s = s.substr(6);
            if (s.find("Idrott") == 0)   return std::string("Gym");
            if (s.find("Simning") == 0)  return std::string("Swim");
            if (s.find("Swim") == 0)     return std::string("Swim");
            if (s.find("Ridlekis") == 0) return std::string("Riding");
            // Otherwise hand the body straight through; the display
            // scrolling helper handles strings longer than 8 chars.
            return s;
          };

          // Compose the displayed title given the cleaned body and the
          // calendar prefix. For non-midnight events the prefix is
          // prepended into the scrolling text ("F. Gym", "I. Swim") so
          // the user sees whose calendar the event came from while the
          // HHMM stays in the static slot. For midnight (all-day) events
          // try_add_event puts the prefix into the static slot directly,
          // and this function is called with cal_prefix="" so the title
          // stays bare.
          auto compose_title = [](const std::string &body,
                                  const std::string &cal_prefix) {
            if (cal_prefix.empty()) return body;
            return cal_prefix + " " + body;
          };

          auto try_add_event = [&](const std::string &title_in,
                                   const std::string &start_in,
                                   const std::string &end_in,
                                   const std::string &cal_prefix) {
            if (title_in.empty() || start_in.empty()) return;
            if (title_in == "unknown" || title_in == "unavailable" || title_in == "none") return;

            time_t start_ts;
            if (!parse_dt(start_in, start_ts)) return;

            // Show window opens at 18:00 the day before the start. We
            // compute this directly from start_ts rather than via mktime,
            // because mktime ignores the TZ env var on this platform and
            // would silently shift the window by the local offset (the
            // same bug that made naive timestamps land 2 h late). Approach:
            //   * localtime_r maps start_ts -> start_local (Stockholm).
            //   * "local midnight of the start day" in UTC = start_ts -
            //     (h*3600 + m*60 + s) using start_local's hh:mm:ss.
            //   * 18:00 the day before = local_midnight - 6*3600.
            // The 18:00 anchor (was 19:00) gives the user "after 6pm,
            // unless there are evening events tonight, show the next
            // day's events" - both today's evening events AND
            // tomorrow's events end up in the active list at 18:00,
            // so the cycler walks through whichever are present and
            // the user only sees tomorrow if tonight is empty.
            // This is correct except for the 1-hour DST-changeover edge
            // case (twice a year) which we accept to keep the lambda
            // simple and self-contained.
            struct tm start_local;
            localtime_r(&start_ts, &start_local);
            const int local_secs_into_day =
                start_local.tm_hour * 3600 +
                start_local.tm_min * 60 +
                start_local.tm_sec;
            const time_t local_midnight = start_ts - local_secs_into_day;
            const time_t show_from_ts = local_midnight - 6 * 3600;

            // Use end_time when it's parseable, otherwise default to 1 hour
            // after the start time so events without explicit end still fade out.
            time_t end_ts = start_ts + 3600;
            if (!end_in.empty()) {
              time_t parsed_end;
              if (parse_dt(end_in, parsed_end) && parsed_end > start_ts) {
                end_ts = parsed_end;
              }
            }

            if (now_ts < show_from_ts) return;
            if (now_ts >= end_ts) return;

            std::string body = shorten_title(title_in);
            // Time classification:
            //   * tm_hour == 0 && tm_min == 0  -> "all-day" / midnight event.
            //                                     HA's calendar entities serialise
            //                                     all-day events as starts at 00:00,
            //                                     so we replace the static slot with
            //                                     the calendar's owner-prefix instead
            //                                     of an unhelpful "0000".
            //   * tm_hour == 8 && tm_min == 0  -> "morning" event. We deliberately
            //                                     suppress the static slot for these
            //                                     so the title scrolls across the full
            //                                     8 digits.
            //   * everything else              -> static HHMM in slots 0..3 with the
            //                                     title scrolling over the top.
            const bool is_midnight = (start_local.tm_hour == 0 && start_local.tm_min == 0);
            const bool is_8am      = (start_local.tm_hour == 8 && start_local.tm_min == 0);

            std::string time_buf;
            std::string disp_title;
            if (is_midnight && !cal_prefix.empty()) {
              // All-day event from a tagged calendar (Felix / Isolde):
              // the prefix takes the static slot and the title scrolls
              // bare so we don't double up the owner.
              time_buf = cal_prefix;
              while (time_buf.size() < 4) time_buf += ' ';
              disp_title = body;
            } else if (is_8am || is_midnight) {
              // No static slot - title scrolls across all 8 chars. Even
              // when there's a cal prefix we still inline it into the
              // title so the user sees who the event belongs to.
              time_buf = "";
              disp_title = compose_title(body, cal_prefix);
            } else {
              // Normal event: HHMM static + prefixed title scrolling.
              char tb[8];
              snprintf(tb, sizeof(tb), "%02d%02d",
                       start_local.tm_hour, start_local.tm_min);
              time_buf = tb;
              disp_title = compose_title(body, cal_prefix);
            }
            id(cal_event_titles).push_back(disp_title);
            id(cal_event_times).push_back(time_buf);
            id(cal_event_show_time).push_back(!time_buf.empty());
          };

          if (id(school_cal_1_message).has_state() && id(school_cal_1_start).has_state()) {
            try_add_event(
              id(school_cal_1_message).state,
              id(school_cal_1_start).state,
              id(school_cal_1_end).has_state() ? id(school_cal_1_end).state : std::string(""),
              std::string("F."));
          }
          if (id(school_cal_2_message).has_state() && id(school_cal_2_start).has_state()) {
            try_add_event(
              id(school_cal_2_message).state,
              id(school_cal_2_start).state,
              id(school_cal_2_end).has_state() ? id(school_cal_2_end).state : std::string(""),
              std::string("I."));
          }
          if (id(handl_f_message).has_state() && id(handl_f_start).has_state()) {
            try_add_event(
              id(handl_f_message).state,
              id(handl_f_start).state,
              id(handl_f_end).has_state() ? id(handl_f_end).state : std::string(""),
              std::string(""));
          }

          int total = (int) id(cal_event_titles).size();
          if (total <= 0 || id(cal_event_index) >= total || id(cal_event_index) < 0) {
            id(cal_event_index) = 0;
          }
          ESP_LOGI("calendar", "Active events rebuilt: %d", total);

  # Periodic heartbeat - if the device freezes mid-cycle this lets us see
  # the last screen value in the logs and confirm the main loop is alive.
  - interval: 60s
    then:
      - lambda: |-
          ESP_LOGI("hb", "alive screen=%d cal_events=%d alarm=%d",
                   id(current_screen),
                   (int) id(cal_event_titles).size(),
                   id(alarm_led_mode));

# TM1638 Display Configuration
display:
  - platform: tm1638
    id: tm_display
    stb_pin: GPIO5
    clk_pin: GPIO18
    dio_pin: GPIO17
    # The TM1638 component polls its keys on every update(), so this also
    # becomes the button polling rate. 100 ms (10 Hz) makes sure that even a
    # quick ~200 ms tap is detected (a 500 ms poll could fall entirely
    # between two presses and miss the event).
    update_interval: 100ms
    intensity: 7
    lambda: |-
      // 13 screens (0..12). Air-fryer and hours-to-target screens were
      // removed because the device sits next to the air-fryer (visible
      // power use already obvious) and hours-to-target was rarely useful.
      static const int NUM_SCREENS = 13;
      static const uint32_t SCREEN_HOLD_MS = 3500; // Standard auto-cycle dwell
      static const uint32_t SCROLL_DURATION_MS = 3000; // Subtitle-style left-shift over the screen dwell
      // Per-cell scroll rate for the notification title overlay. Keep in
      // sync with the same constant in `Button 8 - Notifications` so the
      // scroll completes precisely as `notify_hold_until_ms` expires.
      static const uint32_t NOTIFY_SCROLL_MS_PER_CELL = 200u;

      // Subtitle-style left-scroll: copy `width` chars of `full` into out[0..width-1]
      // such that pos=0 at elapsed=0 and pos=(len-width) at elapsed>=duration.
      // Strings <=width chars are space-padded. Width=8 is the "whole
      // display" case (calendar / forecast); width=4 is used for the
      // notification screen (HHMM static on the left, scrolling title in
      // the right 4 slots).
      auto scroll_text = [](const std::string &full, uint32_t elapsed_ms,
                            uint32_t duration_ms, char *out, int width) {
        const int len = (int) full.size();
        const int max_pos = len > width ? len - width : 0;
        int pos = 0;
        if (max_pos > 0) {
          if (elapsed_ms >= duration_ms) {
            pos = max_pos;
          } else {
            pos = (int) (((uint64_t) elapsed_ms * (uint64_t) max_pos) /
                         (uint64_t) duration_ms);
          }
          if (pos > max_pos) pos = max_pos;
        }
        for (int i = 0; i < width; i++) {
          const int src = pos + i;
          out[i] = (src < len) ? full[(size_t) src] : ' ';
        }
        out[width] = '\0';
      };

      // "Static prefix + scrolling title that walks over it" helper.
      // Used by the calendar and notification screens so the time stays
      // anchored on the left while the title scrolls leftwards across
      // the whole 8 digits, eventually obscuring the time entirely.
      //
      // Layout, with prefix_len = 4:
      //   t = 0:                  [P P P P|T0 T1 T2 T3]
      //   t = mid:                [P P|T0 T1|T2 T3 T4 T5]
      //   t = duration_ms:        [Tn-7 ... Tn-1]    (last 8 chars of title)
      //
      // Implementation matches the user's intuition exactly: render the
      // prefix at slots 0..prefix_len-1 first, then "let the title scroll
      // over it" by computing each slot from the title's index when
      // valid, falling back to the prefix only where the title isn't
      // currently covering that slot.
      auto scroll_with_static_prefix = [](const std::string &prefix,
                                          const std::string &title,
                                          uint32_t elapsed_ms,
                                          uint32_t duration_ms,
                                          char *out) {
        const int title_len  = (int) title.size();
        const int prefix_len = (int) prefix.size();
        // Total scroll travel: from "first prefix_len chars of title at
        // slots prefix_len..7" to "last 8 chars of title at slots 0..7".
        const int total_scroll =
            (title_len + prefix_len - 8) > 0 ? (title_len + prefix_len - 8) : 0;
        int scroll_done = 0;
        if (total_scroll > 0) {
          if (elapsed_ms >= duration_ms || duration_ms == 0) {
            scroll_done = total_scroll;
          } else {
            scroll_done = (int) (((uint64_t) elapsed_ms * (uint64_t) total_scroll) /
                                  (uint64_t) duration_ms);
          }
          if (scroll_done > total_scroll) scroll_done = total_scroll;
        }
        const int title_start = prefix_len - scroll_done;
        for (int i = 0; i < 8; i++) {
          const int title_idx = i - title_start;
          if (title_idx >= 0 && title_idx < title_len) {
            out[i] = title[(size_t) title_idx];
          } else if (i < prefix_len) {
            out[i] = prefix[(size_t) i];
          } else {
            out[i] = ' ';
          }
        }
        out[8] = '\0';
      };

      // Screen indices (named for readability):
      static const int SCREEN_BIO        = 0;
      static const int SCREEN_HOTWATER   = 1;
      static const int SCREEN_OUTSIDE    = 2;
      static const int SCREEN_INSIDE     = 3;
      static const int SCREEN_HUMIDITY   = 4;
      static const int SCREEN_PRICE      = 5;
      static const int SCREEN_BEANS      = 6;
      static const int SCREEN_DATETIME   = 7;
      static const int SCREEN_CALENDAR   = 8;
      static const int SCREEN_MANIFOLD   = 9;
      static const int SCREEN_FORECAST   = 10;
      static const int SCREEN_DESIRED    = 11;
      static const int SCREEN_NOTIFY     = 12;

      // ----- Sync alarm LED mode from Home Assistant (every 1s) -----
      static unsigned long last_alarm_check = 0;
      if (millis() - last_alarm_check > 1000) {
        if (id(alarm_level_state).has_state()) {
          std::string level = id(alarm_level_state).state;
          int mode = 0;
          if (level == "Notify") {
            mode = 1;
          } else if (level == "Take Action") {
            mode = 2;
          } else if (level == "Emergency") {
            mode = 3;
          }
          id(alarm_led_mode) = mode;
        }
        last_alarm_check = millis();
      }

      // ----- Compute alarm flash phase (same patterns as MiniDisplay) -----
      const uint32_t now = millis();
      bool alarm_led_on = false;
      switch (id(alarm_led_mode)) {
        case 0:
          alarm_led_on = false;
          break;
        case 1:  // Notify - 300ms flash every 60s
          alarm_led_on = (now % 60000u) < 300u;
          break;
        case 2: {  // Take Action - double flash every 20s
          const uint32_t phase = now % 20000u;
          alarm_led_on = (phase < 200u) || (phase >= 300u && phase < 500u);
          break;
        }
        case 3:  // Emergency - rapid 200ms on/off
          alarm_led_on = (now % 400u) < 200u;
          break;
        default:
          alarm_led_on = false;
          break;
      }
      id(alarm_led_state) = alarm_led_on;

      // ----- Snake-select prompt (long-press of Button 5) -----
      // Holding B5 opens a 5 s window during which buttons 1..8 each set
      // the snake timer to N minutes. While the window is open we render
      // a clear "Press 1-8" prompt with the seconds remaining so the user
      // knows the device is waiting for input.
      if (now < id(snake_select_until_ms)) {
        const uint32_t remain_ms = id(snake_select_until_ms) - now;
        const int remain_s = (int) ((remain_ms + 999u) / 1000u);
        char buf[12];
        snprintf(buf, sizeof(buf), "btn 1-8%d", remain_s);
        it.print(buf);
        // Light all 8 top LEDs as a "menu open" hint - they preview the
        // 8 eggs that will appear once the user picks a duration.
        for (int i = 0; i < 8; i++) {
          it.set_led(i, true);
        }
        return;
      }

      // ----- Snake-egg cooking timer (long-press of Button 5) -----
      //
      // Animation contract (per the user's spec):
      //   * The snake travels back and forth along the BOTTOM TWO ROWS
      //     of the seven-segment display - the middle row (g segment,
      //     looks like '-') and the bottom row (d segment, looks like
      //     '_') - going round and round in a flat 18-cell loop:
      //       cells  0..7  digits 0..7 with '_' (bottom L->R)
      //       cell      8  digit 7 with  'j'  (c+d, RIGHT corner pivot
      //                                       = lower-right vertical
      //                                       + bottom; user's "mirror
      //                                       of i")
      //       cells  9..16 digits 7..0 with '-' (middle R->L)
      //       cell     17  digit 0 with  'i'  (e, LEFT corner pivot
      //                                       = lower-left vertical;
      //                                       user's "i")
      //     -> 18 cells * SNAKE_LOOP_STEP_MS = ~2.7 s per lap. Corner
      //        cells get held SNAKE_LOOP_PIVOT_MS so the lower-vertical
      //        glyph reads as a corner-rounding tick rather than a
      //        flicker between '_' and '-'.
      //   * Once a minute has PASSED the snake ASCENDS at the column
      //     of the next egg (LED N is grabbed in minute N, sat above
      //     digit N): (digit N, '-') -> (digit N, '>') a+b+g ->
      //     (digit N, '~') top -> (digit N, '>') -> (digit N, '-')
      //     in 5 cells * SNAKE_GRAB_STEP_MS = 4 s. Using '>' (a+b+g)
      //     instead of '`' (just b) for the intermediate cells keeps
      //     the g and a segments lit on the way up and down so the
      //     head doesn't appear to "teleport" between '-' and '~'.
      //     The LED for that egg goes OUT at the top of the climb
      //     ("egg eaten"). The climb is placed in the LAST 4 s of each
      //     minute so the user gets ~56 s of "round and round" first
      //     per minute, matching "until a minute has passed and then
      //     it will go up".
      //   * The SNAKE GETS ONE LONGER each minute: the rendered length
      //     starts at 2 (head + 1 trail cell) and grows by one segment
      //     AT THE PEAK of each minute's climb (the moment the LED
      //     goes out). Length is implemented as a trailing history of
      //     the last N (digit, segment) cells the head occupied; the
      //     body trails the head along whichever path it walks (loop
      //     or climb).
      //
      // 7-segment encoding (sevenseg.h font):
      //   bit 0 = a (top)            char '~' = 0x01
      //   bit 1 = b (upper right)    char '`' = 0x02
      //   bit 2 = c (lower right)    (no single-segment char in font)
      //   bit 3 = d (bottom)         char '_' = 0x08
      //   bit 4 = e (lower left)     char 'i' = 0x10  (','/'i' both)
      //   bit 5 = f (upper left)     char '\''= 0x20
      //   bit 6 = g (middle)         char '-' = 0x40
      //
      // The TM1638 component only supports printing single chars per
      // digit (set_7seg_ is protected, no raw-byte API), so when
      // several body cells share a digit we OR their segment bytes and
      // look the result up in the font. The snake's vocabulary uses
      // a, b, c, d, e, g - so the ORs we actually see are:
      //   d         = '_'           d+g     = '='     a       = '~'
      //   b         = '`'           a+b+g   = '>'     c+d     = 'j' (right pivot)
      //   g         = '-'           e+g     = 'r' (body-only OR bridge)
      //   e         = 'i'
      // The head digit is always painted from head_char alone (see render
      // block) so corners show 'j' / 'i' without bogus OR glyphs.
      if (id(snake_timer_active)) {
        // Honour the feedback overlay (e.g. "snake 5M" arm confirmation)
        // before kicking into the animation so the user gets a clear
        // confirmation that the press registered.
        if (id(feedback_until) > now) {
          for (int i = 0; i < 8; i++) it.set_led(i, false);
          it.print("        ");
          it.print(id(feedback_text).c_str());
          return;
        }
        static const uint32_t SECS_PER_MIN_MS      = 60000u;
        static const uint32_t SNAKE_GRAB_STEP_MS   = 800u;
        static const uint32_t SNAKE_LOOP_STEP_MS   = 200u;     // straight-run cell
        static const uint32_t SNAKE_LOOP_PIVOT_MS  = 500u;     // corner ('j'/'i') cell
        static const int      SNAKE_LOOP_CELLS     = 18;
        // Ending animation: long enough for the user to enjoy the
        // fireworks AND ride out the trigger_airfryer_beep_action that
        // is also fired at the start (display overlay 2.5 s, floodlight
        // green 5 s, plus a mobile notification).
        static const uint32_t SNAKE_END_MS         = 15000u;

        // ---- char <-> segment-byte helpers ------------------------
        // 7-segment encoding (see font excerpt at the top of this
        // lambda). The snake only ever writes single chars per
        // digit, but several body cells often share a digit so we OR
        // their segment bytes and look the byte up in the font. The
        // fallback for an OR with no glyph is "most recent char on
        // that digit", keeping the head visible.
        auto char_to_seg = [](char c) -> uint8_t {
          switch (c) {
            case '~': return 0x01;  // a
            case '`': return 0x02;  // b
            case '_': return 0x08;  // d
            case 'i': return 0x10;  // e          (left corner pivot)
            case '\'': return 0x20; // f
            case '-': return 0x40;  // g
            case '=': return 0x48;  // d+g
            case '>': return 0x43;  // a+b+g      (smooth grab climb)
            case '<': return 0x61;  // a+f+g
            case '*': return 0x21;  // a+f
            case ':': return 0x09;  // a+d
            case 'j': return 0x0C;  // c+d        (right corner pivot)
            case 'r': return 0x50;  // e+g        (left corner mid->in)
            default:  return 0x00;
          }
        };
        auto seg_to_char = [](uint8_t s) -> char {
          switch (s) {
            case 0x00: return ' ';
            case 0x01: return '~';
            case 0x02: return '`';
            case 0x08: return '_';
            case 0x09: return ':';
            case 0x0C: return 'j';  // c+d  right corner pivot
            case 0x10: return 'i';  // e    left  corner pivot
            case 0x20: return '\'';
            case 0x21: return '*';
            case 0x40: return '-';
            case 0x43: return '>';
            case 0x48: return '=';
            case 0x50: return 'r';  // e+g  left-corner mid->pivot OR
            case 0x61: return '<';
          }
          return '\0';   // signal "no exact glyph - use fallback"
        };
        // 18-cell bottom+middle loop:
        //   cells 0..7   digits 0..7 with '_'  (bottom L->R)
        //   cell  8      digit 7    with 'j'  (right pivot c+d)
        //   cells 9..16  digits 7..0 with '-' (middle R->L)
        //   cell  17     digit 0    with 'i'  (left pivot e)
        // The pivot cells are held SNAKE_LOOP_PIVOT_MS each (vs the
        // straight-run SNAKE_LOOP_STEP_MS) so the user actually sees
        // the lower-vertical glyph at the corner - 200 ms felt like a
        // "hop" between '_' and '-'. 500 ms makes the corner tick
        // visible. The body-OR trick gives a soft bridge on the way
        // OUT of each corner ('-' OR 'i' = 'r' on the left; the right
        // side's 'j' OR '-' = 0x4C has no glyph and falls back to '-',
        // so the right corner reads slightly tighter than the left -
        // acceptable since the font lacks a c-only glyph).
        auto compute_loop_cell = [](int p, int &d, char &c) {
          if (p < 8)        { d = p;             c = '_'; }
          else if (p == 8)  { d = 7;             c = 'j'; }
          else if (p < 17)  { d = 7 - (p - 9);   c = '-'; }
          else              { d = 0;             c = 'i'; }
        };
        auto loop_step_for = [&](int idx) -> uint32_t {
          return (idx == 8 || idx == 17) ? SNAKE_LOOP_PIVOT_MS
                                         : SNAKE_LOOP_STEP_MS;
        };
        auto push_to_history = [](int d, char c) {
          uint16_t packed = ((uint16_t)(d & 0x07) << 8) | (uint8_t) c;
          // De-dup against the last push so we never accumulate
          // identical entries (cheap insurance even though the state
          // machine should never produce them).
          if (!id(snake_history).empty() && id(snake_history).front() == packed) return;
          id(snake_history).insert(id(snake_history).begin(), packed);
          id(snake_last_head_packed) = packed;
        };

        const int total_minutes = id(snake_timer_minutes);
        const uint32_t snake_elapsed = now - id(snake_timer_start_ms);
        const bool snake_done =
            (id(snake_next_egg) >= total_minutes) && !id(snake_in_grab);

        if (!snake_done) {
          // ====================================================
          //  STATE MACHINE: LOOP <-> GRAB
          // ====================================================
          if (id(snake_in_grab)) {
            // ---- GRAB phase: 5 cells, all on egg's digit ----
            if (now - id(snake_grab_last_step_ms) >= SNAKE_GRAB_STEP_MS) {
              id(snake_grab_idx) += 1;
              id(snake_grab_last_step_ms) = now;
              if (id(snake_grab_idx) > 4) {
                // Grab finished. Resync the loop cursor onto cell
                // (16 - just-grabbed-egg) which IS the (digit egg, '-')
                // cell - the natural continuation of where the head
                // sits at the end of the climb. This is the bit that
                // makes the snake "carry on going round" instead of
                // teleporting somewhere else.
                const int last_egg = id(snake_next_egg);
                id(snake_in_grab) = false;
                id(snake_next_egg) = last_egg + 1;
                id(snake_loop_idx) = 16 - last_egg;
                id(snake_loop_last_step_ms) = now;
                ESP_LOGI("snake", "Egg %d eaten - snake length now %d, loop resumes at cell %d",
                         last_egg, last_egg + 2, id(snake_loop_idx));
              } else {
                // Push the new grab cell. snake_grab_idx is now 1..4:
                //   1 - '>' (a+b+g) on the way up;
                //   2 - '~' (a) at the top (LED goes off here);
                //   3 - '>' (a+b+g) on the way back down;
                //   4 - '-' (g) back to middle row.
                // '>' is preferred over plain '`' (just b) because
                // every adjacent pair in the sequence shares at least
                // one segment ('-' & '>' share g, '>' & '~' share a,
                // etc.), so the head visibly TRAVELS between the
                // middle and top rows instead of teleporting from one
                // standalone segment to another - this is what the
                // user meant by "it jumps from where it is rather
                // than travelling to it naturally".
                const int d = id(snake_next_egg);
                char c;
                switch (id(snake_grab_idx)) {
                  case 1: c = '>'; break;
                  case 2: c = '~'; break;
                  case 3: c = '>'; break;
                  case 4: c = '-'; break;
                  default: c = '-'; break;
                }
                push_to_history(d, c);
              }
            }
          } else {
            // ---- LOOP phase: walk 18-cell perimeter ----
            const uint32_t step_ms = loop_step_for(id(snake_loop_idx));
            if (now - id(snake_loop_last_step_ms) >= step_ms) {
              id(snake_loop_idx) =
                  (id(snake_loop_idx) + 1) % SNAKE_LOOP_CELLS;
              id(snake_loop_last_step_ms) = now;
              int d;
              char c;
              compute_loop_cell(id(snake_loop_idx), d, c);
              push_to_history(d, c);

              // After advancing, check whether the snake is now
              // standing on the next egg's column AND that egg has
              // become "ready" (i.e. its minute has rolled over).
              // egg N is ready at t = (N+1)*60 s, which means the
              // user gets a full minute of round-and-round walking
              // BEFORE the first climb.
              if (id(snake_next_egg) < total_minutes) {
                const uint32_t ready_at_ms =
                    (uint32_t)(id(snake_next_egg) + 1) * SECS_PER_MIN_MS;
                const bool egg_ready = snake_elapsed >= ready_at_ms;
                const int target_d = id(snake_next_egg);
                if (egg_ready && d == target_d && c == '-') {
                  id(snake_in_grab) = true;
                  id(snake_grab_idx) = 0;
                  id(snake_grab_last_step_ms) = now;
                  ESP_LOGI("snake",
                           "Egg %d ready and head at digit %d - starting climb",
                           target_d, target_d);
                }
              }
            }
          }

          // ---- Snake length / history trim ---------------------------
          // Length starts at 2 (head + 1 trail cell, so "round and
          // round" reads as a snake rather than a single flicker) and
          // grows by 1 each time an egg is eaten. End length is
          // total_minutes + 2.
          int snake_length = id(snake_next_egg) + 2;
          if (snake_length > total_minutes + 2) snake_length = total_minutes + 2;
          while ((int) id(snake_history).size() > snake_length) {
            id(snake_history).pop_back();
          }

          // ---- Render the snake body --------------------------------
          // Always paint the head digit from head_char alone. OR-ing
          // the head with trailing body on the same digit produced
          // bogus glyphs at corners (e.g. 0x4C mapping to '3'). Body
          // cells are taken from history[1..] only.
          int head_digit = -1;
          char head_char = ' ';
          if (!id(snake_history).empty()) {
            const uint16_t hp = id(snake_history)[0];
            head_digit = (hp >> 8) & 0x07;
            head_char  = (char) (hp & 0xFF);
          }

          uint8_t digit_segs[8] = {0,0,0,0,0,0,0,0};
          char    digit_recent[8] = {' ',' ',' ',' ',' ',' ',' ',' '};
          for (size_t i = 1; i < id(snake_history).size(); ++i) {
            const uint16_t packed = id(snake_history)[i];
            const int d = (packed >> 8) & 0x07;
            const char c = (char) (packed & 0xFF);
            if (d == head_digit) continue;
            digit_segs[d] |= char_to_seg(c);
            if (digit_recent[d] == ' ') digit_recent[d] = c;
          }
          char buf[2] = {' ', '\0'};
          for (int d = 0; d < 8; ++d) {
            char ch;
            if (d == head_digit) {
              ch = head_char;
            } else {
              ch = seg_to_char(digit_segs[d]);
              if (ch == '\0') ch = digit_recent[d];
            }
            buf[0] = ch;
            it.print((uint8_t) d, buf);
          }

          // ---- LEDs (eggs) -----------------------------------------
          // Anchored to digit position: LED N == egg above digit N. An
          // egg disappears the moment the snake's head reaches the top
          // of its climb (snake_grab_idx >= 2). LEDs are initially lit
          // only in positions 0..total_minutes-1.
          int eggs_eaten = id(snake_next_egg);
          if (id(snake_in_grab) && id(snake_grab_idx) >= 2) eggs_eaten++;
          if (eggs_eaten > total_minutes) eggs_eaten = total_minutes;
          for (int i = 0; i < 8; ++i) {
            it.set_led(i, i < total_minutes && i >= eggs_eaten);
          }
          return;
        }

        // ====================================================
        //  ENDING ANIMATION (all eggs eaten)
        // ====================================================
        // Always plays the "fireworks" pattern (was the kind==2 branch
        // of three rotating variants) because that's what the user
        // wanted. We also kick off trigger_airfryer_beep_action ONCE
        // at the start of the ending so the kitchen gets the same
        // floodlight-flash + mobile-notification alert as a real
        // airfryer beep - the snake-timer ending is effectively a
        // "your bake is done" cue.
        if (id(snake_done_at_ms) == 0) {
          id(snake_done_at_ms) = now;
          ESP_LOGI("snake",
                   "All %d eggs eaten in %lus - firing airfryer alert and "
                   "playing fireworks for %lu ms",
                   total_minutes,
                   (unsigned long)(snake_elapsed / 1000),
                   (unsigned long) SNAKE_END_MS);
          id(trigger_airfryer_beep_action).execute();
        }
        const uint32_t end_phase = now - id(snake_done_at_ms);
        if (end_phase < SNAKE_END_MS) {
          // Fireworks: flash "88888888" alternated with ". . . . " and
          // strobe all 8 LEDs together. Simple, bright, unambiguous.
          const bool flash = ((end_phase / 200u) & 1u) != 0u;
          if (flash) {
            it.print("88888888");
            for (int i = 0; i < 8; i++) it.set_led(i, true);
          } else {
            it.print(". . . . ");
            for (int i = 0; i < 8; i++) it.set_led(i, false);
          }
          return;
        }
        ESP_LOGI("snake", "Ending animation finished - returning to screens");
        id(snake_timer_active) = false;
        // Fall through to normal screen rotation below.
      }

      // ----- Auto-cycling logic (with calendar event sub-cycle) -----
      const int num_cal_events = (int) id(cal_event_titles).size();
      // SCREEN_NOTIFY observes a per-press extended hold so a manual cycle
      // (B8 short press) can let a long title fully scroll past + a few
      // seconds of dwell before the auto-rotation kicks in again.
      const bool notify_hold_active =
          (id(current_screen) == SCREEN_NOTIFY) &&
          (now < id(notify_hold_until_ms));
      if (!notify_hold_active && now - id(last_screen_change) > SCREEN_HOLD_MS) {
        bool advance_outer = true;
        if (id(current_screen) == SCREEN_CALENDAR && num_cal_events > 0) {
          // Stay on calendar while there are more events to cycle through.
          if (id(cal_event_index) < num_cal_events - 1) {
            id(cal_event_index) += 1;
            advance_outer = false;
          } else {
            id(cal_event_index) = 0;
          }
        }
        // Honour the Button 5 "force calendar visible" override even when
        // there are zero events, so the user actually sees "noEvent" for
        // a few seconds after pressing the button.
        if (id(current_screen) == SCREEN_CALENDAR &&
            now < id(force_calendar_until)) {
          advance_outer = false;
        }
        if (advance_outer) {
          id(current_screen) = (id(current_screen) + 1) % NUM_SCREENS;
        }

        // Skip-rules for screens that need data to be meaningful.
        // The calendar skip is suspended for ~5 s after Button 5 is pressed
        // (force_calendar_until) so the user sees "noEvent" instead of the
        // press feeling like a no-op.
        if (id(current_screen) == SCREEN_CALENDAR && num_cal_events == 0 &&
            now >= id(force_calendar_until)) {
          id(current_screen) = SCREEN_MANIFOLD;
        }
        // Beans screen is now low-only: when bean_warning_active is false
        // we don't show it at all (LED8 is dark too). This stops the
        // hopper from contributing a "everything's fine" indicator to the
        // normal cycle - the user only sees the screen when there's
        // something to act on.
        if (id(current_screen) == SCREEN_BEANS && !id(bean_warning_active)) {
          id(current_screen) = SCREEN_DATETIME;
        }
        if (id(current_screen) == SCREEN_MANIFOLD) {
          if (!id(lowest_loop_temp).has_state() && !id(manifold_air_temp).has_state()) {
            id(current_screen) = SCREEN_FORECAST;
          }
        }
        if (id(current_screen) == SCREEN_FORECAST &&
            !id(forecast_today_max).has_state() &&
            !id(forecast_tonight_min).has_state() &&
            !id(outside_temp).has_state()) {
          id(current_screen) = SCREEN_DESIRED;
        }
        if (id(current_screen) == SCREEN_DESIRED && !id(sam_target_temp).has_state()) {
          id(current_screen) = SCREEN_NOTIFY;
        }
        if (id(current_screen) == SCREEN_NOTIFY) {
          bool has_alarm = id(alarm_led_mode) > 0;
          bool has_notes = id(notification_ids_csv).has_state() &&
                           !id(notification_ids_csv).state.empty();
          if (!has_alarm && !has_notes) {
            id(current_screen) = SCREEN_BIO;
          }
        }
        id(last_screen_change) = millis();
      }

      // ----- Generic feedback overlay (lights buttons / cal / notify) -----
      // Used by:
      //  * HA bean-calibration buttons     ("Em XX.X" etc.)
      //  * TM1638 lights buttons 1-3       ("Liv  on " / "Liv FuLL" etc.)
      //  * TM1638 Button 8 notifications   ("noteDIS " / "noteNONE")
      if (id(feedback_until) > now) {
        for (int i = 0; i < 8; i++) {
          it.set_led(i, false);
        }
        // Fully clear the 8-digit buffer so leftover chars don't bleed through.
        it.print("        ");
        it.print(id(feedback_text).c_str());
        if (alarm_led_on) {
          for (int i = 0; i < 8; i++) it.set_led(i, true);
        }
        return;
      }

      // ----- Lily feed display (Button 7 - overrides screens) -----
      if (id(lily_display_until) > now) {
        for (int i = 0; i < 8; i++) {
          it.set_led(i, false);
        }
        it.print("        ");
        if (id(lily_last_feed_ms) == 0) {
          it.print("  --:--");
        } else {
          const uint32_t ago_s = (now - id(lily_last_feed_ms)) / 1000u;
          unsigned hrs = (unsigned) (ago_s / 3600u);
          unsigned mins = (unsigned) ((ago_s % 3600u) / 60u);
          if (hrs > 99u) {
            hrs = 99u;
          }
          it.printf(0, "%02u:%02u", hrs, mins);
        }
        it.printf(5, "%3.1f", id(lily_pouch_count));
        if (alarm_led_on) {
          for (int i = 0; i < 8; i++) it.set_led(i, true);
        }
        return;
      }

      // ----- Temp button feedback display (overrides screen content) -----
      if (id(temp_button_display_until) > now) {
        for (int i = 0; i < 8; i++) {
          it.set_led(i, false);
        }
        // Clear all 8 digits so a previous longer message doesn't bleed through.
        it.print("        ");
        if (id(temp_button_step) == 0) {
          // First press: just show the inside temperature.
          it.print("in  ");
          if (id(inside_temp).has_state()) {
            it.printf(4, "%4.1fC", id(inside_temp).state);
          } else {
            it.print(4, " --C");
          }
        } else {
          static const int kTargets[] = {0, 23, 20, 17};
          int t = kTargets[id(temp_button_step) % 4];
          it.print("Set ");
          it.printf(4, "%3dC", t);
        }
        if (alarm_led_on) {
          for (int i = 0; i < 8; i++) it.set_led(i, true);
        }
        return;
      }

      // ----- Generic 1s "On/Off" feedback after lights/climate buttons -----
      if (id(button_pressed) && now - id(button_press_time) < 1000) {
        it.print("  on  ");
        return;
      } else {
        id(button_pressed) = false;
      }

      // ----- Baseline LED states (per-screen + ambient indicators) -----
      for (int i = 0; i < 8; i++) {
        it.set_led(i, false);
      }
      // LEDs 1-3 are the three "screen indicator" lights, kept on the
      // left so the row reads as: [screens][ambient state][alerts].
      // LED1 (index 0): Manifold screen
      if (id(current_screen) == SCREEN_MANIFOLD) {
        it.set_led(0, true);
      }
      // LED2 (index 1): Bio Office screen
      if (id(current_screen) == SCREEN_BIO) {
        it.set_led(1, true);
      }
      // LED3 (index 2): Power price screen
      if (id(current_screen) == SCREEN_PRICE) {
        it.set_led(2, true);
      }
      // LED4 (index 3): Notifications waiting (steady ambient indicator)
      bool any_notes = id(notification_ids_csv).has_state() &&
                       !id(notification_ids_csv).state.empty();
      if (any_notes) {
        it.set_led(3, true);
      }
      // LED5 (index 4): Hot water on/off (steady) - mirrors the
      // switch.smart_plug_2_socket_1 state regardless of which screen is up.
      if (id(hot_water).has_state() && id(hot_water).state) {
        it.set_led(4, true);
      }
      // LED6 (index 5): Boiler / heater relays active
      bool boiler_or_heater = false;
      if (id(boiler_relay_1).has_state() && id(boiler_relay_1).state) boiler_or_heater = true;
      if (id(boiler_relay_2).has_state() && id(boiler_relay_2).state) boiler_or_heater = true;
      it.set_led(5, boiler_or_heater);
      // LED7 (index 6): Cheap power - lit when current Nordpool price is in the "low" band
      if (id(power_price_is_low).has_state() && id(power_price_is_low).state) {
        it.set_led(6, true);
      }
      // LED8 (index 7): Low-beans flashing alert. The warning state is
      // computed by the espresso_bean_level on_value handler: it only
      // goes true once the reading has stayed in the 5..12 cm "reliable
      // low" band for 10 s continuously, so transient bean shifts when
      // pouring fresh beans in don't trigger a false alarm.
      static unsigned long last_bean_flash = 0;
      static bool bean_led_state = false;
      const bool beans_low = id(bean_warning_active);
      if (beans_low) {
        if (now - last_bean_flash > 500) {
          bean_led_state = !bean_led_state;
          last_bean_flash = now;
        }
        it.set_led(7, bean_led_state);
      }

      // Alarm overlay: when the alarm flash phase is ON, light all 8 LEDs.
      // Between flashes the ambient/per-screen LEDs are visible again.
      if (alarm_led_on) {
        for (int i = 0; i < 8; i++) {
          it.set_led(i, true);
        }
      }

      // ----- Clear display before drawing -----
      it.print("        ");

      // ----- Render screens -----
      // Note on right-alignment for the TM1638 8-digit display:
      //  - The decimal point is absorbed into the previous digit, so "%.1f"
      //    occupies 3 display positions for "23.5" but only 2 positions of
      //    actual character drawing.
      //  - To right-align a "%.1f" value into a 4-position slot we therefore
      //    use "%5.1f" (5-char string -> 4 display positions including the
      //    leading space). Same logic for "%5.2f" (price), "%4d" (integer)
      //    and "%4.1fC" / "%4.1fh" where the trailing unit char takes a slot.
      //  - This guarantees no trailing blank on the right edge.
      if (id(current_screen) == SCREEN_BIO) {
        // Bio Office HVAC mode + current temperature
        if (id(bio_office_hvac_state).has_state()) {
          std::string hvac_state = id(bio_office_hvac_state).state;
          if (hvac_state == "heat" || hvac_state == "auto") {
            it.print(" on ");
          } else {
            it.print(" off");
          }
        } else {
          it.print(" ---");
        }
        if (id(bio_office_current_temp).has_state()) {
          it.printf(4, "%4.1fC", id(bio_office_current_temp).state);
        } else {
          it.print(4, " ---");
        }
      } else if (id(current_screen) == SCREEN_HOTWATER) {
        // Hot Water status + boiler temperature
        it.print("hot ");
        if (id(hot_water).has_state() && id(hot_water).state) {
          it.printf(4, " on ");
        } else {
          it.printf(4, " off");
        }
        if (id(hot_water_boiler_temp).has_state()) {
          it.printf(4, "%4.1fC", id(hot_water_boiler_temp).state);
        }
      } else if (id(current_screen) == SCREEN_OUTSIDE) {
        // Outside Temperature
        it.print("out ");
        if (id(outside_temp).has_state()) {
          it.printf(4, "%4.1fC", id(outside_temp).state);
        } else {
          it.print(4, " --C");
        }
      } else if (id(current_screen) == SCREEN_INSIDE) {
        // Inside Temperature
        it.print("in  ");
        if (id(inside_temp).has_state()) {
          it.printf(4, "%4.1fC", id(inside_temp).state);
        } else {
          it.print(4, " --C");
        }
      } else if (id(current_screen) == SCREEN_HUMIDITY) {
        // Inside Humidity (no unit -> right-align in full 4 slots)
        it.print("in h");
        if (id(inside_humidity).has_state()) {
          it.printf(4, "%5.1f", id(inside_humidity).state);
        } else {
          it.print(4, "  --");
        }
      } else if (id(current_screen) == SCREEN_PRICE) {
        // Power Price + Lo/High band (price has no unit on left)
        if (id(power_price).has_state()) {
          it.printf("%5.2f", id(power_price).state);
          if (id(power_price_is_low).has_state() && id(power_price_is_low).state) {
            it.print(4, "  Lo");
          } else {
            it.print(4, "High");
          }
        } else {
          it.print(" ---");
        }
      } else if (id(current_screen) == SCREEN_BEANS) {
        // Coffee Bean Level. The display is intentionally minimal now -
        // when the warning is active the screen just reads "Bean Lo ";
        // the live cm value is still published to HA via
        // sensor.kitchen_detectorer_espresso_bean_level for diagnostics.
        // The auto-cycle skip-rule below makes sure we never even land
        // on this screen while the warning is inactive, so the user
        // only sees it when there is actually something to act on.
        if (id(bean_warning_active)) {
          it.print("Bean Lo ");
        } else {
          // Defensive: should never be visible thanks to the skip rule.
          it.print("Beans   ");
        }
      } else if (id(current_screen) == SCREEN_DATETIME) {
        // Date and Time
        auto t = id(homeassistant_time).now();
        if (t.is_valid()) {
          it.printf("%02d.%02d", t.day_of_month, t.month);
          it.printf(4, "%02d.%02d", t.hour, t.minute);
        } else {
          it.print("--.--.--");
        }
      } else if (id(current_screen) == SCREEN_CALENDAR) {
        // Calendar Events. The HHMM stays anchored at slots 0..3 while
        // the event title scrolls leftwards across the whole display
        // over SCROLL_DURATION_MS (3 s) - so an 18-char title still fits
        // and the user reads it as "(static time) (title walking past)".
        // 8am-exact events skip the static time portion entirely and
        // just scroll the title across all 8 slots. Long-press / Button
        // 5 still cycles between events; the auto-cycle holds each
        // event for SCREEN_HOLD_MS (3.5 s) before advancing.
        if (num_cal_events == 0) {
          it.print("noEvent ");
        } else {
          int idx = id(cal_event_index);
          if (idx >= num_cal_events) idx = 0;
          const std::string &title = id(cal_event_titles)[idx];
          const std::string &time_str = id(cal_event_times)[idx]; // "HHMM"
          const bool show_t = id(cal_event_show_time)[idx];

          char buf[9];
          const uint32_t elapsed = now - id(last_screen_change);
          if (show_t && time_str.size() >= 4) {
            scroll_with_static_prefix(time_str, title, elapsed,
                                      SCROLL_DURATION_MS, buf);
          } else {
            scroll_text(title, elapsed, SCROLL_DURATION_MS, buf, 8);
          }
          it.print(buf);
        }
      } else if (id(current_screen) == SCREEN_MANIFOLD) {
        // Manifold Loop Return (left, with C) + Air Temperature (right, with C).
        // Both halves use %4.1fC so the rightmost digit is always a temperature
        // digit or the "C" unit, never a blank.
        if (id(lowest_loop_temp).has_state()) {
          it.printf("%4.1fC", id(lowest_loop_temp).state);
        } else {
          it.print(" --C");
        }
        if (id(manifold_air_temp).has_state()) {
          it.printf(4, "%4.1fC", id(manifold_air_temp).state);
        } else {
          it.print(4, " --C");
        }
      } else if (id(current_screen) == SCREEN_FORECAST) {
        // Forecast screen - scrolls D/N forecast temp + condition + live
        // outside temp. Same 15:00-03:00 night-min rule as LoftWay.
        //
        // Format (over SCROLL_DURATION_MS = 3 s):
        //   "D12.3 pCLOUd Out 9.0" before 15:00 and from 03:00
        //   "N 8.2 RAIN  Out 9.0" from 15:00-03:00
        bool show_night_min = false;
        if (id(homeassistant_time).now().is_valid()) {
          const int h = id(homeassistant_time).now().hour;
          show_night_min = (h >= 15) || (h < 3);
        }
        auto fc_ok = [](float v, bool has) {
          if (!has) return false;
          if (v != v) return false;
          if (v >  1.0e6f) return false;
          if (v < -1.0e6f) return false;
          return true;
        };
        char fc_buf[8];
        if (show_night_min) {
          float v = id(forecast_tonight_min).state;
          if (fc_ok(v, id(forecast_tonight_min).has_state())) {
            snprintf(fc_buf, sizeof(fc_buf), "N%4.1f", v);
          } else {
            snprintf(fc_buf, sizeof(fc_buf), "N --");
          }
        } else {
          float v = id(forecast_today_max).state;
          if (fc_ok(v, id(forecast_today_max).has_state())) {
            snprintf(fc_buf, sizeof(fc_buf), "D%4.1f", v);
          } else {
            snprintf(fc_buf, sizeof(fc_buf), "D --");
          }
        }
        char out_buf[8];
        {
          float v = id(outside_temp).state;
          if (fc_ok(v, id(outside_temp).has_state())) {
            snprintf(out_buf, sizeof(out_buf), "Out%4.1f", v);
          } else {
            snprintf(out_buf, sizeof(out_buf), "Out --");
          }
        }
        std::string condition;
        if (id(openweathermap_condition).has_state()) {
          const std::string &raw = id(openweathermap_condition).state;
          if (raw == "clear-night")           condition = "clear";
          else if (raw == "cloudy")           condition = "cloudy";
          else if (raw == "fog")              condition = "fog";
          else if (raw == "hail")             condition = "hail";
          else if (raw == "lightning")        condition = "storm";
          else if (raw == "lightning-rainy")  condition = "storm";
          else if (raw == "partlycloudy")     condition = "pCLOUd";
          else if (raw == "pouring")          condition = "RAIN";
          else if (raw == "rainy")            condition = "RAIN";
          else if (raw == "snowy")            condition = "SNOW";
          else if (raw == "snowy-rainy")      condition = "SLEEt";
          else if (raw == "sunny")            condition = "SUN";
          else if (raw == "windy")            condition = "WIND";
          else if (raw == "windy-variant")    condition = "WIND";
          else if (raw == "exceptional")      condition = "EXCEPt";
          else condition = raw.substr(0, 6);
        }
        std::string full = std::string(fc_buf);
        if (!condition.empty()) {
          full += " ";
          full += condition;
        }
        full += " ";
        full += out_buf;
        char buf[16];
        const uint32_t elapsed = now - id(last_screen_change);
        scroll_text(full, elapsed, SCROLL_DURATION_MS, buf, 8);
        it.print(buf);
      } else if (id(current_screen) == SCREEN_DESIRED) {
        // Sam Desired Temperature (the value Button 6 changes)
        it.print("Set ");
        if (id(sam_target_temp).has_state()) {
          it.printf(4, "%4.1fC", id(sam_target_temp).state);
        } else {
          it.print(4, " --C");
        }
      } else if (id(current_screen) == SCREEN_NOTIFY) {
        // Notification screen.
        //
        // Layout matches the calendar's "static time + scrolling title":
        //   slots 0..3 = HHMM the notification first appeared (captured
        //                in notification_times so per-notification timing
        //                survives auto-cycle / B8 advance / dismiss).
        //   slots 0..7 = title scrolls left over the time, dwells with
        //                the last 8 chars visible, then resets when the
        //                screen leaves and re-enters.
        // The scroll RATE is fixed per-cell (NOTIFY_SCROLL_MS_PER_CELL)
        // so a 30-char title takes ~5 s and a 4-char title takes ~0 s.
        // When the user manually opens this screen (B8 short press) the
        // auto-cycle defers advancing until notify_hold_until_ms - which
        // is computed from the same per-cell rate - so the entire title
        // really does scroll past, plus 3 s of dwell, before moving on.
        // 0 notifications fall back to "noNote  " or the alarm-level label.
        // Long-press on Button 8 dismisses the currently-shown entry.
        const int total = (int) id(notification_ids).size();
        int idx = id(current_notification_index);
        if (idx < 0) idx = 0;
        if (total > 0 && idx >= total) idx = 0;
        if (total <= 0) {
          if (id(alarm_led_mode) > 0) {
            const char *labels[] = {"OK  ", "Note", "Aler", "Act!"};
            int lvl = id(alarm_led_mode);
            if (lvl < 0) lvl = 0;
            if (lvl > 3) lvl = 3;
            it.print(labels[lvl]);
            it.print(4, "   0");
          } else {
            it.print("noNote  ");
          }
        } else {
          // --- Pick the best content string for this notification.
          // HA `persistent_notification.create` calls usually leave
          // `title` empty and put the actual readable text in `message`,
          // so we prefer message > title > alarm-level fallback. The
          // resulting string is sanitised (TM1638-renderable chars only)
          // and trimmed before being scrolled across the display.
          std::string title_raw;
          if (idx < (int) id(notification_messages).size() &&
              !id(notification_messages)[idx].empty()) {
            title_raw = id(notification_messages)[idx];
          } else if (idx < (int) id(notification_titles).size() &&
                     !id(notification_titles)[idx].empty()) {
            title_raw = id(notification_titles)[idx];
          } else {
            const char *labels[] = {"OK", "Note", "Alert", "Action"};
            int lvl = id(alarm_led_mode);
            if (lvl < 0) lvl = 0;
            if (lvl > 3) lvl = 3;
            title_raw = std::string(labels[lvl]);
          }
          std::string title;
          title.reserve(title_raw.size());
          for (char c : title_raw) {
            const bool ok =
                (c >= '0' && c <= '9') ||
                (c >= 'A' && c <= 'Z') ||
                (c >= 'a' && c <= 'z') ||
                c == ' ' || c == '.' || c == '-' || c == '_';
            title += ok ? c : ' ';
          }
          // Collapse runs of whitespace.
          std::string compact;
          bool prev_space = true;
          for (char c : title) {
            if (c == ' ') {
              if (!prev_space) compact += ' ';
              prev_space = true;
            } else {
              compact += c;
              prev_space = false;
            }
          }
          while (!compact.empty() && compact.back() == ' ') compact.pop_back();
          if (compact.empty()) compact = "(empty)";
          // For multi-notification cases prepend the count so the user
          // still gets "1 of 3" without a separate count phase.
          if (total > 1) {
            char prefix[16];
            snprintf(prefix, sizeof(prefix), "%d of %d  ", idx + 1, total);
            compact = std::string(prefix) + compact;
          }

          // --- HHMM on the left (slots 0..3). ---
          std::string hhmm;
          if (idx < (int) id(notification_times).size() &&
              id(notification_times)[idx].length() == 4) {
            hhmm = id(notification_times)[idx];
          } else {
            hhmm = "----";
          }

          // --- Title scrolls leftwards over the static HHMM. Duration
          // = (cells of travel) * NOTIFY_SCROLL_MS_PER_CELL, computed
          // here so it matches the per-press hold the B8 handler set. ---
          const int title_len = (int) compact.size();
          const int total_scroll =
              (title_len + 4 - 8) > 0 ? (title_len + 4 - 8) : 0;
          const uint32_t scroll_duration_ms =
              (uint32_t) total_scroll * NOTIFY_SCROLL_MS_PER_CELL;
          const uint32_t since_show = now - id(last_screen_change);

          char buf[9];
          scroll_with_static_prefix(hhmm, compact, since_show,
                                    scroll_duration_ms, buf);
          it.print(buf);
        }
      }

# Bluetooth Proxy (extends HA BLE range)
bluetooth_proxy:
  active: true
