  # Button 5: short press jumps to the calendar screen and advances to the
  # next event; long press (>= 800 ms) opens a 5 s "select duration" window
  # for the snake-egg cooking timer. Pressing any of buttons 1..8 inside
  # that window arms an N-minute snake. A second long-press of B5 cancels
  # an already-running snake. While inside the select window, B5 short
  # presses count as "5 minutes" instead of jumping to the calendar.
  - platform: tm1638
    name: "Button 5 - Calendar Cycle"
    id: button_5
    key: 4
    on_press:
      - if:
          condition:
            lambda: 'return millis() < id(snake_select_until_ms);'
          then:
            - script.execute:
                id: arm_snake_timer
                mins: 5
            - lambda: |-
                id(press_start_b5) = 0;
          else:
            - lambda: |-
                id(press_start_b5) = millis();
                ESP_LOGD("button", "B5 pressed (start=%lu)", (unsigned long) id(press_start_b5));
            - script.execute: long_press_b5
    on_release:
      - lambda: |-
          static const int SCREEN_CALENDAR_IDX = 8;
          const uint32_t now_ms = millis();
          if (id(press_start_b5) == 0) {
            ESP_LOGD("button", "B5 released after long-press already handled");
            return;
          }
          const uint32_t held = now_ms - id(press_start_b5);
          ESP_LOGD("button", "B5 released after %ums (short-press path)", (unsigned) held);
          // Short press while the snake timer is running just exits it
          // without changing the screen - long-press still cancels too,
          // but a tap is enough for "I'm done with this".
          if (id(snake_timer_active)) {
            id(snake_timer_active) = false;
            ESP_LOGI("snake", "Snake timer dismissed by short-press");
            return;
          }
          int total = (int) id(cal_event_titles).size();
          id(current_screen) = SCREEN_CALENDAR_IDX;
          id(last_screen_change) = now_ms;
          // Hold the calendar screen visible for ~5s even when empty.
          // Without this the screen-skip rule immediately rewrites
          // current_screen to SCREEN_MANIFOLD and the press feels dead.
          id(force_calendar_until) = now_ms + 5000;
          if (total > 0) {
            id(cal_event_index) = (id(cal_event_index) + 1) % total;
            ESP_LOGD("button", "B5 short: cal idx=%d/%d", id(cal_event_index), total);
          } else {
            ESP_LOGD("button", "B5 short: no events, showing noEvent for 5s");
          }

