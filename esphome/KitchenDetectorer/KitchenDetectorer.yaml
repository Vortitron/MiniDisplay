  # ----- "Any light on in this area" indicators for Buttons 1-3 -----
  # These drive the on-press state overlay ("LivR on " / "LivR off") and
  # therefore the user's "first press shows state, next press toggles"
  # decision. The expected entity is a `binary_sensor` template helper in
  # Home Assistant that returns "on" if **any** light in the area is on,
  # for example:
  #
  #   template:
  #     - binary_sensor:
  #         - name: "Living Room Any Light On"
  #           unique_id: living_room_any_light_on
  #           state: >
  #             {{ expand(area_entities('living_room')) | selectattr('domain','eq','light')
  #                | selectattr('state','eq','on') | list | count > 0 }}
  #
  # If the entity is missing the overlay falls back to "LivR -- ", and the
  # toggle still works because the toggle uses area_id targeting.
  # `on_state` here is the "show new state once HA confirms" half of the
  # toggle UX. The button's on_release shows "Liv togL" immediately to
  # acknowledge the press; a moment later HA pushes a new state and we
  # replace that overlay with the actual "Liv  on " / "Liv  off". The
  # last_lights_button + millis() guard makes sure we only react when the
  # state change is plausibly the result of *our* recent toggle - random
  # background updates (motion sensor, automation, etc.) leave the screen
  # alone.
  - platform: homeassistant
    id: living_lights_any_on
    entity_id: binary_sensor.living_room_any_light_on
    internal: true
    on_state:
      then:
        - lambda: |-
            if (id(last_lights_button) == 1 &&
                millis() - id(last_lights_button_press) < 6000) {
              char buf[16];
              snprintf(buf, sizeof(buf), "Liv  %s",
                       id(living_lights_any_on).state ? "on " : "off");
              id(feedback_text) = std::string(buf);
              id(feedback_until) = millis() + 4000;
            }
  - platform: homeassistant
    id: bio_lights_any_on
    entity_id: binary_sensor.bio_any_light_on
    internal: true
    on_state:
      then:
        - lambda: |-
            if (id(last_lights_button) == 2 &&
                millis() - id(last_lights_button_press) < 6000) {
              char buf[16];
              snprintf(buf, sizeof(buf), "Bio  %s",
                       id(bio_lights_any_on).state ? "on " : "off");
              id(feedback_text) = std::string(buf);
              id(feedback_until) = millis() + 4000;
            }
  - platform: homeassistant
    id: bedroom_lights_any_on
    entity_id: binary_sensor.bedroom_any_light_on
    internal: true
    on_state:
      then:
        - lambda: |-
            if (id(last_lights_button) == 3 &&
                millis() - id(last_lights_button_press) < 6000) {
              char buf[16];
              snprintf(buf, sizeof(buf), "Bedr %s",
                       id(bedroom_lights_any_on).state ? "on " : "off");
              id(feedback_text) = std::string(buf);
              id(feedback_until) = millis() + 4000;
            }
  - platform: homeassistant
