alias: Smart Boiler Freeze Protection
description: Run both boiler relays (6kW) during cheapest hours based on forecast
triggers:
  - trigger: state
    entity_id:
      - input_number.electricity_price_rank
  - trigger: state
    entity_id:
      - weather.openweathermap
    attribute: forecast
conditions: []
actions:
  - choose:
      # Cheap hours: run both relays at 12C for concentrated heating
      - conditions:
          - condition: template
            value_template: >-
              {% set forecast = state_attr('weather.openweathermap', 'forecast') or [] %}
              {% set today_forecasts = forecast | selectattr('datetime', 'search', now().strftime('%Y-%m-%d')) | list %}
              {% set min_temp = 10 %}
              {% if today_forecasts | length > 0 %}
                {% set temps = today_forecasts | map(attribute='temperature') | list %}
                {% if temps | length > 0 %}
                  {% set min_temp = temps | min %}
                {% endif %}
              {% endif %}
              {% if min_temp >= 1 %}
                {% set required_hours = 1 %}
              {% else %}
                {% set required_hours = ((1 - min_temp) | round(0, 'ceil')) | int %}
              {% endif %}
              {% set current_rank = states('input_number.electricity_price_rank') | int(99) %}
              {{ current_rank < required_hours }}
        sequence:
          - action: climate.set_temperature
            data:
              temperature: 18
            target:
              entity_id:
                - climate.boiler_relay_1_thermostat
                - climate.boiler_relay_2_thermostat
    default:
      # Not in cheap hours: set to minimal (thermostat handles emergency)
      - action: climate.set_temperature
        data:
          temperature: 6
        target:
          entity_id: climate.boiler_relay_1_thermostat
      - action: climate.set_temperature
        data:
          temperature: 4
        target:
          entity_id: climate.boiler_relay_2_thermostat
mode: single
