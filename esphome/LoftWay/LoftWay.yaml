esphome:
  name: loftc3
  friendly_name: LoftC3
  on_boot:
    priority: 600
    then:
      - output.turn_on: status_led
      - lambda: 'id(status_led_is_on) = true;'
      - logger.log: "LoftWay Bluetooth Proxy booted, LED should be ON"
  on_shutdown:
    then:
      - output.turn_off: status_led
      - lambda: 'id(status_led_is_on) = false;'
      - logger.log: "LoftWay shutting down"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: "R5ce2+sAWu+P64UfkenRwn2nVHHSHXP5v4hd8oSQ2Ao="
  reboot_timeout: 15min
  on_client_connected:
    then:
      - output.turn_on: status_led
      - lambda: 'id(status_led_is_on) = true;'
      - logger.log: "Home Assistant API connected - ready for service calls"
  on_client_disconnected:
    then:
      - output.turn_off: status_led
      - lambda: 'id(status_led_is_on) = false;'
      - logger.log: "Home Assistant API disconnected"

ota:
  - platform: esphome
    password: "629ce264867a48aca47fe3655f629c81"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: false
  reboot_timeout: 15min

# Bluetooth Proxy (extends HA BLE range)
bluetooth_proxy:
  active: true

# Status LED (on-board LED)
output:
  - platform: gpio
    pin: GPIO8
    id: status_led
    inverted: true

# Alarm level from Home Assistant
text_sensor:
  - platform: homeassistant
    id: alarm_level_state
    entity_id: input_select.alarm_level
    on_value:
      then:
        - lambda: |-
            std::string level = id(alarm_level_state).state;
            int mode = 0;
            if (level == "Notify") {
              mode = 1;
            } else if (level == "Take Action") {
              mode = 2;
            } else if (level == "Emergency") {
              mode = 3;
            }
            if (id(alarm_led_mode) != mode) {
              ESP_LOGI("loftway", "Alarm level updated to %s (mode %d)", level.c_str(), mode);
              id(alarm_led_mode) = mode;
            }
sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    update_interval: 60s

# Global variables
globals:
  - id: alarm_led_mode
    type: int
    restore_value: no
    initial_value: '0'

  - id: status_led_is_on
    type: bool
    restore_value: no
    initial_value: 'true'

# Alarm LED flashing interval
interval:
  - interval: 100ms
    then:
      - lambda: |-
          const int mode = id(alarm_led_mode);
          bool led_on = false;
          const uint32_t now = millis();
          switch (mode) {
            case 0:  // OK - LED off
              led_on = false;
              break;
            case 1:  // Notify - single 300ms flash every 60 seconds
              led_on = (now % 60000u) < 300u;
              break;
            case 2: {  // Take Action - double flash every 20 seconds
              const uint32_t phase = now % 20000u;
              led_on = (phase < 200u) || (phase >= 300u && phase < 500u);
              break;
            }
            case 3:  // Emergency - constant quick flash (200ms on/off)
              led_on = (now % 400u) < 200u;
              break;
            default:
              led_on = false;
              break;
          }

          if (led_on != id(status_led_is_on)) {
            if (led_on) {
              id(status_led).turn_on();
            } else {
              id(status_led).turn_off();
            }
            id(status_led_is_on) = led_on;
          }
