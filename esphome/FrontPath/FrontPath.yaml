substitutions:
  ld2410_sensor1_mac: B8:BE:51:7D:71:44
  ld2410_sensor2_mac: 14:AA:8C:58:66:02

esphome:
  name: frontpath
  friendly_name: FrontPath

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  baud_rate: 0
  level: INFO
  logs:
    ld2410_ble: INFO

api:
  encryption:
    key: !secret frontpath_encryption_key
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret frontpath_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: false
  reboot_timeout: 15min
  output_power: 13.5dB

bluetooth_proxy:
  active: true

esp32_ble_tracker:
  on_ble_advertise:
    - mac_address: ${ld2410_sensor1_mac}
      then:
        - lambda: |-
            const char *TAG = "ld2410_ble";
            uint32_t now = millis();
            uint32_t previous = id(sensor1_last_seen_ms);
            id(sensor1_last_seen_ms) = now;

            if (id(sensor1_was_missing)) {
              float minutes_missing = previous == 0 ? 0.0f : (now - previous) / 60000.0f;
              ESP_LOGI(TAG, "Sensor 1 (%s) advertisements resumed after %.1f minutes", "${ld2410_sensor1_mac}", minutes_missing);
              id(sensor1_was_missing) = false;
              id(sensor1_ble_connected).publish_state(true);
            }

    - mac_address: ${ld2410_sensor2_mac}
      then:
        - lambda: |-
            const char *TAG = "ld2410_ble";
            uint32_t now = millis();
            uint32_t previous = id(sensor2_last_seen_ms);
            id(sensor2_last_seen_ms) = now;

            if (id(sensor2_was_missing)) {
              float minutes_missing = previous == 0 ? 0.0f : (now - previous) / 60000.0f;
              ESP_LOGI(TAG, "Sensor 2 (%s) advertisements resumed after %.1f minutes", "${ld2410_sensor2_mac}", minutes_missing);
              id(sensor2_was_missing) = false;
              id(sensor2_ble_connected).publish_state(true);
            }

globals:
  - id: sensor1_last_seen_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: sensor2_last_seen_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: sensor1_was_missing
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sensor2_was_missing
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: darkness_threshold
    type: float
    restore_value: yes
    initial_value: '30.0'

text_sensor:
  - platform: template
    name: "FrontPath Mode"
    id: frontpath_mode_status
    icon: "mdi:bluetooth-transfer"
    update_interval: 30s
    lambda: |-
      return {"BLE Proxy Mode - HA automations active"};

  - platform: template
    name: "LD2410 Sensor 1 BLE Status"
    id: sensor1_ble_status
    icon: "mdi:bluetooth"
    update_interval: never

  - platform: template
    name: "LD2410 Sensor 2 BLE Status"
    id: sensor2_ble_status
    icon: "mdi:bluetooth"
    update_interval: never

binary_sensor:
  - platform: template
    name: "LD2410 Sensor 1 BLE Connected"
    id: sensor1_ble_connected
    device_class: connectivity
    lambda: |-
      uint32_t last_seen = id(sensor1_last_seen_ms);
      if (last_seen == 0) {
        return false;
      }
      const uint32_t ONLINE_TIMEOUT_MS = 180000;
      return (millis() - last_seen) < ONLINE_TIMEOUT_MS;

  - platform: template
    name: "LD2410 Sensor 2 BLE Connected"
    id: sensor2_ble_connected
    device_class: connectivity
    lambda: |-
      uint32_t last_seen = id(sensor2_last_seen_ms);
      if (last_seen == 0) {
        return false;
      }
      const uint32_t ONLINE_TIMEOUT_MS = 180000;
      return (millis() - last_seen) < ONLINE_TIMEOUT_MS;

  - platform: template
    name: "Path Is Dark"
    id: path_is_dark
    icon: "mdi:weather-night"
    lambda: |-
      float light_pct = id(light_level).state;
      float threshold_pct = id(darkness_threshold);

      if (isnan(light_pct)) {
        return false;
      }

      return light_pct < threshold_pct;
    filters:
      - delayed_on: 30s
      - delayed_off: 60s

number:
  - platform: template
    name: "Darkness Threshold"
    id: darkness_threshold_control
    min_value: 0.0
    max_value: 100.0
    step: 1.0
    unit_of_measurement: "%"
    icon: "mdi:theme-light-dark"
    set_action:
      - globals.set:
          id: darkness_threshold
          value: !lambda 'return x;'
    lambda: |-
      return id(darkness_threshold);

sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    update_interval: 10s

  - platform: adc
    pin: GPIO0
    name: "Light Level Voltage"
    id: light_level_voltage
    update_interval: 2s
    attenuation: 12db
    filters:
      - exponential_moving_average:
          alpha: 0.1
          send_every: 1
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: "mdi:flash"
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("light_sensor", "TEMT6000 raw voltage: %.3f V", x);

  - platform: template
    name: "Light Level"
    id: light_level
    update_interval: 2s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:brightness-6"
    lambda: |-
      float volts = id(light_level_voltage).state;
      if (isnan(volts)) {
        return NAN;
      }
      float ratio = volts / 3.3f;
      if (ratio < 0.0f) {
        ratio = 0.0f;
      }
      if (ratio > 1.0f) {
        ratio = 1.0f;
      }
      return ratio * 100.0f;

interval:
  - interval: 60s
    then:
      - lambda: |-
          const uint32_t WARNING_TIMEOUT_MS = 180000;
          const uint32_t STALE_TIMEOUT_MS = 600000;

          auto update_status = [&](uint32_t last_seen,
                                   bool *was_missing,
                                   text_sensor::TextSensor *status_sensor,
                                   binary_sensor::BinarySensor *connected_sensor,
                                   const char *label,
                                   const char *mac) -> void {
            if (last_seen == 0) {
              status_sensor->publish_state("Never seen");
              connected_sensor->publish_state(false);
              return;
            }

            uint32_t now = millis();
            uint32_t elapsed = now - last_seen;
            float minutes = elapsed / 60000.0f;

            if (elapsed < WARNING_TIMEOUT_MS) {
              status_sensor->publish_state("Connected");
              connected_sensor->publish_state(true);
              *was_missing = false;
              return;
            }

            if (elapsed < STALE_TIMEOUT_MS) {
              if (!(*was_missing)) {
                ESP_LOGW("ld2410_ble", "%s (%s) quiet for %.1f minutes", label, mac, minutes);
                *was_missing = true;
              }
              char status_msg[48];
              snprintf(status_msg, sizeof(status_msg), "Missing %.0f min", minutes);
              status_sensor->publish_state(status_msg);
              connected_sensor->publish_state(false);
              return;
            }

            char status_msg[48];
            snprintf(status_msg, sizeof(status_msg), "Stale %.0f min", minutes);
            status_sensor->publish_state(status_msg);
            connected_sensor->publish_state(false);
          };

          bool sensor1_missing = id(sensor1_was_missing);
          bool sensor2_missing = id(sensor2_was_missing);

          update_status(
            id(sensor1_last_seen_ms),
            &sensor1_missing,
            id(sensor1_ble_status),
            id(sensor1_ble_connected),
            "Sensor 1",
            "${ld2410_sensor1_mac}"
          );

          update_status(
            id(sensor2_last_seen_ms),
            &sensor2_missing,
            id(sensor2_ble_status),
            id(sensor2_ble_connected),
            "Sensor 2",
            "${ld2410_sensor2_mac}"
          );

          id(sensor1_was_missing) = sensor1_missing;
          id(sensor2_was_missing) = sensor2_missing;

output:
  # Onboard blue LED (GPIO8 on ESP32-C3-DevKitM-1)
  # Can be controlled from HA automations for visual feedback
  - platform: gpio
    id: person_indicator_led
    pin:
      number: GPIO8
    inverted: true  # Onboard LED is active-low
