esphome:
  name: frontpath
  friendly_name: FrontPath

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:
  baud_rate: 0  # Disable UART logging to free up UART0
  level: INFO   # Reduce log verbosity to save memory
  logs:
    person_detect: INFO  # Keep our custom detection logs
    ld2410: ERROR        # Suppress occasional invalid header warnings (only show critical errors)

# Enable Home Assistant API
api:
  encryption:
    key: !secret frontpath_encryption_key
  reboot_timeout: 15min  # Reboot if no HA connection for 15 mins

ota:
  - platform: esphome
    password: !secret frontpath_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: false
  reboot_timeout: 15min  # Reboot if WiFi connection lost for 15 mins
  output_power: 13.5dB


# Bluetooth Proxy (extends HA BLE range)
bluetooth_proxy:
  active: true

# Globals for adaptive baseline tracking
globals:
  # Long-term baseline (very slow moving average - adapts to weather over minutes)
  - id: sensor_1_baseline
    type: float
    restore_value: no
    initial_value: '5.0'  # Start with reasonable default (lower than before)
  
  - id: sensor_2_baseline
    type: float
    restore_value: no
    initial_value: '5.0'
  
  # Short-term smoothed values (fast moving average - filters momentary spikes)
  - id: sensor_1_smoothed
    type: float
    restore_value: no
    initial_value: '5.0'
  
  - id: sensor_2_smoothed
    type: float
    restore_value: no
    initial_value: '5.0'
  
  - id: person_detected_prev
    type: bool
    restore_value: no
    initial_value: 'false'
  
  # Raw readings direct from sensors (no processing)
  - id: sensor_1_moving_energy_raw
    type: float
    restore_value: no
    initial_value: '0.0'
  
  - id: sensor_2_moving_energy_raw
    type: float
    restore_value: no
    initial_value: '0.0'
  
  # Light sensor darkness threshold (persists across reboots)
  - id: darkness_threshold
    type: float
    restore_value: yes
    initial_value: '30.0'  # Default: 30% brightness threshold (percentage)

  # Margin (in %) added on top of baseline when auto-calibrating gate thresholds
  - id: gate_threshold_margin
    type: float
    restore_value: yes
    initial_value: '8.0'

  # Maximum percentage shift allowed per gate during auto calibration
  - id: gate_calibration_step_limit
    type: float
    restore_value: yes
    initial_value: '5.0'

  # Minimum detection activity score needed to trigger automatic calibration
  - id: gate_calibration_activity_threshold
    type: float
    restore_value: yes
    initial_value: '6.0'

  # Rolling score that counts recent "person detected" events
  - id: detection_activity_score
    type: float
    restore_value: no
    initial_value: '0.0'

  # Track last time movement was confirmed (ms since boot)
  - id: last_movement_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Prevent repeated recalibration while we're already correcting a stale detection
  - id: stale_recalibration_pending
    type: bool
    restore_value: no
    initial_value: 'false'

  # Minutes since boot when the last calibration succeeded (for fallback cadence)
  - id: last_gate_calibration_minutes
    type: float
    restore_value: no
    initial_value: '0.0'

# Watchdog timer and memory monitoring
interval:
  - interval: 60s
    then:
      - lambda: |-
          // Log free memory every minute to track potential leaks
          // ESP32-C3 uses ESP-IDF framework
          ESP_LOGI("memory", "Free heap: %u bytes", esp_get_free_heap_size());
  
  # Fast smoothing - updates every second to filter momentary spikes
  # This creates a short-term average that still responds quickly
  - interval: 1s
    then:
      - lambda: |-
          float s1_raw = id(sensor_1_moving_energy_raw);
          float s2_raw = id(sensor_2_moving_energy_raw);
          
          if (!isnan(s1_raw) && s1_raw >= 0) {
            // Fast exponential moving average: 0.7 old + 0.3 new
            // Smooths out single-reading spikes while staying responsive
            id(sensor_1_smoothed) = 0.7 * id(sensor_1_smoothed) + 0.3 * s1_raw;
          }
          
          if (!isnan(s2_raw) && s2_raw >= 0) {
            id(sensor_2_smoothed) = 0.7 * id(sensor_2_smoothed) + 0.3 * s2_raw;
          }
  
  # Baseline tracking - updates every 15 seconds (only when no person detected)
  # Very slow adaptation to weather changes (rain, wind picking up, etc.)
  - interval: 15s
    then:
      - lambda: |-
          // Only update baseline when no person is detected
          // This prevents person energy from polluting the baseline
          if (!id(person_detected_prev)) {
            float s1_smooth = id(sensor_1_smoothed);
            float s2_smooth = id(sensor_2_smoothed);
            
            if (!isnan(s1_smooth) && s1_smooth >= 0) {
              // Very slow exponential moving average: 0.95 old + 0.05 new
              // Takes ~5 minutes to fully adapt to gradual changes
              // Ignores brief spikes (already filtered by smoothed values)
              id(sensor_1_baseline) = 0.95 * id(sensor_1_baseline) + 0.05 * s1_smooth;
            }
            
            if (!isnan(s2_smooth) && s2_smooth >= 0) {
              id(sensor_2_baseline) = 0.95 * id(sensor_2_baseline) + 0.05 * s2_smooth;
            }
          }

  # Detection activity score decay (approximates detections over last few minutes)
  - interval: 30s
    then:
      - lambda: |-
          float score = id(detection_activity_score) * 0.82f;
          if (score < 0.05f) {
            score = 0.0f;
          }
          id(detection_activity_score) = score;

  # Periodically refresh gate thresholds using current baselines+margin
  - interval: 20min
    then:
      - script.execute: auto_calibrate_gate_thresholds

script:
  - id: auto_calibrate_gate_thresholds
    mode: single
    then:
      - if:
          condition:
            or:
              - binary_sensor.is_on: path_person_detected
              - binary_sensor.is_on: sensor_1_moving_target
              - binary_sensor.is_on: sensor_2_moving_target
          then:
            - lambda: |-
                ESP_LOGI("gate_cal", "Skipping gate auto-calibration - movement detected");
          else:
            - lambda: |-
                const float FALLBACK_MINUTES = 240.0f;  // Always recalibrate at least every 4 hours
                float now_minutes = millis() / 60000.0f;
                float minutes_since = now_minutes - id(last_gate_calibration_minutes);
                if (minutes_since < 0) minutes_since = FALLBACK_MINUTES;  // millis overflow safety

                float activity = id(detection_activity_score);
                float activity_threshold = id(gate_calibration_activity_threshold);
                bool enough_activity = activity >= activity_threshold;
                bool due_time = minutes_since >= FALLBACK_MINUTES;

                if (!enough_activity && !due_time) {
                  ESP_LOGI(
                    "gate_cal",
                    "Skipping gate auto-calibration - activity score %.1f below threshold %.1f (last %.0f min ago)",
                    activity,
                    activity_threshold,
                    minutes_since
                  );
                  return;
                }

                ESP_LOGI(
                  "gate_cal",
                  "Calibrating gate thresholds (margin %.1f%%, step limit %.1f%%, baselines S1 %.1f%%, S2 %.1f%%, activity %.1f, since %.0f min)",
                  id(gate_threshold_margin),
                  id(gate_calibration_step_limit),
                  id(sensor_1_baseline),
                  id(sensor_2_baseline),
                  activity,
                  minutes_since
                );
                using ld2410::GateThresholdNumber;
                auto apply = [&](float base, GateThresholdNumber **targets, const char *label) {
                  const float offsets[9] = {0.0f, 0.5f, 1.0f, 1.5f, 2.0f, 3.0f, 4.0f, 5.0f, 6.0f};
                  float margin = id(gate_threshold_margin);
                  if (isnan(base)) {
                    ESP_LOGW("gate_cal", "%s baseline unavailable, using 10%% fallback", label);
                    base = 10.0f;
                  }
                  for (int i = 0; i < 9; i++) {
                    float target = base + margin + offsets[i];
                    if (target < 5.0f) {
                      target = 5.0f;
                    } else if (target > 90.0f) {
                      target = 90.0f;
                    }
                    float current = targets[i]->state;
                    float max_step = id(gate_calibration_step_limit);
                    if (!isnan(current) && max_step > 0.0f) {
                      float min_allowed = current - max_step;
                      float max_allowed = current + max_step;
                      if (min_allowed < 5.0f) {
                        min_allowed = 5.0f;
                      }
                      if (max_allowed > 90.0f) {
                        max_allowed = 90.0f;
                      }
                      if (target < min_allowed) {
                        target = min_allowed;
                      } else if (target > max_allowed) {
                        target = max_allowed;
                      }
                    }
                    auto call = targets[i]->make_call();
                    call.set_value(target);
                    call.perform();
                  }
                };
                GateThresholdNumber *sensor1_targets[9] = {
                  id(sensor1_gate0_move_threshold),
                  id(sensor1_gate1_move_threshold),
                  id(sensor1_gate2_move_threshold),
                  id(sensor1_gate3_move_threshold),
                  id(sensor1_gate4_move_threshold),
                  id(sensor1_gate5_move_threshold),
                  id(sensor1_gate6_move_threshold),
                  id(sensor1_gate7_move_threshold),
                  id(sensor1_gate8_move_threshold)
                };
                GateThresholdNumber *sensor2_targets[9] = {
                  id(sensor2_gate0_move_threshold),
                  id(sensor2_gate1_move_threshold),
                  id(sensor2_gate2_move_threshold),
                  id(sensor2_gate3_move_threshold),
                  id(sensor2_gate4_move_threshold),
                  id(sensor2_gate5_move_threshold),
                  id(sensor2_gate6_move_threshold),
                  id(sensor2_gate7_move_threshold),
                  id(sensor2_gate8_move_threshold)
                };
                apply(id(sensor_1_baseline), sensor1_targets, "Sensor 1");
                apply(id(sensor_2_baseline), sensor2_targets, "Sensor 2");
                ESP_LOGI("gate_cal", "Gate thresholds updated");
                id(detection_activity_score) = 0.0f;
                id(last_gate_calibration_minutes) = now_minutes;

# UART Configuration for LD2410C sensors
uart:
  - id: uart_sensor1
    tx_pin: GPIO20
    rx_pin: GPIO21
    baud_rate: 256000
    parity: NONE
    stop_bits: 1
  
  - id: uart_sensor2
    tx_pin: GPIO6
    rx_pin: GPIO7
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

# LD2410C Sensors
# Sensor 1: Points towards house (one end of 12m path)
# Sensor 2: Points away from house (other end of 12m path)
ld2410:
  - uart_id: uart_sensor1
    id: radar_sensor1
  
  - uart_id: uart_sensor2
    id: radar_sensor2

# Binary Sensors
binary_sensor:
  - platform: ld2410
    ld2410_id: radar_sensor1
    has_target:
      name: "Sensor 1 Presence"
    has_moving_target:
      name: "Sensor 1 Moving Target"
      id: sensor_1_moving_target
      filters:
        - delayed_on: 500ms  # Ignore brief movements (rain spikes, branches, small animals)
        - delayed_off: 2s    # Keep active to avoid flickering as person moves
      on_press:
        then:
          - lambda: |-
              id(last_movement_millis) = millis();
              id(stale_recalibration_pending) = false;
    has_still_target:
      name: "Sensor 1 Still Target"
      internal: true  # Hide from HA - not useful for outdoor path detection
  
  - platform: ld2410
    ld2410_id: radar_sensor2
    has_target:
      name: "Sensor 2 Presence"
    has_moving_target:
      name: "Sensor 2 Moving Target"
      id: sensor_2_moving_target
      filters:
        - delayed_on: 500ms  # Ignore brief movements (rain spikes, branches, small animals)
        - delayed_off: 2s    # Keep active to avoid flickering as person moves
      on_press:
        then:
          - lambda: |-
              id(last_movement_millis) = millis();
              id(stale_recalibration_pending) = false;
    has_still_target:
      name: "Sensor 2 Still Target"
      internal: true  # Hide from HA - not useful for outdoor path detection
  

  # Darkness detection based on light sensor
  - platform: template
    name: "Path Is Dark"
    id: path_is_dark
    icon: "mdi:weather-night"
    lambda: |-
      float light_pct = id(light_level).state;
      float threshold_pct = id(darkness_threshold);

      if (isnan(light_pct)) return false;

      // Dark when light level is BELOW threshold
      return light_pct < threshold_pct;
    filters:
      - delayed_on: 30s   # Require 30s of darkness to avoid brief shadows
      - delayed_off: 60s  # Stay "dark" for 60s after light returns (sunset/sunrise stability)
  
  # Template "Person-sized target" detection - adaptive thresholds based on baseline
  # Automatically adjusts to weather conditions (rain, wind, etc.)
  - platform: template
    name: "Path Person Detected"
    id: path_person_detected
    device_class: occupancy
    lambda: |-
      // Use fast sensors for quick detection
      float s1_energy = id(sensor_1_moving_energy_fast).state;
      float s2_energy = id(sensor_2_moving_energy_fast).state;
      float s1_baseline = id(sensor_1_baseline);
      float s2_baseline = id(sensor_2_baseline);
      
      // Also check moving target sensors for confirmation
      bool s1_moving = id(sensor_1_moving_target).state;
      bool s2_moving = id(sensor_2_moving_target).state;
      bool any_moving_now = s1_moving || s2_moving;
      uint32_t now_ms = millis();
      if (any_moving_now) {
        id(last_movement_millis) = now_ms;
        id(stale_recalibration_pending) = false;
      }
      
      // Adaptive thresholds: detect when energy exceeds baseline + delta
      // Delta values chosen to distinguish person from environmental noise
      // Tuned after gate calibration for reliable detection without false triggers
      float moderate_delta = 20.0;  // Baseline + 20% with movement = person
      float strong_delta = 30.0;    // Baseline + 30% without movement = definitely person
      float weak_delta = 12.0;      // Baseline + 12% with movement = catches edge cases
      
      bool s1_detected = false;
      bool s2_detected = false;
      
      if (!isnan(s1_energy) && !isnan(s1_baseline)) {
        float s1_above = s1_energy - s1_baseline;
        s1_detected = (s1_above > moderate_delta && s1_moving) || 
                      (s1_above > strong_delta) || 
                      (s1_moving && s1_above > weak_delta);
      }
      
      if (!isnan(s2_energy) && !isnan(s2_baseline)) {
        float s2_above = s2_energy - s2_baseline;
        s2_detected = (s2_above > moderate_delta && s2_moving) || 
                      (s2_above > strong_delta) || 
                      (s2_moving && s2_above > weak_delta);
      }
      
      bool result = s1_detected || s2_detected;
      
      if (result && !any_moving_now) {
        uint32_t last_move = id(last_movement_millis);
        const uint32_t STALE_LIMIT_MS = 120000;  // 2 minutes
        if (last_move > 0 && (now_ms - last_move) > STALE_LIMIT_MS) {
          result = false;
          if (!id(stale_recalibration_pending)) {
            id(stale_recalibration_pending) = true;
            id(auto_calibrate_gate_thresholds).execute();
            ESP_LOGI("person_detect", "Forced clear after %u ms without movement, recalibrating gates", (unsigned)(now_ms - last_move));
          }
        }
      }
      
      if (!result) {
        id(stale_recalibration_pending) = false;
      }
      id(person_detected_prev) = result;  // Store for baseline update logic
      return result;
    filters:
      - delayed_on: 1.5s   # Require sustained signal to filter brief false triggers
      - delayed_off: 5s    # Keep on for 5s after detection clears
    on_press:
      then:
        - output.turn_on: person_indicator_led
        - lambda: |-
            float score = id(detection_activity_score) + 1.0f;
            if (score > 100.0f) {
              score = 100.0f;
            }
            id(detection_activity_score) = score;
        - lambda: |-
            // Log detection events with energy and baseline values for diagnostics
            // Only logs on transition to ON (not every state update)
            ESP_LOGI("person_detect", "PERSON DETECTED - S1: %.1f%% (baseline %.1f%%, delta %.1f%%), S2: %.1f%% (baseline %.1f%%, delta %.1f%%)",
              id(sensor_1_moving_energy_fast).state,
              id(sensor_1_baseline),
              id(sensor_1_moving_energy_fast).state - id(sensor_1_baseline),
              id(sensor_2_moving_energy_fast).state,
              id(sensor_2_baseline),
              id(sensor_2_moving_energy_fast).state - id(sensor_2_baseline)
            );
    on_release:
      then:
        - output.turn_off: person_indicator_led

# Calibration Controls
number:
  # Darkness threshold control (persists across reboots)
  - platform: template
    name: "Darkness Threshold"
    id: darkness_threshold_control
    min_value: 0.0
    max_value: 100.0
    step: 1.0
    unit_of_measurement: "%"
    icon: "mdi:theme-light-dark"
    set_action:
      - globals.set:
          id: darkness_threshold
          value: !lambda 'return x;'
    lambda: |-
      return id(darkness_threshold);

  # Adjustable margin added when calculating gate thresholds
  - platform: template
    name: "Gate Sensitivity Margin"
    id: gate_sensitivity_margin_control
    min_value: 0.0
    max_value: 25.0
    step: 0.5
    unit_of_measurement: "%"
    icon: "mdi:tune"
    set_action:
      - globals.set:
          id: gate_threshold_margin
          value: !lambda 'return x;'
    lambda: |-
      return id(gate_threshold_margin);

  - platform: template
    name: "Gate Activity Threshold"
    id: gate_activity_threshold_control
    min_value: 0.0
    max_value: 30.0
    step: 0.5
    unit_of_measurement: "events"
    icon: "mdi:walk"
    set_action:
      - globals.set:
          id: gate_calibration_activity_threshold
          value: !lambda 'return x;'
    lambda: |-
      return id(gate_calibration_activity_threshold);

  - platform: template
    name: "Gate Max Step"
    id: gate_step_limit_control
    min_value: 1.0
    max_value: 20.0
    step: 0.5
    unit_of_measurement: "%"
    icon: "mdi:swap-horizontal"
    set_action:
      - globals.set:
          id: gate_calibration_step_limit
          value: !lambda 'return x;'
    lambda: |-
      return id(gate_calibration_step_limit);
  
  # Sensor 1 Controls - Basic Settings
  - platform: ld2410
    ld2410_id: radar_sensor1
    max_move_distance_gate:
      name: "Sensor 1 Max Move Distance Gate"
    max_still_distance_gate:
      name: "Sensor 1 Max Still Distance Gate"
    timeout:
      name: "Sensor 1 Timeout"
    # Per-gate motion sensitivity (0-100, higher = less sensitive)
    g0:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 0"
        id: sensor1_gate0_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 0"
    g1:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 1"
        id: sensor1_gate1_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 1"
    g2:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 2"
        id: sensor1_gate2_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 2"
    g3:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 3"
        id: sensor1_gate3_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 3"
    g4:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 4"
        id: sensor1_gate4_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 4"
    g5:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 5"
        id: sensor1_gate5_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 5"
    g6:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 6"
        id: sensor1_gate6_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 6"
    g7:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 7"
        id: sensor1_gate7_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 7"
    g8:
      move_threshold:
        name: "Sensor 1 Motion Energy Gate 8"
        id: sensor1_gate8_move_threshold
      still_threshold:
        name: "Sensor 1 Static Energy Gate 8"
    
  # Sensor 2 Controls - Basic Settings
  - platform: ld2410
    ld2410_id: radar_sensor2
    max_move_distance_gate:
      name: "Sensor 2 Max Move Distance Gate"
    max_still_distance_gate:
      name: "Sensor 2 Max Still Distance Gate"
    timeout:
      name: "Sensor 2 Timeout"
    # Per-gate motion sensitivity (0-100, higher = less sensitive)
    g0:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 0"
        id: sensor2_gate0_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 0"
    g1:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 1"
        id: sensor2_gate1_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 1"
    g2:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 2"
        id: sensor2_gate2_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 2"
    g3:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 3"
        id: sensor2_gate3_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 3"
    g4:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 4"
        id: sensor2_gate4_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 4"
    g5:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 5"
        id: sensor2_gate5_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 5"
    g6:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 6"
        id: sensor2_gate6_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 6"
    g7:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 7"
        id: sensor2_gate7_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 7"
    g8:
      move_threshold:
        name: "Sensor 2 Motion Energy Gate 8"
        id: sensor2_gate8_move_threshold
      still_threshold:
        name: "Sensor 2 Static Energy Gate 8"

button:
  - platform: template
    name: "Recalibrate Gate Thresholds"
    icon: "mdi:remote"
    on_press:
      then:
        - script.execute: auto_calibrate_gate_thresholds

  # Sensor 1 Restart/Reset
  - platform: ld2410
    ld2410_id: radar_sensor1
    restart:
      name: "Sensor 1 Restart"
    factory_reset:
      name: "Sensor 1 Factory Reset"
  
  # Sensor 2 Restart/Reset
  - platform: ld2410
    ld2410_id: radar_sensor2
    restart:
      name: "Sensor 2 Restart"
    factory_reset:
      name: "Sensor 2 Factory Reset"

output:
  # Onboard blue LED (GPIO8 on ESP32-C3-DevKitM-1)
  - platform: gpio
    id: person_indicator_led
    pin:
      number: GPIO8
    inverted: true  # Onboard LED is active-low

# Template sensor for position tracking
sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    update_interval: 10s
  
  # TEMT6000 Light Sensor diagnostics (raw voltage)
  - platform: adc
    pin: GPIO0
    name: "Light Level Voltage"
    id: light_level_voltage
    update_interval: 2s
    attenuation: 12db  # Full 0-3.3V range (11dB deprecated)
    filters:
      - exponential_moving_average:
          alpha: 0.1  # Smooth out readings (10% new, 90% old)
          send_every: 1
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: "mdi:flash"
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("light_sensor", "TEMT6000 raw voltage: %.3f V", x);

  # Normalised light level (0-100%)
  - platform: template
    name: "Light Level"
    id: light_level
    update_interval: 2s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:brightness-6"
    lambda: |-
      float volts = id(light_level_voltage).state;
      if (isnan(volts)) {
        return NAN;
      }
      float ratio = volts / 3.3f;
      if (ratio < 0.0f) ratio = 0.0f;
      if (ratio > 1.0f) ratio = 1.0f;
      return ratio * 100.0f;

