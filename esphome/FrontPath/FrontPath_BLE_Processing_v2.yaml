    name: "Active Gate"
    id: active_gate_sensor
    icon: mdi:gate
  
  - platform: template
    name: "Gate Pattern Binary"
    id: gate_pattern_sensor
    icon: mdi:gate-alert
    # 18-character binary string: Street → Door layout
    # Positions 0-8: Sensor 1 (street) gates 0-8 (ascending = approaching street sensor)
    # Positions 9-17: Sensor 2 (door) gates 8-0 (descending = approaching door sensor)
    # Walking street→door triggers: street 8,7,6...1 then door 8,7,6...1
    # Each character maps to ~75cm of path distance

sensor:
  # Sensor 1 parser - handles notifications
  - platform: ble_client
    type: characteristic
    ble_client_id: ld2410_sensor1
    service_uuid: '0000fff0-0000-1000-8000-00805f9b34fb'
    characteristic_uuid: '0000fff1-0000-1000-8000-00805f9b34fb'
    update_interval: never
    notify: true
    internal: true
    id: sensor1_parser
    filters:
      - throttle: ${sensor_throttle}
    lambda: |-
      if (x.size() < 17) {
        return NAN;
      }
      
      if (x[0] == 0xf4 && x[1] == 0xf3 && x[2] == 0xf2 && x[3] == 0xf1) {
        bool moving = x[8] & 0x01;
        float motion_distance = x[9] + (x[10] << 8);
        float motion_energy = x[11];
        
        id(sensor1_has_target) = moving;
        id(sensor1_moving_energy) = motion_energy;
        
        float alpha = id(avg_alpha);
        id(sensor1_moving_avg) = alpha * motion_energy + (1 - alpha) * id(sensor1_moving_avg);
        
        // Estimate gates from distance (fallback)
        int gate_idx = (int)(motion_distance / 75.0);
        if (gate_idx > 8) gate_idx = 8;
        for (int i = 0; i < 9; i++) {
          float energy = (i == gate_idx) ? motion_energy : 0;
          id(sensor1_gates)[i] = energy;
          id(sensor1_gate_avg)[i] = alpha * energy + (1 - alpha) * id(sensor1_gate_avg)[i];
        }
        
        id(calculate_person_detection).execute();
      }
      return NAN;
  
  # Sensor 2 parser
  - platform: ble_client
    type: characteristic
    ble_client_id: ld2410_sensor2
    service_uuid: '0000fff0-0000-1000-8000-00805f9b34fb'
    characteristic_uuid: '0000fff1-0000-1000-8000-00805f9b34fb'
    update_interval: never
    notify: true
    internal: true
    id: sensor2_parser
    filters:
      - throttle: ${sensor_throttle}
    lambda: |-
      if (x.size() < 17) {
        return NAN;
      }
      
      if (x[0] == 0xf4 && x[1] == 0xf3 && x[2] == 0xf2 && x[3] == 0xf1) {
        bool moving = x[8] & 0x01;
        float motion_distance = x[9] + (x[10] << 8);
        float motion_energy = x[11];
        
        id(sensor2_has_target) = moving;
        id(sensor2_moving_energy) = motion_energy;
        
        float alpha = id(avg_alpha);
        id(sensor2_moving_avg) = alpha * motion_energy + (1 - alpha) * id(sensor2_moving_avg);
        
        int gate_idx = (int)(motion_distance / 75.0);
        if (gate_idx > 8) gate_idx = 8;
        for (int i = 0; i < 9; i++) {
          float energy = (i == gate_idx) ? motion_energy : 0;
          id(sensor2_gates)[i] = energy;
          id(sensor2_gate_avg)[i] = alpha * energy + (1 - alpha) * id(sensor2_gate_avg)[i];
        }
        
        id(calculate_person_detection).execute();
      }
      return NAN;
  
  # Position output
  - platform: template
    name: "Path Person Position"
    id: person_position
    device_class: distance
    unit_of_measurement: "m"
    accuracy_decimals: 2
    icon: mdi:map-marker-path
  
  # Light sensor (TEMT6000 on GPIO0)
  - platform: adc
    pin: GPIO0
    name: "Light Level Voltage"
    id: light_level_voltage
    update_interval: 32s
    attenuation: 12db
    filters:
      - exponential_moving_average:
          alpha: 0.1
          send_every: 1
  
  - platform: template
    name: "Light Level"
    id: light_level
    update_interval: 33s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: mdi:brightness-6
    lambda: |-
      float volts = id(light_level_voltage).state;
      if (isnan(volts)) return NAN;
      
      // Calibrated mapping using adjustable min/max voltages
      float min_volts = id(light_min_voltage);
      float max_volts = id(light_max_voltage);
      
      float clamped = volts;
      if (clamped < min_volts) clamped = min_volts;
      if (clamped > max_volts) clamped = max_volts;
      
      float ratio = (clamped - min_volts) / (max_volts - min_volts);
      return ratio * 100.0f;
  
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

