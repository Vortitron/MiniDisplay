      - globals.set:
          id: gate_hold_time_ms
          value: !lambda 'return x * 1000;'
    lambda: 'return id(gate_hold_time_ms) / 1000.0;'
  
  - platform: template
    name: "Sequential Lookback Time"
    id: sequential_lookback
    min_value: 0
    max_value: 10
    step: 0.5
    unit_of_measurement: "s"
    icon: mdi:history
    entity_category: config
    set_action:
      - globals.set:
          id: sequential_lookback_ms
          value: !lambda 'return x * 1000;'
    lambda: 'return id(sequential_lookback_ms) / 1000.0;'
  
  - platform: template
    name: "Sensitivity Update Interval"
    id: sensitivity_update_interval
    min_value: 1
    max_value: 60
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer
    entity_category: config
    set_action:
      - globals.set:
          id: sensitivity_update_interval_ms
          value: !lambda 'return x * 60000;'
    lambda: 'return id(sensitivity_update_interval_ms) / 60000.0;'

interval:
  # Periodically update adaptive sensitivity
  - interval: 60s
    then:
      - script.execute: update_adaptive_sensitivity

output:
  - platform: gpio
    id: person_indicator_led
    pin:
      number: GPIO8
    inverted: true

light:
  - platform: binary
    name: "Person Indicator LED"
    output: person_indicator_led

